<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Personalizar Demanda Nexo Causal</title>
  <!-- Cargamos el estilo estándar de Trello para iframe modal -->
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Noto Sans", "Ubuntu", "Droid Sans", "Helvetica Neue", sans-serif;
      color: #172b4d;
      background-color: #f4f5f7;
    }
    
    #form-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 16px;
      box-sizing: border-box;
    }

    #demanda-form-fields {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
      margin-bottom: 12px;
    }
    
    .form-group {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    label {
      font-weight: 600;
      font-size: 13px;
      color: #5e6c84;
    }
    
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ced4da;
      border-radius: 3px;
      background-color: #fff;
      color: #172b4d;
      font-size: 13px;
      cursor: pointer;
    }
    
    select:focus {
      outline: none;
      border-color: #0079bf;
    }

    input[type="text"].demanda-input-field {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ced4da;
      border-radius: 3px;
      background-color: #fff;
      color: #172b4d;
      font-size: 13px;
      box-sizing: border-box;
    }

    input[type="text"].demanda-input-field:focus {
      outline: none;
      border-color: #0079bf;
    }

    .form-group.horizontal {
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }

    .form-group.horizontal label {
      margin: 0 !important;
      padding: 0 !important;
      line-height: 24px;
    }

    .form-group.horizontal input {
      margin: 0 !important;
    }

    input[type="text"].demanda-input-field.narrow {
      margin: 0 !important;
      width: 55px;
      height: 24px;
      padding: 0 4px;
      font-size: 13px;
      text-align: center;
      flex-shrink: 0;
      box-sizing: border-box;
      line-height: 22px;
    }
    
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
      background-color: #f4f5f7;
      flex-shrink: 0;
    }
    
    button {
      background-color: #0079bf;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }
    
    button:hover {
      background-color: #026aa7;
    }
    
    button.secondary {
      background-color: #091e420f;
      color: #172b4d;
    }
    
    button.secondary:hover {
      background-color: #091e4224;
    }
    
    .message {
      font-size: 13px;
      color: #5e6c84;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <div id="form-container" style="display: none;">
    <div id="demanda-form-fields">
      <!-- Inyectados dinámicamente -->
    </div>
    <div class="actions">
      <button id="btn-cancelar" class="secondary">Cancelar</button>
      <button id="btn-generar">Generar demanda</button>
    </div>
  </div>

  <div id="no-data-message" class="message">
    Esperando datos de la plantilla...
  </div>

  <!-- Cargamos el script oficial de Trello Power-Up -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var t = window.TrelloPowerUp.iframe();
    var bc = new BroadcastChannel('demanda_channel');
    var receivedData = null;

    // Pedir datos a section.html
    bc.postMessage({ type: 'get_meta_tags' });

    // Escuchar respuesta
    bc.onmessage = function(event) {
      if (event.data && event.data.type === 'meta_tags') {
        receivedData = event.data.metaTags;
        // Obtener el idList de la tarjeta actual para cargar la persistencia a nivel de cliente (columna)
        t.card('idList')
          .then(function(card) {
            var idList = card.idList;
            var storageKey = 'demanda_selections_' + idList;
            return t.get('board', 'shared', storageKey);
          })
          .then(function(saved) {
            renderForm(receivedData, saved || {});
          })
          .catch(function(e) {
            console.error("Error al recuperar persistencia de demanda:", e);
            renderForm(receivedData, {});
          });
      }
    };

    t.render(function() {
      if (receivedData) {
        resizeModal();
      }
    });

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderForm(metaTags, saved) {
      var fieldsContainer = document.getElementById('demanda-form-fields');
      fieldsContainer.innerHTML = '';

      var hasFields = false;
      for (var title in metaTags) {
        hasFields = true;
        var metaTag = metaTags[title];
        
        var formGroup = document.createElement('div');
        formGroup.className = 'form-group';
        formGroup.style.marginBottom = '16px';

        var label = document.createElement('label');
        label.textContent = metaTag.title;
        label.style.display = 'block';
        label.style.marginBottom = '6px';
        formGroup.appendChild(label);

        if (metaTag.type === 'checkbox') {
          // Renderizar una lista de checkboxes
          var checkboxContainer = document.createElement('div');
          checkboxContainer.style.display = 'flex';
          checkboxContainer.style.flexDirection = 'column';
          checkboxContainer.style.gap = '6px';
          checkboxContainer.style.paddingLeft = '5px';

          metaTag.options.forEach(function (opt, index) {
            var itemLabel = document.createElement('label');
            itemLabel.style.display = 'flex';
            itemLabel.style.alignItems = 'center';
            itemLabel.style.gap = '8px';
            itemLabel.style.fontWeight = 'normal';
            itemLabel.style.fontSize = '13px';
            itemLabel.style.cursor = 'pointer';

            var checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'demanda-checkbox-option';
            checkbox.setAttribute('data-title', title);
            checkbox.setAttribute('data-index', index);
            checkbox.style.cursor = 'pointer';
            checkbox.style.width = '16px';
            checkbox.style.height = '16px';
            checkbox.style.margin = '0';

            var span = document.createElement('span');
            span.textContent = opt.name;

            // Prefiltrar estado seleccionado del checkbox
            if (saved && saved[title] && Array.isArray(saved[title])) {
              if (saved[title].indexOf(index) > -1) {
                checkbox.checked = true;
              }
            }

            itemLabel.appendChild(checkbox);
            itemLabel.appendChild(span);
            checkboxContainer.appendChild(itemLabel);
          });
          formGroup.appendChild(checkboxContainer);
        } else if (metaTag.type === 'single-checkbox') {
          // Renderizar un único checkbox horizontal y compacto
          formGroup.className = 'form-group horizontal';
          label.style.display = 'inline-block';
          label.style.marginBottom = '0px';

          // Envolver en etiqueta label y span de acompañamiento para cumplir con el estilo de Trello
          var itemLabel = document.createElement('label');
          itemLabel.style.display = 'inline-flex';
          itemLabel.style.alignItems = 'center';
          itemLabel.style.margin = '0';
          itemLabel.style.padding = '0';
          itemLabel.style.cursor = 'pointer';

          var checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'demanda-checkbox-option';
          checkbox.setAttribute('data-title', title);
          checkbox.setAttribute('data-index', 0);
          checkbox.style.cursor = 'pointer';
          checkbox.style.width = '16px';
          checkbox.style.height = '16px';
          checkbox.style.margin = '0';

          var span = document.createElement('span');
          span.style.display = 'inline-block';
          span.style.width = '16px';
          span.style.height = '16px';
          span.style.margin = '0';

          // Prefiltrar estado seleccionado del checkbox
          if (saved && saved[title] && Array.isArray(saved[title])) {
            if (saved[title].indexOf(0) > -1) {
              checkbox.checked = true;
            }
          }

          itemLabel.appendChild(checkbox);
          itemLabel.appendChild(span);
          formGroup.appendChild(itemLabel);
        } else if (metaTag.type === 'int' || metaTag.type === 'number' || metaTag.type === 'float') {
          // Renderizar campo de entrada numérico horizontal y estrecho
          formGroup.className = 'form-group horizontal';
          label.style.display = 'inline-block';
          label.style.marginBottom = '0px';

          var input = document.createElement('input');
          input.type = 'text';
          input.className = 'demanda-input-field narrow';
          input.setAttribute('data-title', title);
          input.setAttribute('data-type', metaTag.type);
          
          if (metaTag.type === 'int') {
            input.placeholder = 'Ej. 10';
            input.maxLength = 5;
            input.addEventListener('keypress', function(e) {
              if (e.key < '0' || e.key > '9') {
                e.preventDefault();
              }
            });
          } else {
            input.placeholder = 'Ej. 12.50';
            input.maxLength = 7;
            input.addEventListener('keypress', function(e) {
              if ((e.key < '0' || e.key > '9') && e.key !== '.' && e.key !== ',') {
                e.preventDefault();
              }
            });
          }
          
          if (saved && saved[title] !== undefined) {
            input.value = saved[title];
          }

          formGroup.appendChild(input);
        } else if (metaTag.type === 'text') {
          // Renderizar campo de entrada de texto largo estándar (vertical)
          var input = document.createElement('input');
          input.type = 'text';
          input.className = 'demanda-input-field';
          input.setAttribute('data-title', title);
          input.setAttribute('data-type', metaTag.type);
          input.placeholder = 'Introduce un texto...';
          
          if (saved && saved[title] !== undefined) {
            input.value = saved[title];
          }

          formGroup.appendChild(input);
        } else {
          // Renderizar select desplegable estándar
          var select = document.createElement('select');
          select.className = 'demanda-select';
          select.setAttribute('data-title', title);
 
          metaTag.options.forEach(function (opt) {
            var option = document.createElement('option');
            option.value = opt.value;
            option.textContent = opt.name;
            select.appendChild(option);
          });

          if (saved && saved[title] !== undefined) {
            select.value = saved[title];
          }

          formGroup.appendChild(select);
        }

        fieldsContainer.appendChild(formGroup);
      }

      if (hasFields) {
        document.getElementById('no-data-message').style.display = 'none';
        document.getElementById('form-container').style.display = 'flex';
        resizeModal();
      } else {
        document.getElementById('no-data-message').textContent = 'No se encontraron opciones de personalización en la plantilla.';
        t.sizeTo(document.body).catch(function(e){});
      }
    }

    document.getElementById('btn-generar').addEventListener('click', function() {
      var selections = {};
      var rawSelections = {};
      var formState = {};
      
      // 1. Recopilar valores de dropdowns
      var selects = document.querySelectorAll('.demanda-select');
      selects.forEach(function(s) {
        var title = s.getAttribute('data-title');
        selections[title] = s.value;
        // Guardar el nombre de la opción seleccionada para la lógica IF
        var selectedOptName = s.options[s.selectedIndex].text;
        rawSelections[title] = [selectedOptName];
        formState[title] = s.value;
      });

      // 1.2. Recopilar valores de campos de texto (int, text, number, float)
      var inputs = document.querySelectorAll('.demanda-input-field');
      inputs.forEach(function(inp) {
        var title = inp.getAttribute('data-title');
        var val = inp.value.trim();
        selections[title] = val;
        rawSelections[title] = [val];
        formState[title] = val;
      });

      // 2. Recopilar valores de checkboxes agrupados por título y ordenados por su índice original
      var allCheckboxGroups = document.querySelectorAll('.demanda-checkbox-option');
      var titles = [];
      allCheckboxGroups.forEach(function(cb) {
        var title = cb.getAttribute('data-title');
        if (titles.indexOf(title) === -1) {
          titles.push(title);
        }
      });
      var nextAutoNum = 2; // Inicia por defecto en 2 si no se ha especificado nada

      titles.forEach(function(title) {
        var checkedBoxes = document.querySelectorAll('.demanda-checkbox-option[data-title="' + title + '"]:checked');
        
        // Guardar los nombres de las opciones marcadas para la lógica IF
        rawSelections[title] = [];
        checkedBoxes.forEach(function(cb) {
          var index = parseInt(cb.getAttribute('data-index'), 10);
          var opt = receivedData[title].options[index];
          rawSelections[title].push(opt.name);
        });

        if (checkedBoxes.length === 0) {
          selections[title] = '';
          return;
        }

        var originalOptions = receivedData[title].options;
        var startNum = receivedData[title].startNum;
        var autowrap = receivedData[title].autowrap || false;
        
        // Determinar el número de inicio para este grupo
        var currentNum;
        if (startNum !== null && startNum !== undefined) {
          currentNum = startNum;
          nextAutoNum = startNum; // Actualizamos el contador global si se especificó uno explícito
        } else {
          currentNum = nextAutoNum;
        }

        var selectedIndices = [];
        checkedBoxes.forEach(function(cb) {
          selectedIndices.push(parseInt(cb.getAttribute('data-index'), 10));
        });
        selectedIndices.sort(function(a, b) { return a - b; });

        var resultText = '';
        var numRegex = /\[(?:(?!<\/?w:(?:p|tbl|tr|tc)\b)<[^>]+>|\s)*n(?:(?!<\/?w:(?:p|tbl|tr|tc)\b)<[^>]+>|\s)*u(?:(?!<\/?w:(?:p|tbl|tr|tc)\b)<[^>]+>|\s)*m(?:(?!<\/?w:(?:p|tbl|tr|tc)\b)<[^>]+>|\s)*\]/gi;

        var selectedValues = [];
        selectedIndices.forEach(function(idx) {
          var opt = originalOptions[idx];
          var valueWithNum = opt.value;
          
          if (numRegex.test(valueWithNum)) {
            valueWithNum = valueWithNum.replace(numRegex, currentNum);
            currentNum++;
          }
          
          selectedValues.push({
            value: valueWithNum,
            separator: opt.separator
          });
        });

        if (autowrap) {
          // Formateo de lista gramatical en español:
          // 1 elemento: "A"
          // 2 elementos: "A y B"
          // 3 o más elementos: "A, B y C"
          if (selectedValues.length === 1) {
            resultText = selectedValues[0].value;
          } else {
            var allButLast = [];
            for (var i = 0; i < selectedValues.length - 1; i++) {
              allButLast.push(selectedValues[i].value);
            }
            var firstPart = allButLast.join(', ');
            var lastValue = selectedValues[selectedValues.length - 1].value;
            resultText = firstPart + ' y ' + lastValue;
          }
        } else {
          // Formateo estándar usando los separadores de la plantilla
          selectedValues.forEach(function(item, i) {
            resultText += item.value;
            if (i < selectedValues.length - 1) {
              resultText += item.separator;
            }
          });
        }

        selections[title] = resultText;
        nextAutoNum = currentNum;
      });

      // Registrar la variable especial con el siguiente número secuencial de documento
      selections["[num]"] = String(nextAutoNum);
      selections["num"] = String(nextAutoNum);
      rawSelections["[num]"] = [String(nextAutoNum)];
      rawSelections["num"] = [String(nextAutoNum)];

      // Guardar los checkboxes seleccionados en formState
      allCheckboxGroups.forEach(function(cb) {
        var title = cb.getAttribute('data-title');
        var index = parseInt(cb.getAttribute('data-index'), 10);
        if (cb.checked) {
          if (!formState[title]) {
            formState[title] = [];
          }
          formState[title].push(index);
        }
      });

      // Guardar el estado del formulario en Trello a nivel de tablero (con idList) antes de generar el documento
      t.card('idList')
        .then(function(card) {
          var idList = card.idList;
          var storageKey = 'demanda_selections_' + idList;
          return t.set('board', 'shared', storageKey, formState);
        })
        .catch(function(err) {
          console.error("Error al guardar selecciones de la demanda:", err);
        })
        .then(function() {
          // Enviar selecciones a la ventana principal
          bc.postMessage({ type: 'generate', selections: selections, rawSelections: rawSelections });
          t.closeModal();
        });
    });

    document.getElementById('btn-cancelar').addEventListener('click', function() {
      bc.postMessage({ type: 'cancel' });
      t.closeModal();
    });

    // Timeout por si no responde section.html
    setTimeout(function() {
      if (!receivedData) {
        document.getElementById('no-data-message').textContent = 'Por favor, selecciona primero un archivo de Word desde el botón "Generar demanda Nexo causal" en la tarjeta.';
        t.sizeTo(document.body).catch(function(e){});
      }
    }, 1500);

    function resizeModal() {
      var fieldsEl = document.getElementById('demanda-form-fields');
      var actionsEl = document.querySelector('.actions');
      var container = document.getElementById('form-container');
      if (!fieldsEl || !actionsEl || !container) return;

      // Restablecer temporalmente para medir la altura natural del contenido
      container.style.height = 'auto';
      document.body.style.height = 'auto';
      document.documentElement.style.height = 'auto';

      var naturalHeight = fieldsEl.scrollHeight + actionsEl.offsetHeight + 44; 
      var targetHeight = Math.min(naturalHeight, 680); 

      // Aplicar altura objetivo para la medición de Trello
      container.style.height = targetHeight + 'px';
      document.body.style.height = targetHeight + 'px';
      document.documentElement.style.height = targetHeight + 'px';

      t.sizeTo(document.body).catch(function(e){});

      // Restaurar restricciones de flexbox inmediatamente para el ajuste si Trello limita el tamaño
      container.style.height = '100%';
      document.body.style.height = '100%';
      document.documentElement.style.height = '100%';
    }
  </script>
</body>
</html>
