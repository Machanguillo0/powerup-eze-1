<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Personalizar Demanda Nexo Causal</title>
  <!-- Cargamos el estilo estándar de Trello para iframe modal -->
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Noto Sans", "Ubuntu", "Droid Sans", "Helvetica Neue", sans-serif;
      color: #172b4d;
      background-color: #f4f5f7;
      padding: 15px;
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    label {
      font-weight: 600;
      font-size: 13px;
      color: #5e6c84;
    }
    
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ced4da;
      border-radius: 3px;
      background-color: #fff;
      color: #172b4d;
      font-size: 13px;
      cursor: pointer;
    }
    
    select:focus {
      outline: none;
      border-color: #0079bf;
    }
    
    .actions {
      margin-top: 20px;
      text-align: right;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    
    button {
      background-color: #0079bf;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }
    
    button:hover {
      background-color: #026aa7;
    }
    
    button.secondary {
      background-color: #091e420f;
      color: #172b4d;
    }
    
    button.secondary:hover {
      background-color: #091e4224;
    }
    
    .message {
      font-size: 13px;
      color: #5e6c84;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <div id="form-container" style="display: none;">
    <div id="demanda-form-fields">
      <!-- Inyectados dinámicamente -->
    </div>
    <div class="actions">
      <button id="btn-cancelar" class="secondary">Cancelar</button>
      <button id="btn-generar">Generar demanda</button>
    </div>
  </div>

  <div id="no-data-message" class="message">
    Esperando datos de la plantilla...
  </div>

  <!-- Cargamos el script oficial de Trello Power-Up -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var t = window.TrelloPowerUp.iframe();
    var bc = new BroadcastChannel('demanda_channel');
    var receivedData = null;

    // Pedir datos a section.html
    bc.postMessage({ type: 'get_meta_tags' });

    // Escuchar respuesta
    bc.onmessage = function(event) {
      if (event.data && event.data.type === 'meta_tags') {
        receivedData = event.data.metaTags;
        renderForm(receivedData);
      }
    };

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderForm(metaTags) {
      var fieldsContainer = document.getElementById('demanda-form-fields');
      fieldsContainer.innerHTML = '';

      var hasFields = false;
      for (var title in metaTags) {
        hasFields = true;
        var metaTag = metaTags[title];
        
        var formGroup = document.createElement('div');
        formGroup.className = 'form-group';
        formGroup.style.marginBottom = '16px';

        var label = document.createElement('label');
        label.textContent = metaTag.title;
        label.style.display = 'block';
        label.style.marginBottom = '6px';
        formGroup.appendChild(label);

        if (metaTag.type === 'checkbox') {
          // Renderizar una lista de checkboxes
          var checkboxContainer = document.createElement('div');
          checkboxContainer.style.display = 'flex';
          checkboxContainer.style.flexDirection = 'column';
          checkboxContainer.style.gap = '6px';
          checkboxContainer.style.paddingLeft = '5px';

          metaTag.options.forEach(function (opt, index) {
            var itemLabel = document.createElement('label');
            itemLabel.style.display = 'flex';
            itemLabel.style.alignItems = 'center';
            itemLabel.style.gap = '8px';
            itemLabel.style.fontWeight = 'normal';
            itemLabel.style.fontSize = '13px';
            itemLabel.style.cursor = 'pointer';

            var checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'demanda-checkbox-option';
            checkbox.setAttribute('data-title', title);
            checkbox.setAttribute('data-index', index);
            checkbox.style.cursor = 'pointer';
            checkbox.style.width = '16px';
            checkbox.style.height = '16px';
            checkbox.style.margin = '0';

            var span = document.createElement('span');
            span.textContent = opt.name;

            itemLabel.appendChild(checkbox);
            itemLabel.appendChild(span);
            checkboxContainer.appendChild(itemLabel);
          });
          formGroup.appendChild(checkboxContainer);
        } else {
          // Renderizar select desplegable estándar
          var select = document.createElement('select');
          select.className = 'demanda-select';
          select.setAttribute('data-title', title);

          metaTag.options.forEach(function (opt) {
            var option = document.createElement('option');
            option.value = opt.value;
            option.textContent = opt.name;
            select.appendChild(option);
          });
          formGroup.appendChild(select);
        }

        fieldsContainer.appendChild(formGroup);
      }

      if (hasFields) {
        document.getElementById('no-data-message').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
        t.sizeTo(document.body).done();
      } else {
        document.getElementById('no-data-message').textContent = 'No se encontraron opciones de personalización en la plantilla.';
        t.sizeTo(document.body).done();
      }
    }

    document.getElementById('btn-generar').addEventListener('click', function() {
      var selections = {};
      
      // 1. Recopilar valores de dropdowns
      var selects = document.querySelectorAll('.demanda-select');
      selects.forEach(function(s) {
        selections[s.getAttribute('data-title')] = s.value;
      });

      // 2. Recopilar valores de checkboxes agrupados por título y ordenados por su índice original
      var allCheckboxGroups = document.querySelectorAll('.demanda-checkbox-option');
      var titles = [];
      allCheckboxGroups.forEach(function(cb) {
        var title = cb.getAttribute('data-title');
        if (titles.indexOf(title) === -1) {
          titles.push(title);
        }
      });

      titles.forEach(function(title) {
        var checkedBoxes = document.querySelectorAll('.demanda-checkbox-option[data-title="' + title + '"]:checked');
        if (checkedBoxes.length === 0) {
          selections[title] = '';
          return;
        }

        var originalOptions = receivedData[title].options;
        var selectedIndices = [];
        checkedBoxes.forEach(function(cb) {
          selectedIndices.push(parseInt(cb.getAttribute('data-index'), 10));
        });
        selectedIndices.sort(function(a, b) { return a - b; });

        var resultText = '';
        selectedIndices.forEach(function(idx, i) {
          var opt = originalOptions[idx];
          resultText += opt.value;
          if (i < selectedIndices.length - 1) {
            resultText += opt.separator;
          }
        });

        selections[title] = resultText;
      });

      // Enviar selecciones a la ventana principal
      bc.postMessage({ type: 'generate', selections: selections });
      t.closeModal();
    });

    document.getElementById('btn-cancelar').addEventListener('click', function() {
      bc.postMessage({ type: 'cancel' });
      t.closeModal();
    });

    // Timeout por si no responde section.html
    setTimeout(function() {
      if (!receivedData) {
        document.getElementById('no-data-message').textContent = 'Por favor, selecciona primero un archivo de Word desde el botón "Generar demanda Nexo causal" en la tarjeta.';
        t.sizeTo(document.body).done();
      }
    }, 1500);
  </script>
</body>
</html>
