<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generar Proforma</title>
  <!-- Cargamos el estilo estándar de Trello para iframe modal -->
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <!-- Librerías necesarias para el procesamiento de Excel y descargas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Noto Sans", "Ubuntu", "Droid Sans", "Helvetica Neue", sans-serif;
      color: #172b4d;
      background-color: #f4f5f7;
      padding: 20px;
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: #5e6c84;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      box-sizing: border-box;
      border: 1px solid #ced4da;
      border-radius: 3px;
      background-color: #fff;
      color: #172b4d;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #1f845a;
      box-shadow: 0 0 0 2px rgba(31, 132, 90, 0.2);
    }
    
    .actions {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    
    button {
      height: 36px;
      padding: 0 16px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      border: none;
      box-sizing: border-box;
    }
    
    .btn-primary {
      background-color: #1f845a;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #137333;
    }
    
    .btn-secondary {
      background-color: #091e420f;
      color: #172b4d;
    }
    
    .btn-secondary:hover {
      background-color: #091e4224;
    }

    input[type="file"] {
      display: none;
    }

    .status-msg {
      margin-top: 12px;
      font-size: 13px;
      color: #5e6c84;
      font-style: italic;
    }

    .editable-input {
      background-color: #eaf6ec !important;
      border: 1px solid #b2dbaa !important;
    }
    
    .editable-input:focus {
      border-color: #1f845a !important;
      box-shadow: 0 0 0 2px rgba(31, 132, 90, 0.25) !important;
    }
  </style>
</head>
<body>

  <div class="form-group">
    <label for="cliente-cobra-input">Cliente Cobra (€)</label>
    <input type="text" id="cliente-cobra-input" class="editable-input" placeholder="Ej. 1.000,00">
  </div>

  <div class="form-group">
    <label for="importe-proforma">Importe Proforma (€)</label>
    <input type="text" id="importe-proforma" class="editable-input" placeholder="Ej. 1.250,50">
  </div>

  <div class="actions">
    <button id="btn-cancelar" class="btn-secondary">Cancelar</button>
    <button id="btn-proforma" class="btn-primary">Generar Proforma</button>
    <input type="file" id="proforma-upload" accept=".xlsx" />
  </div>

  <div id="status" class="status-msg">Cargando datos del expediente...</div>

  <!-- Cargamos el script oficial de Trello Power-Up -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var currentAppKey = (window.location.hostname.indexOf('github.io') > -1 || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? '30767998cbb7b57a692e8bb50cfa9a9c' // Power-Up Prepro
      : '352ae509bc7ffb5b7f5826a024353794'; // Power-Up Pro

    var t = window.TrelloPowerUp.iframe({
      appKey: currentAppKey,
      appName: 'Antigravity'
    });

    try {
      var lastKey = localStorage.getItem('antigravity_last_app_key');
      if (lastKey !== currentAppKey) {
        t.getRestApi().clearToken();
        localStorage.setItem('antigravity_last_app_key', currentAppKey);
      }
    } catch (e) {
      console.warn("localStorage no accesible:", e);
    }

    var cachedData = false;

    function setStatus(msg, isError) {
      var el = document.getElementById('status');
      if (el) {
        el.innerHTML = msg;
        el.style.color = isError ? '#de350b' : '#5e6c84';
      }
    }

    function parseSpanishFloat(valStr) {
      if (!valStr) return 0;
      var clean = String(valStr).replace(/[^0-9.,-]/g, '').trim();
      if (!clean) return 0;
      if (clean.indexOf('.') > -1 && clean.indexOf(',') > -1) {
        clean = clean.replace(/\./g, '').replace(',', '.');
      } else if (clean.indexOf(',') > -1) {
        clean = clean.replace(',', '.');
      }
      var num = parseFloat(clean);
      return isNaN(num) ? 0 : num;
    }

    function formatSpanishCurrency(num) {
      if (num === null || num === undefined || isNaN(num)) return "___________";
      return num.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function replaceExcelPlaceholders(text, fields, cleanEmpty) {
      if (!text || typeof text !== 'string') return text;
      
      var proformaVal = fields.proforma || "___________";
      
      var res = text.replace(/\{\{Nombre\}\}/gi, fields.nombre)
        .replace(/\{\{DNI\}\}/gi, fields.dni)
        .replace(/\{\{Domicilio\}\}/gi, fields.domicilio)
        .replace(/\{\{Teléfono\}\}/gi, fields.telefono || "___________")
        .replace(/\{\{Telefono\}\}/gi, fields.telefono || "___________")
        .replace(/\{\{Profesión\}\}/gi, fields.profesion || "___________")
        .replace(/\{\{Observaciones\}\}/gi, fields.observaciones || "___________")
        .replace(/\{\{Fecha del siniestro\}\}/gi, fields.fecha || "___________")
        .replace(/\{\{Hora\}\}/gi, fields.hora || "___________")
        .replace(/\{\{Lugar\}\}/gi, fields.lugar || "___________")
        .replace(/\{\{Ciudad\}\}/gi, fields.ciudad || "___________")
        .replace(/\{\{Matrícula1\}\}/gi, fields.matricula1 || "___________")
        .replace(/\{\{Aseguradora1\}\}/gi, fields.aseguradora1 || "___________")
        .replace(/\{\{Matrícula2\}\}/gi, fields.matricula2 || "___________")
        .replace(/\{\{Aseguradora2\}\}/gi, fields.aseguradora2 || "___________")
        .replace(/\{\{Fecha del sistema\}\}/gi, fields.fecha_sistema || "___________")
        .replace(/\{\{Fecha última actuación\}\}/gi, fields.fecha_ultima || "___________")
        .replace(/\{\{Fecha cierre expediente\}\}/gi, fields.fecha_cierre || "___________")
        .replace(/\{\{Fecha facturación\}\}/gi, fields.fecha_facturacion || "___________")
        .replace(/\{\{Fecha de resolución\}\}/gi, fields.fecha_resolucion || "___________")
        .replace(/\{\{Fecha comunicación designa\}\}/gi, fields.fecha_designa || "___________")
        .replace(/\{\{Fecha reclamación previa\}\}/gi, fields.fecha_reclamacion || "___________")
        .replace(/\{\{Fecha apertura expediente\}\}/gi, fields.fecha_apertura || "___________")
        .replace(/\{\{Fecha apertura del expediente\}\}/gi, fields.fecha_apertura || "___________")
        .replace(/\{\{Fecha del siniestro\}\}/gi, fields.fecha_siniestro || "___________")
        .replace(/\{\{Nº de proforma\}\}/gi, proformaVal)
        .replace(/\{\{Numero de proforma\}\}/gi, proformaVal)
        .replace(/\{\{Nº proforma\}\}/gi, proformaVal)
        .replace(/\{\{Numero proforma\}\}/gi, proformaVal)
        .replace(/\{\{Proforma\}\}/gi, proformaVal)
        .replace(/\{\{Importe proforma\}\}/gi, fields.importe_proforma || "___________")
        .replace(/\{\{Importe de proforma\}\}/gi, fields.importe_proforma || "___________")
        .replace(/\{\{Importe_proforma\}\}/gi, fields.importe_proforma || "___________")
        .replace(/\{\{Cliente cobra\}\}/gi, fields.cliente_cobra_proforma || "___________")
        .replace(/\{\{Cliente_cobra\}\}/gi, fields.cliente_cobra_proforma || "___________")
        .replace(/\{\{Igic proforma\}\}/gi, fields.igic_proforma || "___________")
        .replace(/\{\{Igic_proforma\}\}/gi, fields.igic_proforma || "___________")
        .replace(/\{\{Total proforma\}\}/gi, fields.total_proforma || "___________")
        .replace(/\{\{Total_proforma\}\}/gi, fields.total_proforma || "___________");

      for (var key in fields) {
        if (fields.hasOwnProperty(key) && key.trim() !== "") {
          var regex = new RegExp("\\{\\{\\s*" + escapeRegExp(key) + "\\s*\\}\\}", "gi");
          res = res.replace(regex, fields[key] || "");
        }
      }
      return res;
    }

    function getTaxPercentage(fields) {
      var pctKey = Object.keys(fields).find(function(k) {
        var normalized = k.toLowerCase().replace(/[^a-z0-9]/g, '');
        return normalized === 'porcentajeimpuestos' || normalized === 'impuestos';
      });
      if (pctKey) {
        var valStr = String(fields[pctKey]);
        var cleaned = valStr.replace(/[^0-9.,]/g, '').replace(',', '.');
        var val = parseFloat(cleaned) || 0;
        if (val > 0 && val < 1) {
          val = val * 100;
        }
        return val;
      }
      return 0;
    }

    function evalFormulaIfNeeded(val) {
      if (!val) return val;
      var trimmed = val.trim();
      if (/\b\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}\b/.test(trimmed)) return trimmed;
      if (/[a-zA-ZáéíóúÁÉÍÓÚñÑ]/.test(trimmed)) return trimmed;
      if (/^\+[0-9\s]+$/.test(trimmed)) return trimmed;
      
      if (/^[0-9\s\+\-\*\/\.\(\)\%]+$/.test(trimmed)) {
        try {
          var expr = trimmed.replace(/%/g, '/100');
          var result = new Function('return ' + expr)();
          if (typeof result === 'number' && !isNaN(result) && isFinite(result)) {
            return String(Math.round(result * 100) / 100);
          }
        } catch (e) {
          return trimmed;
        }
      }
      return trimmed;
    }

    function evaluateValueWithContext(rawVal, contextMap) {
      if (!rawVal) return "";
      var val = rawVal.trim();
      var lastBraceIndex = val.lastIndexOf('}}');
      if (lastBraceIndex > -1) {
        var tail = val.substring(lastBraceIndex + 2);
        var tailEquals = tail.indexOf('=');
        var tailColon = tail.indexOf(':');
        var stripIndex = -1;
        if (tailEquals > -1 && tailColon > -1) {
          stripIndex = Math.min(tailEquals, tailColon);
        } else if (tailEquals > -1) {
          stripIndex = tailEquals;
        } else if (tailColon > -1) {
          stripIndex = tailColon;
        }
        if (stripIndex > -1) {
          val = val.substring(0, lastBraceIndex + 2 + stripIndex).trim();
        }
      }
      
      if (val.indexOf('{{') > -1 && val.indexOf('}}') > -1) {
        var replaced = val.replace(/\{\{([^}]+)\}\}/g, function(match, keyInside) {
          var normalizedKey = keyInside.toLowerCase()
                                       .normalize("NFD")
                                       .replace(/[\u0300-\u036f]/g, "")
                                       .replace(/\s+/g, ' ')
                                       .trim();
          var resolvedVal = contextMap[normalizedKey];
          if (resolvedVal === undefined || resolvedVal === null) resolvedVal = "0";
          var cleanedNum = String(resolvedVal).replace(/[^0-9.,-]/g, '');
          if (cleanedNum.indexOf('.') > -1 && cleanedNum.indexOf(',') > -1) {
            cleanedNum = cleanedNum.replace(/\./g, '').replace(',', '.');
          } else if (cleanedNum.indexOf(',') > -1) {
            cleanedNum = cleanedNum.replace(',', '.');
          } else if (cleanedNum.indexOf('.') > -1) {
            var parts = cleanedNum.split('.');
            var lastPart = parts[parts.length - 1];
            if (lastPart.length === 3) {
              cleanedNum = cleanedNum.replace(/\./g, '');
            }
          }
          return cleanedNum || "0";
        });
        return evalFormulaIfNeeded(replaced);
      }
      return evalFormulaIfNeeded(val);
    }

    function getNumericFieldValue(fields, possibleKeys) {
      for (var i = 0; i < possibleKeys.length; i++) {
        var rawKey = possibleKeys[i];
        var cleanKey = rawKey.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
        var val = null;
        for (var k in fields) {
          if (fields.hasOwnProperty(k)) {
            var normK = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
            if (normK === cleanKey) {
              val = fields[k];
              break;
            }
          }
        }
        if (val !== undefined && val !== null) {
          var cleanVal = String(val).replace(/[^0-9.,-]/g, '');
          if (!cleanVal) continue;
          if (cleanVal.indexOf('.') > -1 && cleanVal.indexOf(',') > -1) {
            cleanVal = cleanVal.replace(/\./g, '').replace(',', '.');
          } else if (cleanVal.indexOf(',') > -1) {
            cleanVal = cleanVal.replace(',', '.');
          } else if (cleanVal.indexOf('.') > -1) {
            var parts = cleanVal.split('.');
            var lastPart = parts[parts.length - 1];
            if (lastPart.length === 3) {
              cleanVal = cleanVal.replace(/\./g, '');
            }
          }
          var parsedFloat = parseFloat(cleanVal);
          if (!isNaN(parsedFloat)) return parsedFloat;
        }
      }
      return null;
    }

    // --- CORRELATIVO DE PROFORMA ---
    function getAndUpdateProformaNumber(t, token) {
      var appKey = t.getRestApi().appKey;
      return t.lists('id', 'name').then(function(lists) {
        var paramList = lists.find(l => l.name.toUpperCase() === 'PARÁMETROS' || l.name.toUpperCase() === 'PARAMETROS');
        if (!paramList) throw new Error("No se encontró la lista 'PARÁMETROS'");

        return fetch(`https://api.trello.com/1/lists/${paramList.id}/cards?fields=name,desc&key=${appKey}&token=${token}`)
          .then(res => {
            if (!res.ok) throw new Error("Error al obtener tarjetas de PARÁMETROS");
            return res.json();
          })
          .then(cards => {
            var configCard = cards.find(c => c.name && (c.name.toLowerCase().includes('gestión de facturas') || c.name.toLowerCase().includes('gestion de facturas')));
            if (!configCard) throw new Error("No se encontró tarjeta 'Gestión de facturas'");
            
            var desc = configCard.desc || "";
            var lines = desc.split(/\r?\n/);
            var year = new Date().getFullYear();
            var seq = 0;
            var otherLines = [];
            
            lines.forEach(line => {
              var trimmed = line.trim();
              if (!trimmed) return;
              if (/año.*proforma/i.test(trimmed)) {
                var m = trimmed.match(/\d+/);
                if (m) year = parseInt(m[0], 10);
              } else if (/secuencial.*proforma/i.test(trimmed)) {
                var m = trimmed.match(/\d+/);
                if (m) seq = Math.max(seq, parseInt(m[0], 10));
              } else {
                otherLines.push(line);
              }
            });
            
            var nextSeq = seq + 1;
            var numProforma = year + "/" + nextSeq;
            var newDesc = ["Año de proforma: " + year, "Secuencial de proforma: " + nextSeq].concat(otherLines).join("\n");

            return fetch(`https://api.trello.com/1/cards/${configCard.id}?key=${appKey}&token=${token}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ desc: newDesc })
            }).then(res => {
              if (!res.ok) throw new Error("Error al actualizar secuencial de proforma");
              return numProforma;
            });
          });
      });
    }

    // --- ACCIÓN DE SUBIDA E IMPORTES ---
    function getOrCreateFacturasCard(t, idList, token) {
      var appKey = t.getRestApi().appKey;
      return fetch(`https://api.trello.com/1/lists/${idList}/cards?key=${appKey}&token=${token}`)
        .then(res => res.json())
        .then(cards => {
          var facturasCard = cards.find(c => {
            var n = c.name.trim().toLowerCase();
            return n === "facturas" || n === "facturación" || n === "facturacion";
          });
          if (facturasCard) return facturasCard.id;
          
          var newPos = 'top';
          if (cards.length > 1) newPos = (cards[0].pos + cards[1].pos) / 2;
          else if (cards.length === 1) newPos = cards[0].pos + 16384;
          
          return fetch(`https://api.trello.com/1/cards?idList=${idList}&name=Facturas&pos=${newPos}&key=${appKey}&token=${token}`, { method: 'POST' })
            .then(res => res.json())
            .then(newCard => newCard.id);
        });
    }

    // Función para actualizar la checklist "Relación de proformas"
    function updateProformasChecklistOnCard(t, targetCardId, token, today, numProforma, nombreCliente, dniCliente, proformaAmount, igicAmount, totalAmount, cobraAmount) {
      var appKey = t.getRestApi().appKey;
      var cleanNombre = (nombreCliente || "Cliente Desconocido").replace(/\|/g, " ");
      var cleanDni = (dniCliente || "___________").replace(/\|/g, " ");
      var cleanProforma = proformaAmount.replace(/\|/g, " ");
      var cleanIgic = igicAmount.replace(/\|/g, " ");
      var cleanTotal = totalAmount.replace(/\|/g, " ");
      var cleanCobra = cobraAmount.replace(/\|/g, " ");

      return fetch(`https://api.trello.com/1/cards/${targetCardId}/checklists?key=${appKey}&token=${token}`)
        .then(res => res.json())
        .then(checklists => {
          var targetChecklistName = "Relación de proformas";
          var ch = checklists.find(c => c.name.trim().toLowerCase() === targetChecklistName.toLowerCase());
          var newItemText = `${today} | Nº: ${numProforma} | ${cleanNombre} | DNI: ${cleanDni} | Importe: ${cleanProforma} | IGIC: ${cleanIgic} | Total: ${cleanTotal} | Cliente Cobra: ${cleanCobra} | MODO: T/T`;

          if (ch) {
            // Eliminar si ya existe un ítem con este número para evitar duplicados
            var item = ch.checkItems.find(i => i.name.indexOf(`Nº: ${numProforma}`) > -1 || i.name.indexOf(`Nº:  ${numProforma}`) > -1);
            if (item) {
              return fetch(`https://api.trello.com/1/checklists/${ch.id}/checkItems/${item.id}?key=${appKey}&token=${token}`, { method: 'DELETE' })
                .then(() => fetch(`https://api.trello.com/1/checklists/${ch.id}/checkItem?name=${encodeURIComponent(newItemText)}&pos=bottom&key=${appKey}&token=${token}`, { method: 'POST' }));
            } else {
              return fetch(`https://api.trello.com/1/checklists/${ch.id}/checkItem?name=${encodeURIComponent(newItemText)}&pos=bottom&key=${appKey}&token=${token}`, { method: 'POST' });
            }
          } else {
            // Crear checklist completa
            return fetch(`https://api.trello.com/1/cards/${targetCardId}/checklists?name=${encodeURIComponent(targetChecklistName)}&pos=bottom&key=${appKey}&token=${token}`, { method: 'POST' })
              .then(res => res.json())
              .then(newCh => {
                return fetch(`https://api.trello.com/1/checklists/${newCh.id}/checkItem?name=${encodeURIComponent(newItemText)}&pos=bottom&key=${appKey}&token=${token}`, { method: 'POST' });
              });
          }
        });
    }

    // Función para actualizar la tarjeta "Importes" de la lista correspondiente
    function updateProformasInImportesCard(t, token, checklistProformas) {
      return t.card('idList').then(function(currentCard) {
        return t.cards('id', 'name', 'desc', 'idList').then(function(cards) {
          var cardsInList = cards.filter(c => c.idList === currentCard.idList);
          var importesCard = cardsInList.find(c => c.name.toLowerCase().includes("importes"));
          if (!importesCard) return;

          var currentDesc = importesCard.desc || "";
          var lines = currentDesc.split(/\r?\n/);
          var prunedLines = [];

          // Filtrar líneas previas de proformas para reescribirlas limpias
          lines.forEach(function(line) {
            var sepIndex = line.indexOf(':');
            if (sepIndex === -1) sepIndex = line.indexOf('=');
            if (sepIndex > -1) {
              var key = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim();
              var keyClean = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
              
              if (/^importe proforma\s*\d*$/i.test(keyClean)) {
                return; // Excluir línea
              }
            }
            prunedLines.push(line);
          });

          // Insertar los nuevos secuenciales de proformas activas
          if (checklistProformas && checklistProformas.length > 0) {
            prunedLines.push(""); // Separador
            checklistProformas.forEach((item, index) => {
              var idx = index + 1;
              var suffix = (idx === 1) ? '' : ' ' + idx;
              prunedLines.push("**Importe Proforma" + suffix + "**: " + item.importe);
            });
          }

          // Limpiar saltos de línea repetidos al final
          var finalLines = [];
          prunedLines.forEach(function(line) {
            if (line.trim() === "") {
              if (finalLines.length > 0 && finalLines[finalLines.length - 1].trim() !== "") {
                finalLines.push("");
              }
            } else {
              finalLines.push(line);
            }
          });
          while (finalLines.length > 0 && finalLines[finalLines.length - 1].trim() === "") {
            finalLines.pop();
          }

          var finalDesc = finalLines.join('\n');
          var appKey = t.getRestApi().appKey;

          return fetch(`https://api.trello.com/1/cards/${importesCard.id}?key=${appKey}&token=${token}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ desc: finalDesc })
          });
        });
      });
    }

    // Función para actualizar la tarjeta "Historial de procesos"
    function updateHistoryCard(t, idList, isAction, checklistProformas) {
      return getUnifiedFields(t).then(function(data) {
        var unified = data.fields;
        return t.getRestApi().getToken().then(function(token) {
          if (!token) return;
          var appKey = t.getRestApi().appKey;
          var today = new Date().toLocaleDateString('es-ES');

          return fetch(`https://api.trello.com/1/lists/${idList}/cards?key=${appKey}&token=${token}`)
            .then(res => res.json())
            .then(cards => {
              var personalCard = cards.find(c => c.name.toLowerCase().includes("datos personales"));
              var historyCard = cards.find(c => c.name.toLowerCase().includes("historial de procesos") || c.name.toLowerCase().includes("historial de avisos"));
              
              var historyKeys = [
                { label: "**Fecha del sistema:**", prop: "fecha_sistema" },
                { label: "**Fecha última actuación sobre el expediente:**", prop: "fecha_ultima" },
                { label: "**Fecha cierre expediente:**", prop: "fecha_cierre" },
                { label: "**Fecha de resolución:**", prop: "fecha_resolucion" },
                { label: "**Fecha de comunicación designación:**", prop: "fecha_designa" },
                { label: "**Fecha de reclamación previa:**", prop: "fecha_reclamacion" },
                { label: "**Fecha creación de expediente:**", prop: "fecha_apertura" },
                { label: "**Fecha del siniestro:**", prop: "fecha" }
              ];

              if (historyCard) {
                var desc = historyCard.desc || "";
                var lines = desc.split('\n');
                var values = {};

                historyKeys.forEach(item => {
                  var regex = new RegExp(item.label.replace(/\*/g, '\\*') + "\\s*([^\\n]*)", "i");
                  var match = desc.match(regex);
                  values[item.prop] = match ? match[1].trim() : "___________";
                  if (values[item.prop] === "___________" && unified[item.prop] && unified[item.prop] !== "___________") {
                    values[item.prop] = unified[item.prop];
                  }
                });

                if (values.fecha_sistema !== today) values.fecha_sistema = today;
                if (isAction) values.fecha_ultima = today;
                if (unified.fecha !== "___________" && values.fecha !== unified.fecha) values.fecha = unified.fecha;
                if (personalCard && values.fecha_apertura === "___________") {
                  values.fecha_apertura = new Date(1000 * parseInt(personalCard.id.substring(0, 8), 16)).toLocaleDateString('es-ES');
                }
                
                var newDescLines = [];
                historyKeys.forEach(item => {
                  newDescLines.push(item.label + " " + values[item.prop]);
                });

                // Conservar líneas que no correspondan a proformas ni claves estándar
                lines.forEach(line => {
                  var lineLower = line.trim().toLowerCase();
                  if (lineLower.includes("proforma")) {
                    return; // Excluir antiguas para reescribir ordenado
                  }
                  var isKeyLine = historyKeys.some(item => {
                    var baseLabel = item.label.replace(/\*/g, '').replace(/:$/, '').trim().toLowerCase();
                    var variations = [baseLabel];
                    if (baseLabel.includes("creación de expediente")) variations.push("fecha apertura expediente");
                    if (baseLabel.includes("comunicación designación")) variations.push("fecha comunicación designa");
                    if (baseLabel.includes("siniestro")) variations.push("fecha siniestro");
                    return variations.some(v => lineLower.indexOf(v) === 0 || lineLower.includes(v));
                  });
                  if (!isKeyLine && line.trim() !== "") newDescLines.push(line);
                });

                // Añadir proformas de forma secuencial al Historial de procesos
                if (checklistProformas && checklistProformas.length > 0) {
                  newDescLines.push(""); // Separador
                  checklistProformas.forEach((item, index) => {
                    var idx = index + 1;
                    var suffix = (idx === 1) ? '' : idx;
                    newDescLines.push(`**Fecha de proforma${suffix}:** ${item.fecha}`);
                    newDescLines.push(`**Proforma${suffix}:** ${item.numero}`);
                    newDescLines.push(`**Importe proforma${suffix}:** ${item.importe}`);
                  });
                }

                var finalDesc = newDescLines.join('\n');
                return fetch(`https://api.trello.com/1/cards/${historyCard.id}?key=${appKey}&token=${token}`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ desc: finalDesc })
                });
              }
            });
        });
      });
    }

    // --- CARGAR DATOS CRUZADOS ---
    function isBillingFieldKey(key) {
      if (!key) return false;
      var norm = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
      return /^(factura|fechadefacturacion|fechafacturacion|importedefacturacion|importefacturacion|totaldefactura|totalfactura|totalfacturado|totaldefacturado|importefacturado|importedefacturado|clientecobrasumarizado|clientecobrasumarisado|proforma|fechadeproforma|fechaproforma|importedeproforma|importeproforma|totaldeproforma|totalproforma|totalproformado|totaldeproformado|importeproformado|importedeproformado)\d*$/i.test(norm);
    }

    function extractFields(desc) {
      var fields = {
        nombre: "Cliente Desconocido",
        dni: "___________",
        domicilio: "___________",
        telefono: "___________",
        profesion: "___________",
        observaciones: "___________",
        fecha: "___________",
        hora: "___________",
        lugar: "___________",
        ciudad: "___________",
        matricula1: "___________",
        aseguradora1: "___________",
        matricula2: "___________",
        aseguradora2: "___________",
        parrafada: "",
        fecha_sistema: "___________",
        fecha_ultima: "___________",
        fecha_cierre: "___________",
        fecha_facturacion: "___________",
        fecha_resolucion: "___________",
        fecha_designa: "___________",
        fecha_reclamacion: "___________",
        fecha_apertura: "___________",
        fecha_siniestro: "___________",
        factura: "___________"
      };

      if (!desc) return fields;

      var m;
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*NOMBRE Y APELLIDOS\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.nombre = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DNI\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.dni = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DOMICILIO\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.domicilio = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:TELÉFONO|Tel[eé]fono|Tlf|Tel)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.telefono = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*PROFESI[OÓ]N\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.profesion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*OBSERVACIONES\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.observaciones = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:FECHA DEL SINIESTRO|Fecha)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha = m[1].replace(/[*_~`]/g, '').replace(/\s*\(.*\)\s*$/, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:HORA)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.hora = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:LUGAR)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.lugar = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:CIUDAD)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.ciudad = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha del sistema\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_sistema = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha última actuación\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_ultima = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha cierre expediente\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_cierre = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha de resolución\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_resolucion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha de comunicación designa(?:ción)?\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_designa = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha(?: de)? reclamación previa\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_reclamacion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha (?:apertura|creación) de? expediente\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_apertura = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha siniestro\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_siniestro = m[1].replace(/[*_~`]/g, '').trim(); }

      var vehicleLookahead = "(?=\\n\\s*(?:VEH[ÍI]CULO CONTRARIO|VEH[ÍI]CULO PROPIO|PARRAFADA|NOMBRE|DNI|DOMICILIO|PROFESI[OÓ]N|TEL[EÉ]FONO|EMAIL|OBSERVACIONES)|$)";
      var propioMatch = desc.match(new RegExp("(?:^|\\n)[ \\t]*[^a-zA-Z0-9\\n\\r]*\\s*VEH[ÍI]CULO PROPIO[\\s\\S]*?" + vehicleLookahead, "i"));
      if (propioMatch) {
        var pText = propioMatch[0];
        if (m = pText.match(/(?:^|\n)[ \t]*[^a-zA-Z0-9\n\r]*\s*MATR[ÍI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula1 = m[1].replace(/[*_~`]/g, '').trim(); }
        if (m = pText.match(/(?:^|\n)[ \t]*[^a-zA-Z0-9\n\r]*\s*ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora1 = m[1].replace(/[*_~`]/g, '').trim(); }
      }
      var contrarioMatch = desc.match(new RegExp("(?:^|\\n)[ \\t]*[^a-zA-Z0-9\\n\\r]*\\s*VEH[ÍI]CULO CONTRARIO[\\s\\S]*?" + vehicleLookahead, "i"));
      if (contrarioMatch) {
        var cText = contrarioMatch[0];
        if (m = cText.match(/(?:^|\n)[ \t]*[^a-zA-Z0-9\n\r]*\s*MATR[ÍI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula2 = m[1].replace(/[*_~`]/g, '').trim(); }
        if (m = cText.match(/(?:^|\n)[ \t]*[^a-zA-Z0-9\n\r]*\s*ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora2 = m[1].replace(/[*_~`]/g, '').trim(); }
      }

      var parrafadaRegex = /PARRAFADA[^:]*[:\s-]+\s*/i;
      var startMatch = desc.match(parrafadaRegex);
      if (startMatch) {
        var startIdx = startMatch.index + startMatch[0].length;
        fields.parrafada = desc.substring(startIdx).trim();
      }

      return fields;
    }

    function normalizeListName(name) {
      if (!name) return "";
      return name.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ');
    }

    function getCrossBoardBillingData(t) {
      setStatus("Iniciando getCrossBoardBillingData...");
      return Promise.all([
        getUnifiedFields(t),
        t.getRestApi().getToken(),
        t.list('name'),
        t.board('id', 'name')
      ]).then(function (results) {
        var localData = results[0];
        var token = results[1];
        var currentListName = results[2].name;
        var currentBoard = results[3];
        var currentBoardName = currentBoard ? currentBoard.name : "";
        var fields = localData.fields;
        var appKey = t.getRestApi().appKey;

        setStatus("Búsqueda cruzada de tablero de Clientes...");
        if (!token) throw new Error('REQUIRED_AUTHORIZATION');

        var searchQuery = encodeURIComponent('name:"Tipo tablero"');
        return fetch(`https://api.trello.com/1/search?query=${searchQuery}&modelTypes=cards&card_fields=name,idBoard&key=${appKey}&token=${token}&cards_limit=100`)
          .then(res => res.json())
          .then(searchData => {
            var cards = searchData.cards || [];
            var clientCards = cards.filter(function(c) {
              var n = c.name.toUpperCase();
              return n.includes('TIPO TABLERO') && n.includes('CLIENTES');
            });
            if (clientCards.length === 0) throw new Error('No se encontró tableros de CLIENTES');
            var uniqueBoardIds = [];
            clientCards.forEach(c => { if (uniqueBoardIds.indexOf(c.idBoard) === -1) uniqueBoardIds.push(c.idBoard); });
            return uniqueBoardIds;
          })
          .then(idBoardsClientes => {
            setStatus("Obteniendo listas de tableros de Clientes (" + idBoardsClientes.length + ")...");
            var promises = idBoardsClientes.map(boardId => {
              return fetch(`https://api.trello.com/1/boards/${boardId}/lists?key=${appKey}&token=${token}`)
                .then(res => res.ok ? res.json() : [])
                .then(lists => {
                  var foundList = lists.find(l => normalizeListName(l.name) === normalizeListName(currentListName));
                  return foundList ? { listId: foundList.id, boardId: boardId } : null;
                });
            });
            return Promise.all(promises).then(res => {
              var matches = res.filter(r => r !== null);
              if (matches.length === 0) return null;
              if (matches.length === 1) return matches[0];
              
              var rankingPromises = matches.map(match => {
                return fetch(`https://api.trello.com/1/boards/${match.boardId}?fields=name&key=${appKey}&token=${token}`)
                  .then(r => r.json())
                  .then(b => {
                    return { match: match, boardName: b.name };
                  })
                  .catch(() => {
                    return { match: match, boardName: "" };
                  });
              });
              
              return Promise.all(rankingPromises).then(ranked => {
                var bestMatch = null;
                var bestScore = -1;
                ranked.forEach(item => {
                  var score = 0;
                  var bNameUpper = item.boardName.toUpperCase();
                  var curNameUpper = currentBoardName.toUpperCase();
                  var wordsCur = curNameUpper.replace(/FACTURACION|FACTURACIÓN/g, '').split(/\s+/).filter(Boolean);
                  var wordsCand = bNameUpper.replace(/CLIENTES/g, '').split(/\s+/).filter(Boolean);
                  var commonWords = wordsCur.filter(w => wordsCand.indexOf(w) > -1);
                  score = commonWords.length;
                  if (bNameUpper.includes("CLIENTES")) {
                    score += 1;
                  }
                  if (score > bestScore) {
                    bestScore = score;
                    bestMatch = item.match;
                  }
                });
                return bestMatch || matches[0];
              });
            });
          })
          .then(match => {
            if (!match) throw new Error('No se encontró lista coincidente en Clientes.');
            setStatus("Obteniendo tarjetas de la lista en Clientes...");
            return fetch(`https://api.trello.com/1/lists/${match.listId}/cards?fields=name,desc&key=${appKey}&token=${token}`)
              .then(res => res.json())
              .then(clientCards => {
                setStatus("Unificando datos de tarjetas del cliente...");
                var clientFields = { nombre: "___________", dni: "___________", domicilio: "___________", fecha_apertura: "___________" };
                var found = { nombre: false, dni: false, domicilio: false, fecha_apertura: false };
                var cards = clientCards || [];
                cards.sort((a,b) => (b.name.toLowerCase().includes("datos personales") ? 100 : 0) - (a.name.toLowerCase().includes("datos personales") ? 100 : 0));
                
                cards.forEach(card => {
                  var parsed = extractFields(card.desc);
                  if (!found.nombre && parsed.nombre !== "Cliente Desconocido") { clientFields.nombre = parsed.nombre; found.nombre = true; }
                  if (!found.dni && parsed.dni !== "___________") { clientFields.dni = parsed.dni; found.dni = true; }
                  if (!found.domicilio && parsed.domicilio !== "___________") { clientFields.domicilio = parsed.domicilio; found.domicilio = true; }
                  if (!found.fecha_apertura && parsed.fecha_apertura !== "___________") { clientFields.fecha_apertura = parsed.fecha_apertura; found.fecha_apertura = true; }
                });

                var clientImportesCard = cards.find(c => c.name.toLowerCase().includes("importes"));
                var clientImportesFields = {};
                if (clientImportesCard && clientImportesCard.desc) {
                  setStatus("Parseando tarjeta Importes cruzada...");
                  var lines = clientImportesCard.desc.split('\n');
                  var rawMap = {};
                  var parsedPairs = [];
                  lines.forEach(line => {
                    line = line.trim();
                    if (!line) return;
                    var sepIndex = line.indexOf(':');
                    if (sepIndex === -1) sepIndex = line.indexOf('=');
                    if (sepIndex > -1) {
                      var k = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim();
                      var v = line.substring(sepIndex + 1).replace(/[*_~`#]/g, '').trim();
                      if (k) {
                        parsedPairs.push({ key: k, val: v });
                        var normK = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
                        rawMap[normK] = v;
                      }
                    }
                  });
                  parsedPairs.forEach(pair => {
                    var calculatedV = evaluateValueWithContext(pair.val, rawMap);
                    clientImportesFields[pair.key] = calculatedV;
                    clientImportesFields[pair.key.toLowerCase()] = calculatedV;
                    var normK = pair.key.replace(/:/g, ' ').replace(/\s+/g, ' ').trim();
                    clientImportesFields[normK] = calculatedV;
                    clientImportesFields[normK.toLowerCase()] = calculatedV;
                  });
                }

                var combinedFields = {};
                for (var key in fields) combinedFields[key] = fields[key];
                for (var key in clientImportesFields) {
                  if (!isBillingFieldKey(key)) {
                    combinedFields[key] = clientImportesFields[key];
                  }
                }
                combinedFields.nombre = clientFields.nombre;
                combinedFields.dni = clientFields.dni;
                combinedFields.domicilio = clientFields.domicilio;
                combinedFields.fecha_apertura = clientFields.fecha_apertura;

                setStatus("Datos cruzados obtenidos con éxito.");
                return {
                  fields: combinedFields,
                  token: token,
                  idList: match.listId,
                  idListClientes: match.listId
                };
              });
          });
      });
    }

    // --- PARSEAR CHECKLISTS A OBJETO UNIFICADO ---
    function parseChecklistsToUnified(checklists, unified) {
      var ch = checklists.find(function(c) {
        var n = c.name.trim().toLowerCase();
        return n === "relación de facturas generadas" || 
               n === "relacion de facturas generadas" || 
               n === "relaación de facturas generadas" || 
               n === "relaacion de facturas generadas" ||
               n.indexOf("relación de facturas") > -1 ||
               n.indexOf("relacion de facturas") > -1 ||
               n.indexOf("relaación de facturas") > -1;
      });
      if (ch && ch.checkItems && ch.checkItems.length > 0) {
        unified._hasChecklistInvoices = true;
        unified.factura = "___________";
        unified.fecha_facturacion = "___________";
        unified.importe_facturacion = "___________";
        unified.total_factura = "___________";
        unified.total_facturado = "___________";
        unified.importe_facturado = "___________";
        for (var s = 2; s <= 10; s++) {
          delete unified["factura" + s];
          delete unified["fecha_facturacion" + s];
          delete unified["importe_facturacion" + s];
          delete unified["total_factura" + s];
        }
        var checkItems = ch.checkItems.concat().sort(function(a, b) { return a.pos - b.pos; });
        checkItems.forEach(function(item, index) {
          var idx = index + 1;
          var suffix = (idx === 1) ? '' : idx;
          var parts = item.name.split('|').map(function(s) { return s.trim(); });
          if (parts.length >= 2) {
            var fDate = parts[0] || "___________";
            var fNum = "___________";
            var numPart = parts.find(function(p) { return /^(?:N[º°o]:|N[º°o]\s*:|Factura:|Num:)/i.test(p); });
            if (numPart) {
              fNum = numPart.replace(/^(?:N[º°o]:|N[º°o]\s*:|Factura:|Num:)\s*/i, '').trim();
            } else {
              fNum = parts[1] || "___________";
            }
            var fAmount = "___________";
            var basePart = parts.find(function(p) { return /^(?:Base:|Importe:)/i.test(p); });
            if (basePart) {
              fAmount = basePart.replace(/^(?:Base:|Importe:)\s*/i, '').trim();
            } else {
              fAmount = parts[parts.length - 1] || "___________";
            }
            var fTotal = "___________";
            var totalPart = parts.find(function(p) { return /^(?:Total:)/i.test(p); });
            if (totalPart) {
              fTotal = totalPart.replace(/^(?:Total:)\s*/i, '').trim();
            } else {
              fTotal = fAmount;
            }
            unified["factura" + suffix] = fNum;
            unified["fecha_facturacion" + suffix] = fDate;
            unified["importe_facturacion" + suffix] = fAmount;
            unified["total_factura" + suffix] = fTotal;
            if (idx === 1) {
              unified.factura = fNum;
              unified.fecha_facturacion = fDate;
              unified.importe_facturacion = fAmount;
              unified.importe_facturado = fAmount;
              unified.total_factura = fTotal;
              unified.total_facturado = fTotal;
              unified["total factura"] = fTotal;
            }
          }
        });
      } else {
        unified._hasChecklistInvoices = false;
        unified.factura = "___________";
        unified.fecha_facturacion = "___________";
        unified.importe_facturacion = "___________";
        unified.total_factura = "___________";
        unified.total_facturado = "___________";
        unified.importe_facturado = "___________";
        for (var s = 2; s <= 10; s++) {
          delete unified["factura" + s];
          delete unified["fecha_facturacion" + s];
          delete unified["importe_facturacion" + s];
          delete unified["total_factura" + s];
        }
      }

      // PARSEAR PROFORMAS
      var chProformas = checklists.find(function(c) {
        var n = c.name.trim().toLowerCase();
        return n === "relación de proformas" || n === "relacion de proformas";
      });
      if (chProformas && chProformas.checkItems && chProformas.checkItems.length > 0) {
        unified._hasChecklistProformas = true;
        unified.proforma = "___________";
        unified.fecha_proforma = "___________";
        unified.importe_proforma = "___________";
        unified.igic_proforma = "___________";
        unified.total_proforma = "___________";
        unified.cliente_cobra_proforma = "___________";
        for (var s = 2; s <= 10; s++) {
          delete unified["proforma" + s];
          delete unified["fecha_proforma" + s];
          delete unified["importe_proforma" + s];
          delete unified["igic_proforma" + s];
          delete unified["total_proforma" + s];
          delete unified["cliente_cobra_proforma" + s];
        }
        var checkItemsProformas = chProformas.checkItems.concat().sort(function(a, b) {

                fTotal = totalPart.replace(/^(?:Total:)\s*/i, '').trim();
              }
              
              var fCobra = "___________";
              var cobraPart = parts.find(p => /^(?:Cliente Cobra:)/i.test(p));
              if (cobraPart) {
                fCobra = cobraPart.replace(/^(?:Cliente Cobra:)\s*/i, '').trim();
              }
              
              itemsParsed.push({ fecha: fDate, numero: fNum, importe: fAmount, igic: fIgic, total: fTotal, cobra: fCobra });
            }
          });
          return itemsParsed;
        })
        .catch(() => []);
    }

    // --- INICIALIZAR Y EVENT LISTENERS ---
    t.render(function() {
      if (cachedData) {
        t.sizeTo(document.body).done();
        return;
      }
      cachedData = true;

      setStatus("Obteniendo datos del tablero...");

      t.getRestApi().isAuthorized().then(function(auth) {
        if (!auth) {
          setStatus('Por favor, <a href="#" id="auth-link" style="color: #de350b; font-weight: bold; text-decoration: underline;">autoriza la API primero 🔑</a> para poder generar proformas.', true);
          document.getElementById('auth-link').addEventListener('click', function(e) {
            e.preventDefault();
            t.getRestApi().authorize({ scope: 'read,write', expiration: 'never', return_url: window.location.href })
              .then(function(token) { if (token) window.location.reload(); })
              .catch(err => console.error("Error al autorizar:", err));
          });
          return;
        }
        
        getUnifiedFields(t).then(function(data) {
          setStatus("Listo para generar proforma.");
          t.sizeTo(document.body).done();
        });
      });
    });

    document.getElementById('btn-cancelar').addEventListener('click', function() {
      t.closeModal();
    });

    // Acción principal
    document.getElementById('btn-proforma').addEventListener('click', function(e) {
      e.preventDefault();
      var inputCobra = document.getElementById('cliente-cobra-input').value.trim();
      var inputProforma = document.getElementById('importe-proforma').value.trim();

      if (!inputCobra || !inputProforma) {
        return t.alert({ message: 'Por favor, introduce el importe del Cliente Cobra y de la Proforma.', duration: 5, display: 'warning' });
      }

      document.getElementById('proforma-upload').click();
    });

    document.getElementById('proforma-upload').addEventListener('change', function(event) {
      if (!event.target.files || event.target.files.length === 0) return;
      var file = event.target.files[0];
      
      setStatus('Obteniendo datos del expediente...');

      var inputCobra = document.getElementById('cliente-cobra-input').value.trim();
      var inputProforma = document.getElementById('importe-proforma').value.trim();
      var valCobra = parseSpanishFloat(inputCobra);
      var valProforma = parseSpanishFloat(inputProforma);

      getCrossBoardBillingData(t).then(function(data) {
        var fields = data.fields;
        var token = data.token;

        setStatus('Generando correlativo de proforma...');

        return getAndUpdateProformaNumber(t, token).then(function(numProforma) {
          var today = new Date().toLocaleDateString('es-ES');
          
          fields.proforma = numProforma;
          fields.fecha_proforma = today;
          fields.importe_proforma = formatSpanishCurrency(valProforma);
          fields.cliente_cobra_proforma = formatSpanishCurrency(valCobra);
          
          var taxPct = getTaxPercentage(fields);
          var valIgic = valProforma * (taxPct / 100);
          var valTotal = valProforma + valIgic;
          
          fields.igic_proforma = formatSpanishCurrency(valIgic);
          fields.total_proforma = formatSpanishCurrency(valTotal);
          
          // Compatibilidad exacta con placeholders en Excel
          fields["Importe Proforma"] = formatSpanishCurrency(valProforma);
          fields["Importe de proforma"] = formatSpanishCurrency(valProforma);
          fields["Importe_proforma"] = formatSpanishCurrency(valProforma);
          
          fields["Cliente Cobra"] = formatSpanishCurrency(valCobra);
          fields["Cliente_cobra"] = formatSpanishCurrency(valCobra);
          
          fields["Igic Proforma"] = formatSpanishCurrency(valIgic);
          fields["Igic_proforma"] = formatSpanishCurrency(valIgic);
          fields["Total Proforma"] = formatSpanishCurrency(valTotal);
          fields["Total_proforma"] = formatSpanishCurrency(valTotal);
          
          fields["Número de proforma"] = numProforma;
          fields["Número proforma"] = numProforma;
          fields["número de proforma"] = numProforma;
          fields["número proforma"] = numProforma;
          fields["fecha proforma"] = today;

          setStatus('Procesando plantilla Excel de proforma...');

          var reader = new FileReader();
          reader.onload = async function (e) {
            try {
              var workbook = new ExcelJS.Workbook();
              await workbook.xlsx.load(e.target.result);
              workbook.eachSheet(function (worksheet) {
                worksheet.eachRow(function (row) {
                  row.eachCell(function (cell) {
                    if (cell.value) {
                      if (cell.value.richText) {
                        cell.value.richText.forEach(function (rt) {
                          if (rt.text) rt.text = replaceExcelPlaceholders(rt.text, fields, false);
                        });
                      } else if (typeof cell.value === 'string') {
                        var originalVal = cell.value.trim();
                        var replaced = replaceExcelPlaceholders(cell.value, fields, false);
                        
                        var isSinglePlaceholder = originalVal.startsWith('{{') && originalVal.endsWith('}}');
                        if (isSinglePlaceholder) {
                          var cleanNum = replaced.replace(/[^\d.,-]/g, '').trim();
                          if (cleanNum) {
                            var checkVal = cleanNum;
                            if (checkVal.indexOf(',') > -1) {
                              checkVal = checkVal.replace(/\./g, '').replace(',', '.');
                            }
                            var num = parseFloat(checkVal);
                            var expectedReplaced = replaced.replace(/[\s€]/g, '').trim();
                            if (!isNaN(num) && cleanNum === expectedReplaced) {
                              cell.value = num;
                            } else {
                              cell.value = replaced;
                            }
                          } else {
                            cell.value = replaced;
                          }
                        } else {
                          cell.value = replaced;
                        }
                      }
                    }
                  });
                });
              });

              var buffer = await workbook.xlsx.writeBuffer();
              var outContent = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
              var baseTemplateName = file.name.substring(0, file.name.lastIndexOf('.'));
              var cleanProformaNum = numProforma.replace(/\//g, "-");
              var nombreFinal = baseTemplateName + "_" + fields.nombre.replace(/\s+/g, '_') + "_" + cleanProformaNum + ".xlsx";

              setStatus('Obteniendo tarjeta de Facturas...');

              getOrCreateFacturasCard(t, fields.idList, token)
                .then(function(targetCardId) {
                  setStatus('Subiendo Proforma a Trello...');

                  var formData = new FormData();
                  formData.append("key", t.getRestApi().appKey);
                  formData.append("token", token);
                  formData.append("file", outContent, nombreFinal);
                  formData.append("name", nombreFinal);

                  var urlParams = new URLSearchParams();
                  urlParams.append('key', t.getRestApi().appKey);
                  urlParams.append('token', token);

                  return fetch(`https://api.trello.com/1/cards/${targetCardId}/attachments?${urlParams.toString()}`, { method: 'POST', body: formData })
                    .then(res => {
                      if (!res.ok) throw new Error('Error al adjuntar el archivo.');
                      return targetCardId;
                    });
                })
                .then(function(targetCardId) {
                  setStatus('Actualizando checklist "Relación de proformas"...');
                  var formattedProforma = formatSpanishCurrency(valProforma);
                  var formattedIgic = formatSpanishCurrency(valIgic);
                  var formattedTotal = formatSpanishCurrency(valTotal);
                  var formattedCobra = formatSpanishCurrency(valCobra);
                  return updateProformasChecklistOnCard(t, targetCardId, token, today, numProforma, fields.nombre, fields.dni, formattedProforma, formattedIgic, formattedTotal, formattedCobra)
                    .then(() => targetCardId);
                })
                .then(function(targetCardId) {
                  setStatus('Actualizando tarjeta "Importes"...');
                  return getChecklistProformas(t, targetCardId, token)
                    .then(checklistProformas => {
                      return updateProformasInImportesCard(t, token, checklistProformas)
                        .then(() => checklistProformas);
                    });
                })
                .then(function(checklistProformas) {
                  setStatus('Actualizando Historial de procesos...');
                  var targetHistoryListId = fields.idListClientes || fields.idList;
                  return updateHistoryCard(t, targetHistoryListId, true, checklistProformas);
                })
                .then(function() {
                  // Guardar el archivo generado localmente en el navegador también
                  window.saveAs(outContent, nombreFinal);
                  
                  setStatus('¡Proforma completada con éxito!');
                  t.alert({ message: 'Proforma generada y adjuntada correctamente.', duration: 4, display: 'success' });
                  setTimeout(() => t.closeModal(), 1500);
                });

            } catch (err) {
              console.error(err);
              setStatus('Error al procesar el Excel: ' + err.message, true);
            }
          };
          reader.readAsArrayBuffer(file);
        });
      }).catch(err => {
        console.error(err);
        setStatus('Error: ' + err.message, true);
      });
    });
  </script>
</body>
</html>
