<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Antigravity Section</title>
  <!-- La librería de Trello es obligatoria en CADA iframe del Power-Up -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <!-- Librería para manipular archivos ZIP/DOCX en el navegador -->
  <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
  <!-- Librería para manipular archivos Excel en el navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <!-- Librería para forzar la descarga de archivos locales -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    /* Estilos básicos para que parezca una parte nativa de Trello */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      /* Removing padding from body helps Trello calculate height exactly */
      background-color: transparent;
      /* Trello gestiona el fondo (modo claro/oscuro) */
      color: #172b4d;
    }

    .antigravity-container {
      border: 1px solid #dfe1e6;
      border-radius: 3px;
      padding: 15px;
      background-color: #f4f5f7;
      text-align: center;
      box-sizing: border-box;
      /* Previene que el padding desborde el iframe */
    }

    button,
    .btn-upload {
      background-color: #0079bf;
      color: white;
      border: none;
      padding: 8px 16px;
      margin: 5px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
      display: inline-block;
      font-size: 14px;
    }

    button:hover,
    .btn-upload:hover {
      background-color: #026aa7;
    }

    button.secondary {
      background-color: #091e420f;
      color: #172b4d;
    }

    button.secondary:hover {
      background-color: #091e4224;
    }

    /* Estilos para ocultar el input real y mostrar un botón bonito */
    input[type="file"] {
      display: none;
    }

    #descripcion-container {
      margin-top: 15px;
      padding: 10px;
      border: 1px dashed #0079bf;
      border-radius: 3px;
      background: white;
      text-align: left;
      display: none;
      /* Oculto inicialmente */
      white-space: pre-wrap;
      /* Mantiene los saltos de línea del texto */
    }

    .status-msg {
      margin-top: 10px;
      font-size: 13px;
      color: #5e6c84;
    }
  </style>
</head>

<body>
  <div id="main-content">
    <!-- Seccion de CLIENTES: Visible por defecto -->
    <div id="clientes-section" style="display: block;">
      <p>Aquí vamos a ir poniendo los botones:</p>
      <div>
    <button id="boton-desc" class="secondary">Visualizar datos de interés</button>

    <!-- Nuevo botón para procesar Word -->
    <label class="btn-upload">
      Generar word desde plantilla
      <input type="file" id="word-upload" accept=".docx" />
    </label>

    </div>
  </div>

    <div id="planning-section" style="display: none;">
      <p>Panel de Planning (Próximamente)</p>
    </div>

    <div id="facturacion-section" style="display: none;">
      <p>Panel de Facturación:</p>
      <div>
        <label class="btn-upload" style="background-color: #1f845a;">
          Generar excel desde plantilla
          <input type="file" id="excel-upload" accept=".xlsx" />
        </label>
      </div>
    </div>

    <div id="unknown-section" style="display: none;">
      <p style="color: #626f84; font-style: italic;">
        Configura el tipo de tablero en la lista "PARÁMETROS" > tarjeta "Tipo tablero" (CLIENTES, PLANNING o FACTURACIÓN).
      </p>
    </div>

    <div id="upload-status" class="status-msg"></div>

    <!-- Aquí aparecerá el texto de la descripción -->
    <div id="descripcion-container"></div>
  </div>
</div>

  <script>
    // Inicializamos este iframe con Trello indicándole nuestra App Key para poder usar la API
    var t = window.TrelloPowerUp.iframe({
      appKey: '30767998cbb7b57a692e8bb50cfa9a9c',
      appName: 'Antigravity'
    });

    // Función auxiliar para extraer campos de la descripción de la tarjeta
    function extractFields(desc) {
      var fields = {
        nombre: "Cliente Desconocido",
        dni: "___________",
        domicilio: "___________",
        telefono: "___________",
        profesion: "___________",
        observaciones: "___________",
        fecha: "___________",
        hora: "___________",
        lugar: "___________",
        ciudad: "___________",
        matricula1: "___________",
        aseguradora1: "___________",
        matricula2: "___________",
        aseguradora2: "___________",
        parrafada: "",
        fecha_sistema: "___________",
        fecha_ultima: "___________",
        fecha_cierre: "___________",
        fecha_facturacion: "___________",
        fecha_resolucion: "___________",
        fecha_designa: "___________",
        fecha_reclamacion: "___________",
        fecha_apertura: "___________",
        fecha_siniestro: "___________"
      };

      if (!desc) return fields;

      var m;
      // Regex para campos de una sola línea (Priorizamos Nombre y Apellidos completo)
      // Buscamos "NOMBRE Y APELLIDOS", permitiendo símbolos de formato (negritas, etc) antes y después
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*NOMBRE Y APELLIDOS\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) {
          fields.nombre = m[1].replace(/[*_~`]/g, '').trim();
      }
      
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DNI\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.dni = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DOMICILIO\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.domicilio = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:TELÉFONO|Tel[eé]fono|Tlf|Tel)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.telefono = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*PROFESI[OÓ]N\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.profesion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*OBSERVACIONES\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.observaciones = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:FECHA DEL SINIESTRO|Fecha)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha = m[1].replace(/[*_~`]/g, '').replace(/\s*\(.*\)\s*$/, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:HORA)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.hora = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:LUGAR)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.lugar = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:CIUDAD)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.ciudad = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha del sistema\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_sistema = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha última actuación\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_ultima = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha cierre expediente\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_cierre = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha(?: de)? facturación\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_facturacion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha de resolución\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_resolucion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha de comunicación designa(?:ción)?\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_designa = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha(?: de)? reclamación previa\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_reclamacion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha (?:apertura|creación) de? expediente\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_apertura = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha siniestro\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_siniestro = m[1].replace(/[*_~`]/g, '').trim(); }

      // --- EXTRACCIÓN CONTEXTUAL DE VEHÍCULOS ---
      var vehicleLookahead = "(?=\\n\\s*(?:VEH[ÍI]CULO CONTRARIO|VEH[ÍI]CULO PROPIO|PARRAFADA|NOMBRE|DNI|DOMICILIO|PROFESI[OÓ]N|TEL[EÉ]FONO|EMAIL|OBSERVACIONES)|$)";
      
      var propioMatch = desc.match(new RegExp("(?:^|\\n)[ \\t]*[*_~`#]*\\s*VEH[ÍI]CULO PROPIO[\\s\\S]*?" + vehicleLookahead, "i"));
      if (propioMatch) {
        var pText = propioMatch[0];
        if (m = pText.match(/(?:^|\n)[ \t]*MATR[ÍI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula1 = m[1].trim(); }
        if (m = pText.match(/(?:^|\n)[ \t]*ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora1 = m[1].trim(); }
      }

      var contrarioMatch = desc.match(new RegExp("(?:^|\\n)[ \\t]*[*_~`#]*\\s*VEH[ÍI]CULO CONTRARIO[\\s\\S]*?" + vehicleLookahead, "i"));
      if (contrarioMatch) {
        var cText = contrarioMatch[0];
        if (m = cText.match(/(?:^|\n)[ \t]*MATR[ÍI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula2 = m[1].trim(); }
        if (m = cText.match(/(?:^|\n)[ \t]*ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora2 = m[1].trim(); }
      }

      // Extracción multilínea para PARRAFADA (más robusta: busca el siguiente encabezado manualmente)
      var parrafadaRegex = /PARRAFADA[^:]*[:\s-]+\s*/i;
      var startMatch = desc.match(parrafadaRegex);
      if (startMatch) {
        var startIndex = startMatch.index + startMatch[0].length;
        var remainingDesc = desc.substring(startIndex);

        // Definimos qué consideramos un "corte" (el inicio del siguiente campo)
        var nextHeaderIndex = remainingDesc.length;

        // A. Buscar por palabras clave conocidas (al inicio de una línea)
        var keywords = ["NOMBRE", "DNI", "DOMICILIO", "TELÉFONO", "TELEFONO", "TLF", "PROFESI[ÓO]N", "OBSERVACIONES", "FECHA", "HORA", "LUGAR", "CIUDAD"];
        keywords.forEach(function (key) {
          var regex = new RegExp("\\n\\s*[*_~`#]*\\s*" + key, "i");
          var match = remainingDesc.match(regex);
          if (match && match.index < nextHeaderIndex) {
            nextHeaderIndex = match.index;
          }
        });

        // B. Buscar por un patrón genérico de "ENCABEZADO EN MAYÚSCULAS Y DOS PUNTOS"
        var genericMatch = remainingDesc.match(/\n\s*[*_~`#]*\s*[A-ZÁÉÍÓÚÑ ]{3,}\s*[:]/);
        if (genericMatch && genericMatch.index < nextHeaderIndex) {
          nextHeaderIndex = genericMatch.index;
        }

        // C. Buscar por líneas separadoras (------, =====, etc)
        var separatorMatch = remainingDesc.match(/\n\s*[-=_]{3,}/);
        if (separatorMatch && separatorMatch.index < nextHeaderIndex) {
          nextHeaderIndex = separatorMatch.index;
        }

        fields.parrafada = remainingDesc.substring(0, nextHeaderIndex).replace(/[*_~`]/g, '').trim();
      }

      return fields;
    }

    // Función para obtener datos unificados de toda la lista
    function getUnifiedFields(t) {
      return t.card('id', 'idList').then(function (currentCard) {
        var idList = currentCard.idList;
        var currentCardId = currentCard.id;
        return Promise.all([
          t.cards('id', 'name', 'desc', 'idList'),
          t.lists('all')
        ]).then(function (results) {
          var allCards = results[0];
          var allLists = results[1];
          var currentList = allLists.find(function(l) { return l.id === idList; });
          var listName = currentList ? currentList.name : "___________";
          
          // Extraemos solo el número/formato del expediente del nombre de la lista
          var numExpediente = "___________";
          if (listName !== "___________") {
            // Buscamos el literal después de exp, exped, expediente... que tenga números y barras
            var match = listName.match(/(?:expediente|exped|exp)\.?\s*([\d\/\-\.]+)/i);
            if (match) {
              numExpediente = match[1].trim();
            } else {
              // Si no hay prefijo, buscamos cualquier patrón que parezca un expediente (números y barra)
              var directMatch = listName.match(/(\d+[\/\-][\d\/\-\.]+)/);
              numExpediente = directMatch ? directMatch[1] : listName;
            }
          }

          var cardsInList = allCards.filter(function (c) { return c.idList === idList; });
          var unified = {
            nombre: "Cliente Desconocido",
            dni: "___________",
            domicilio: "___________",
            telefono: "___________",
            profesion: "___________",
            observaciones: "___________",
            fecha: "___________",
            hora: "___________",
            lugar: "___________",
            ciudad: "___________",
            matricula1: "___________",
            aseguradora1: "___________",
            matricula2: "___________",
            aseguradora2: "___________",
            parrafada: "",
            fecha_sistema: new Date().toLocaleDateString('es-ES'),
            fecha_ultima: new Date().toLocaleDateString('es-ES'),
            fecha_cierre: "___________",
            fecha_facturacion: "___________",
            fecha_resolucion: "___________",
            fecha_designa: "___________",
            fecha_reclamacion: "___________",
            fecha_apertura: "___________",
            fecha_siniestro: "___________",
            num_expediente: numExpediente,
            dds: "___",
            mess: "_________",
            aaaas: "____"
          };

          var found = { nombre: false, dni: false, domicilio: false, telefono: false, profesion: false, observaciones: false, fecha: false, hora: false, lugar: false, ciudad: false, matricula1: false, aseguradora1: false, matricula2: false, aseguradora2: false, fecha_sistema: false, fecha_ultima: false, fecha_cierre: false, fecha_facturacion: false, fecha_resolucion: false, fecha_designa: false, fecha_reclamacion: false, fecha_apertura: false, fecha_siniestro: false };
          var targetCardId = null;
          var maxScore = -1;

          cardsInList.forEach(function (card) {
            var fields = extractFields(card.desc);
            
            // Sistema de puntuación para identificar la tarjeta principal de datos personales
            var score = 0;
            // Prioridad máxima: el título de la tarjeta contiene "datos personales"
            if (card.name.toLowerCase().includes("datos personales")) score += 100;
            
            if (fields.nombre !== "Cliente Desconocido" && fields.nombre.replace(/[_\s]+/g, '').length > 2) score += 10;
            if (fields.dni !== "___________" && fields.dni.replace(/[_\s]+/g, '').length > 2) score += 5;
            if (fields.telefono !== "___________" && fields.telefono.replace(/[_\s]+/g, '').length > 2) score += 3;
            if (fields.domicilio !== "___________") score += 1;
            if (fields.profesion !== "___________") score += 1;

            if (score > maxScore) {
              maxScore = score;
              targetCardId = card.id;
            }

            if (!found.nombre && fields.nombre !== "Cliente Desconocido") { unified.nombre = fields.nombre; found.nombre = true; }
            if (!found.dni && fields.dni !== "___________") { unified.dni = fields.dni; found.dni = true; }
            if (!found.domicilio && fields.domicilio !== "___________") { unified.domicilio = fields.domicilio; found.domicilio = true; }
            if (!found.telefono && fields.telefono !== "___________") { unified.telefono = fields.telefono; found.telefono = true; }
            if (!found.profesion && fields.profesion !== "___________") { unified.profesion = fields.profesion; found.profesion = true; }
            if (!found.observaciones && fields.observaciones !== "___________") { unified.observaciones = fields.observaciones; found.observaciones = true; }
            if (!found.fecha && fields.fecha !== "___________") { unified.fecha = fields.fecha; found.fecha = true; }
            if (!found.hora && fields.hora !== "___________") { unified.hora = fields.hora; found.hora = true; }
            if (!found.lugar && fields.lugar !== "___________") { unified.lugar = fields.lugar; found.lugar = true; }
            if (!found.ciudad && fields.ciudad !== "___________") { unified.ciudad = fields.ciudad; found.ciudad = true; }
            if (!found.matricula1 && fields.matricula1 !== "___________") { unified.matricula1 = fields.matricula1; found.matricula1 = true; }
            if (!found.aseguradora1 && fields.aseguradora1 !== "___________") { unified.aseguradora1 = fields.aseguradora1; found.aseguradora1 = true; }
            if (!found.matricula2 && fields.matricula2 !== "___________") { unified.matricula2 = fields.matricula2; found.matricula2 = true; }
            if (!found.aseguradora2 && fields.aseguradora2 !== "___________") { unified.aseguradora2 = fields.aseguradora2; found.aseguradora2 = true; }
            if (!found.fecha_sistema && fields.fecha_sistema !== "___________") { unified.fecha_sistema = fields.fecha_sistema; found.fecha_sistema = true; }
            if (!found.fecha_ultima && fields.fecha_ultima !== "___________") { unified.fecha_ultima = fields.fecha_ultima; found.fecha_ultima = true; }
            if (!found.fecha_cierre && fields.fecha_cierre !== "___________") { unified.fecha_cierre = fields.fecha_cierre; found.fecha_cierre = true; }
            if (!found.fecha_facturacion && fields.fecha_facturacion !== "___________") { unified.fecha_facturacion = fields.fecha_facturacion; found.fecha_facturacion = true; }
            if (!found.fecha_resolucion && fields.fecha_resolucion !== "___________") { unified.fecha_resolucion = fields.fecha_resolucion; found.fecha_resolucion = true; }
            if (!found.fecha_designa && fields.fecha_designa !== "___________") { unified.fecha_designa = fields.fecha_designa; found.fecha_designa = true; }
            if (!found.fecha_reclamacion && fields.fecha_reclamacion !== "___________") { unified.fecha_reclamacion = fields.fecha_reclamacion; found.fecha_reclamacion = true; }
            if (!found.fecha_apertura && fields.fecha_apertura !== "___________") { unified.fecha_apertura = fields.fecha_apertura; found.fecha_apertura = true; }
            if (!found.fecha_siniestro && fields.fecha_siniestro !== "___________") { unified.fecha_siniestro = fields.fecha_siniestro; found.fecha_siniestro = true; }

            // Procesamos el desglose de Fecha del sistema (DDs, Mess, AAAAs)
            var parts = unified.fecha_sistema.split('/');
            if (parts.length === 3) {
              unified.dds = parts[0];
              var monthNames = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
              var monthIndex = parseInt(parts[1], 10) - 1;
              unified.mess = monthNames[monthIndex] || "_________";
              unified.aaaas = parts[2];
            }

            if (fields.parrafada) {
              if (unified.parrafada) {
                unified.parrafada += "\n\n---\n\n" + fields.parrafada;
              } else {
                unified.parrafada = fields.parrafada;
              }
            }
          });

          return { 
            fields: unified, 
            count: cardsInList.length,
            targetCardId: targetCardId || currentCardId,
            idList: idList // Pasamos el idList para el historial
          };
        });
      });
    }

    // Lógica para procesar el Documento Word (UNIFICADA)
    document.getElementById('word-upload').addEventListener('change', function (event) {
      if (!event.target.files || event.target.files.length === 0) return;
      var file = event.target.files[0];
      var statusDiv = document.getElementById('upload-status');
      statusDiv.textContent = 'Procesando ' + file.name + '...';
      t.sizeTo(document.body).done();

      getUnifiedFields(t).then(function (data) {
        var fields = data.fields;
        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            var zip = new PizZip(e.target.result);
            var contentXml = zip.file("word/document.xml").asText();
            if (!contentXml) throw new Error("No se encontró word/document.xml");

            function reemplazarEtiquetaRota(xml, etiqueta, valor) {
              var letras = etiqueta.split('');
              var patron = letras.join('(?:<[^>]+>)*');
              var regex = new RegExp(patron, "gi");
              return xml.replace(regex, valor);
            }

            contentXml = reemplazarEtiquetaRota(contentXml, "{{Nombre}}", fields.nombre);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{DNI}}", fields.dni);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Domicilio}}", fields.domicilio);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Teléfono}}", fields.telefono);

    var getBoardTypeSafe = function(t) {
      return t.lists('all', 'id', 'name')
        .then(function(lists) {
          var paramList = lists.find(function(l) { 
            var n = l.name.toUpperCase();
            return n === 'PARÁMETROS' || n === 'PARAMETROS'; 
          });
          if (!paramList) return 'CLIENTES';

          // Buscamos tanto en tarjetas abiertas como cerradas (archivadas) de forma limpia
          return Promise.all([
            t.cards('all'),   // Tarjetas abiertas
            t.cards('closed') // Tarjetas archivadas
          ]).then(function(results) {
            var cards = results[0].concat(results[1]);
            var typeCard = cards.find(function(c) {
              return c.idList === paramList.id && c.name.toLowerCase().startsWith('tipo tablero');
            });
            if (!typeCard) return 'CLIENTES';

              var name = typeCard.name.toUpperCase();
              if (name.includes('PLANNING')) return 'PLANNING';
              if (name.includes('FACTURACIÓN') || name.includes('FACTURACION')) return 'FACTURACIÓN';
              return 'CLIENTES';
            });
        })
        .catch(function() {
          return 'CLIENTES';
        });
    };

    t.render(function () {
      // Detectamos el tipo de tablero de forma asíncrona
      getBoardTypeSafe(t).then(function(type) {
        // Solo ocultamos CLIENTES si estamos seguros de que es otro tipo específico
        if (type === 'PLANNING' || type === 'FACTURACIÓN') {
          document.getElementById('clientes-section').style.display = 'none';
        } else {
          document.getElementById('clientes-section').style.display = 'block';
        }

        document.getElementById('planning-section').style.display = (type === 'PLANNING') ? 'block' : 'none';
        document.getElementById('facturacion-section').style.display = (type === 'FACTURACIÓN') ? 'block' : 'none';
        
        // El unknown-section solo se muestra si realmente queremos forzar la configuración
        // Por ahora lo dejamos oculto para no confundir si falla la detección
        document.getElementById('unknown-section').style.display = 'none'; 

        if (type === 'CLIENTES') {
          t.card('name', 'idList').then(function(card) {
            if (card.name.toLowerCase().includes("historial de procesos") || card.name.toLowerCase().includes("historial de avisos")) {
              updateHistoryCard(t, card.idList, false);
            }
          });
        }
        t.sizeTo(document.body).done();
      }).catch(function() {
        // En caso de error crítico, nos aseguramos de que CLIENTES sea visible
        document.getElementById('clientes-section').style.display = 'block';
        t.sizeTo(document.body).done();
      });
    });

    function updateHistoryCard(t, idList, isAction, forcedFields) {
      return getUnifiedFields(t).then(function (data) {
        var unified = data.fields;
        return t.getRestApi().getToken().then(function (token) {
          if (!token) return;
          var appKey = t.getRestApi().appKey;
          var today = new Date().toLocaleDateString('es-ES');
          return fetch(`https://api.trello.com/1/lists/${idList}/cards?key=${appKey}&token=${token}`)
            .then(res => res.json())
            .then(cards => {
              var personalCard = cards.find(c => c.name.toLowerCase().includes("datos personales"));
              var targetPos = personalCard ? personalCard.pos + 0.1 : "bottom";

              var historyCard = cards.find(c =>
                c.name.toLowerCase().includes("historial de procesos") ||
                c.name.toLowerCase().includes("historial de avisos")
              );

              var historyKeys = [
                { label: "**Fecha del sistema:**", prop: "fecha_sistema" },
                { label: "**Fecha última actuación sobre el expediente:**", prop: "fecha_ultima" },
                { label: "**Fecha cierre expediente:**", prop: "fecha_cierre" },
                { label: "**Fecha de facturación:**", prop: "fecha_facturacion" },
                { label: "**Fecha de resolución:**", prop: "fecha_resolucion" },
                { label: "**Fecha de comunicación designación:**", prop: "fecha_designa" },
                { label: "**Fecha de reclamación previa:**", prop: "fecha_reclamacion" },
                { label: "**Fecha creación de expediente:**", prop: "fecha_apertura" },
                { label: "**Fecha del siniestro:**", prop: "fecha" }
              ];

              if (historyCard) {
                var desc = historyCard.desc || "";
                var lines = desc.split('\n');
                var values = {};

                // Extraer valores actuales
                historyKeys.forEach(function (item) {
                  var regex = new RegExp(item.label.replace(/\*/g, '\\*') + "\\s*([^\\n]*)", "i");
                  var match = desc.match(regex);
                  values[item.prop] = match ? match[1].trim() : "___________";

                  // Sincronizar si está vacío en la tarjeta pero tenemos el dato unificado
                  if (values[item.prop] === "___________" && unified[item.prop] && unified[item.prop] !== "___________") {
                    values[item.prop] = unified[item.prop];
                  }
                  
                  // Aplicar campos forzados (triggers de documentos)
                  if (forcedFields && forcedFields[item.prop]) {
                    values[item.prop] = forcedFields[item.prop];
                  }
                });

                var needsUpdate = false;

                // 1. Actualizar Fecha del sistema (siempre hoy)
                if (values.fecha_sistema !== today) {
                  values.fecha_sistema = today;
                  needsUpdate = true;
                }

                // 2. Actualizar Fecha última actuación (solo si es acción)
                if (isAction && values.fecha_ultima !== today) {
                  values.fecha_ultima = today;
                  needsUpdate = true;
                }

                // 3. Sincronizar siempre Fecha del siniestro
                if (unified.fecha !== "___________" && values.fecha !== unified.fecha) {
                  values.fecha = unified.fecha;
                  needsUpdate = true;
                }
                
                // 4. Sincronizar siempre Fecha creación de expediente desde el ID de la tarjeta personal
                if (personalCard && values.fecha_apertura === "___________") {
                  var creationDate = new Date(1000 * parseInt(personalCard.id.substring(0, 8), 16)).toLocaleDateString('es-ES');
                  values.fecha_apertura = creationDate;
                  needsUpdate = true;
                }
                
                // 5. Verificar si algún campo forzado ha provocado cambio
                if (forcedFields) {
                    for (var key in forcedFields) {
                        if (values[key] === forcedFields[key]) needsUpdate = true;
                    }
                }

                // Reconstruir descripción
                var newDescLines = [];
                historyKeys.forEach(function (item) {
                  newDescLines.push(item.label + " " + values[item.prop]);
                });

                lines.forEach(function (line) {
                  var lineLower = line.trim().toLowerCase();
                  var isKeyLine = historyKeys.some(function (item) {
                    var baseLabel = item.label.replace(/\*/g, '').replace(/:$/, '').trim().toLowerCase();
                    var variations = [baseLabel];
                    if (baseLabel.includes("creación de expediente")) variations.push("fecha apertura expediente");
                    if (baseLabel.includes("comunicación designación")) variations.push("fecha comunicación designa");
                    if (baseLabel.includes("siniestro")) variations.push("fecha siniestro");
                    return variations.some(function(v) { return lineLower.indexOf(v) === 0 || lineLower.includes(v); });
                  });
                  if (!isKeyLine && line.trim() !== "") newDescLines.push(line);
                });

                var finalDesc = newDescLines.join('\n');

                if (needsUpdate || finalDesc !== desc) {
                  return fetch(`https://api.trello.com/1/cards/${historyCard.id}?key=${appKey}&token=${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: "Historial de procesos.", desc: finalDesc, pos: targetPos })
                  });
                }
              } else {
                // Crear nueva con datos iniciales (incluyendo fecha creación desde ID)
                var newDesc = historyKeys.map(function (item) {
                  var val = unified[item.prop] || "___________";
                  if (item.prop === 'fecha_sistema' || item.prop === 'fecha_ultima') val = today;
                  if (item.prop === 'fecha_apertura' && personalCard) {
                      val = new Date(1000 * parseInt(personalCard.id.substring(0, 8), 16)).toLocaleDateString('es-ES');
                  }
                  if (forcedFields && forcedFields[item.prop]) val = forcedFields[item.prop];
                  return item.label + " " + val;
                }).join('\n');

                return fetch(`https://api.trello.com/1/cards?idList=${idList}&name=${encodeURIComponent("Historial de procesos.")}&desc=${encodeURIComponent(newDesc)}&pos=${targetPos}&key=${appKey}&token=${token}`, {
                  method: 'POST'
                });
              }
            });
        });
      });
    }
