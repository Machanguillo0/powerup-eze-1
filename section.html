<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Antigravity Section</title>
  <!-- La librerÃ­a de Trello es obligatoria en CADA iframe del Power-Up -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <!-- LibrerÃ­a para manipular archivos ZIP/DOCX en el navegador -->
  <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
  <!-- LibrerÃ­a para manipular archivos Excel en el navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <!-- LibrerÃ­a para forzar la descarga de archivos locales -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    /* Estilos bÃĄsicos para que parezca una parte nativa de Trello */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      /* Removing padding from body helps Trello calculate height exactly */
      background-color: transparent;
      /* Trello gestiona el fondo (modo claro/oscuro) */
      color: #172b4d;
    }

    .antigravity-container {
      border: 1px solid #dfe1e6;
      border-radius: 3px;
      padding: 15px;
      background-color: #f4f5f7;
      text-align: center;
      box-sizing: border-box;
      /* Previene que el padding desborde el iframe */
    }

    button,
    .btn-upload {
      background-color: #0079bf;
      color: white;
      border: none;
      padding: 8px 16px;
      margin: 5px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
      display: inline-block;
      font-size: 14px;
    }

    button:hover,
    .btn-upload:hover {
      background-color: #026aa7;
    }

    button.secondary {
      background-color: #091e420f;
      color: #172b4d;
    }

    button.secondary:hover {
      background-color: #091e4224;
    }

    /* Estilos para ocultar el input real y mostrar un botÃģn bonito */
    input[type="file"] {
      display: none;
    }

    #descripcion-container {
      margin-top: 15px;
      padding: 10px;
      border: 1px dashed #0079bf;
      border-radius: 3px;
      background: white;
      text-align: left;
      display: none;
      /* Oculto inicialmente */
      white-space: pre-wrap;
      /* Mantiene los saltos de lÃ­nea del texto */
    }

    .status-msg {
      margin-top: 10px;
      font-size: 13px;
      color: #5e6c84;
    }
  </style>
</head>

<body>
  <p>AquÃ­ vamos a ir poniendo los botones:</p>
  <div>
    <button id="boton-desc" class="secondary">Leer datos descripciÃģn</button>

    <!-- Nuevo botÃģn para procesar Word -->
    <label class="btn-upload">
      Generar word desde plantilla
      <input type="file" id="word-upload" accept=".docx" />
    </label>

    <!-- Nuevo botÃģn para procesar Excel -->
    <label class="btn-upload" style="background-color: #1f845a;">
      Generar excel desde plantilla
      <input type="file" id="excel-upload" accept=".xlsx" />
    </label>
  </div>

  <div id="upload-status" class="status-msg"></div>

  <!-- AquÃ­ aparecerÃĄ el texto de la descripciÃģn -->
  <div id="descripcion-container"></div>
  </div>

  <script>
    // Inicializamos este iframe con Trello indicÃĄndole nuestra App Key para poder usar la API
    var t = window.TrelloPowerUp.iframe({
      appKey: '30767998cbb7b57a692e8bb50cfa9a9c',
      appName: 'Antigravity'
    });

    // FunciÃģn auxiliar para extraer campos de la descripciÃģn de la tarjeta
    function extractFields(desc) {
      var fields = {
        nombre: "Cliente Desconocido",
        dni: "___________",
        domicilio: "___________",
        telefono: "___________",
        profesion: "___________",
        observaciones: "___________",
        fecha: "___________",
        hora: "___________",
        lugar: "___________",
        ciudad: "___________",
        matricula1: "___________",
        aseguradora1: "___________",
        matricula2: "___________",
        aseguradora2: "___________",
        parrafada: "",
        fecha_sistema: "___________",
        fecha_ultima: "___________"
      };

      if (!desc) return fields;

      var m;
      // Regex para campos de una sola lÃ­nea (Priorizamos Nombre y Apellidos completo)
      // Buscamos "NOMBRE Y APELLIDOS", permitiendo sÃ­mbolos de formato (negritas, etc) antes y despuÃĐs
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*NOMBRE Y APELLIDOS\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) {
          fields.nombre = m[1].replace(/[*_~`]/g, '').trim();
      }
      
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DNI\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.dni = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DOMICILIO\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.domicilio = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:TELÃFONO|Tel[eÃĐ]fono|Tlf|Tel)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.telefono = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*PROFESI[OÃ]N\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.profesion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*OBSERVACIONES\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.observaciones = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:FECHA DEL SINIESTRO|Fecha)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha = m[1].replace(/[*_~`]/g, '').replace(/\s*\(.*\)\s*$/, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:HORA)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.hora = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:LUGAR)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.lugar = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:CIUDAD)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.ciudad = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha del sistema\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_sistema = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha Ãšltima actuaciÃģn\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_ultima = m[1].replace(/[*_~`]/g, '').trim(); }

      // --- EXTRACCIÃN CONTEXTUAL DE VEHÃCULOS ---
      var vehicleLookahead = "(?=\\n\\s*(?:VEH[ÃI]CULO CONTRARIO|VEH[ÃI]CULO PROPIO|PARRAFADA|NOMBRE|DNI|DOMICILIO|PROFESI[OÃ]N|TEL[EÃ]FONO|EMAIL|OBSERVACIONES)|$)";
      
      var propioMatch = desc.match(new RegExp("(?:^|\\n)[ \\t]*[*_~`#]*\\s*VEH[ÃI]CULO PROPIO[\\s\\S]*?" + vehicleLookahead, "i"));
      if (propioMatch) {
        var pText = propioMatch[0];
        if (m = pText.match(/(?:^|\n)[ \t]*MATR[ÃI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula1 = m[1].trim(); }
        if (m = pText.match(/(?:^|\n)[ \t]*ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora1 = m[1].trim(); }
      }

      var contrarioMatch = desc.match(new RegExp("(?:^|\\n)[ \\t]*[*_~`#]*\\s*VEH[ÃI]CULO CONTRARIO[\\s\\S]*?" + vehicleLookahead, "i"));
      if (contrarioMatch) {
        var cText = contrarioMatch[0];
        if (m = cText.match(/(?:^|\n)[ \t]*MATR[ÃI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula2 = m[1].trim(); }
        if (m = cText.match(/(?:^|\n)[ \t]*ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora2 = m[1].trim(); }
      }

      // ExtracciÃģn multilÃ­nea para PARRAFADA (mÃĄs robusta: busca el siguiente encabezado manualmente)
      var parrafadaRegex = /PARRAFADA[^:]*[:\s-]+\s*/i;
      var startMatch = desc.match(parrafadaRegex);
      if (startMatch) {
        var startIndex = startMatch.index + startMatch[0].length;
        var remainingDesc = desc.substring(startIndex);

        // Definimos quÃĐ consideramos un "corte" (el inicio del siguiente campo)
        var nextHeaderIndex = remainingDesc.length;

        // A. Buscar por palabras clave conocidas (al inicio de una lÃ­nea)
        var keywords = ["NOMBRE", "DNI", "DOMICILIO", "TELÃFONO", "TELEFONO", "TLF", "PROFESI[ÃO]N", "OBSERVACIONES", "FECHA", "HORA", "LUGAR", "CIUDAD"];
        keywords.forEach(function (key) {
          var regex = new RegExp("\\n\\s*[*_~`#]*\\s*" + key, "i");
          var match = remainingDesc.match(regex);
          if (match && match.index < nextHeaderIndex) {
            nextHeaderIndex = match.index;
          }
        });

        // B. Buscar por un patrÃģn genÃĐrico de "ENCABEZADO EN MAYÃSCULAS Y DOS PUNTOS"
        var genericMatch = remainingDesc.match(/\n\s*[*_~`#]*\s*[A-ZÃÃÃÃÃÃ ]{3,}\s*[:]/);
        if (genericMatch && genericMatch.index < nextHeaderIndex) {
          nextHeaderIndex = genericMatch.index;
        }

        // C. Buscar por lÃ­neas separadoras (------, =====, etc)
        var separatorMatch = remainingDesc.match(/\n\s*[-=_]{3,}/);
        if (separatorMatch && separatorMatch.index < nextHeaderIndex) {
          nextHeaderIndex = separatorMatch.index;
        }

        fields.parrafada = remainingDesc.substring(0, nextHeaderIndex).replace(/[*_~`]/g, '').trim();
      }

      return fields;
    }

    // FunciÃģn para obtener datos unificados de toda la lista
    function getUnifiedFields(t) {
      return t.card('id', 'idList').then(function (currentCard) {
        var idList = currentCard.idList;
        var currentCardId = currentCard.id;
        return t.cards('id', 'name', 'desc', 'idList').then(function (allCards) {
          var cardsInList = allCards.filter(function (c) { return c.idList === idList; });
          var unified = {
            nombre: "Cliente Desconocido",
            dni: "___________",
            domicilio: "___________",
            telefono: "___________",
            profesion: "___________",
            observaciones: "___________",
            fecha: "___________",
            hora: "___________",
            lugar: "___________",
            ciudad: "___________",
            matricula1: "___________",
            aseguradora1: "___________",
            matricula2: "___________",
            aseguradora2: "___________",
            parrafada: "",
            fecha_sistema: new Date().toLocaleDateString('es-ES'),
            fecha_ultima: new Date().toLocaleDateString('es-ES'),
            dds: "___",
            mess: "_________",
            aaaas: "____"
          };

          var found = { nombre: false, dni: false, domicilio: false, telefono: false, profesion: false, observaciones: false, fecha: false, hora: false, lugar: false, ciudad: false, matricula1: false, aseguradora1: false, matricula2: false, aseguradora2: false, fecha_sistema: false, fecha_ultima: false };
          var targetCardId = null;
          var maxScore = -1;

          cardsInList.forEach(function (card) {
            var fields = extractFields(card.desc);
            
            // Sistema de puntuaciÃģn para identificar la tarjeta principal de datos personales
            var score = 0;
            // Prioridad mÃĄxima: el tÃ­tulo de la tarjeta contiene "datos personales"
            if (card.name.toLowerCase().includes("datos personales")) score += 100;
            
            if (fields.nombre !== "Cliente Desconocido" && fields.nombre.replace(/[_\s]+/g, '').length > 2) score += 10;
            if (fields.dni !== "___________" && fields.dni.replace(/[_\s]+/g, '').length > 2) score += 5;
            if (fields.telefono !== "___________" && fields.telefono.replace(/[_\s]+/g, '').length > 2) score += 3;
            if (fields.domicilio !== "___________") score += 1;
            if (fields.profesion !== "___________") score += 1;

            if (score > maxScore) {
              maxScore = score;
              targetCardId = card.id;
            }

            if (!found.nombre && fields.nombre !== "Cliente Desconocido") { unified.nombre = fields.nombre; found.nombre = true; }
            if (!found.dni && fields.dni !== "___________") { unified.dni = fields.dni; found.dni = true; }
            if (!found.domicilio && fields.domicilio !== "___________") { unified.domicilio = fields.domicilio; found.domicilio = true; }
            if (!found.telefono && fields.telefono !== "___________") { unified.telefono = fields.telefono; found.telefono = true; }
            if (!found.profesion && fields.profesion !== "___________") { unified.profesion = fields.profesion; found.profesion = true; }
            if (!found.observaciones && fields.observaciones !== "___________") { unified.observaciones = fields.observaciones; found.observaciones = true; }
            if (!found.fecha && fields.fecha !== "___________") { unified.fecha = fields.fecha; found.fecha = true; }
            if (!found.hora && fields.hora !== "___________") { unified.hora = fields.hora; found.hora = true; }
            if (!found.lugar && fields.lugar !== "___________") { unified.lugar = fields.lugar; found.lugar = true; }
            if (!found.ciudad && fields.ciudad !== "___________") { unified.ciudad = fields.ciudad; found.ciudad = true; }
            if (!found.matricula1 && fields.matricula1 !== "___________") { unified.matricula1 = fields.matricula1; found.matricula1 = true; }
            if (!found.aseguradora1 && fields.aseguradora1 !== "___________") { unified.aseguradora1 = fields.aseguradora1; found.aseguradora1 = true; }
            if (!found.matricula2 && fields.matricula2 !== "___________") { unified.matricula2 = fields.matricula2; found.matricula2 = true; }
            if (!found.aseguradora2 && fields.aseguradora2 !== "___________") { unified.aseguradora2 = fields.aseguradora2; found.aseguradora2 = true; }
            if (!found.fecha_sistema && fields.fecha_sistema !== "___________") { unified.fecha_sistema = fields.fecha_sistema; found.fecha_sistema = true; }
            if (!found.fecha_ultima && fields.fecha_ultima !== "___________") { unified.fecha_ultima = fields.fecha_ultima; found.fecha_ultima = true; }

            // Procesamos el desglose de Fecha del sistema (DDs, Mess, AAAAs)
            var parts = unified.fecha_sistema.split('/');
            if (parts.length === 3) {
              unified.dds = parts[0];
              var monthNames = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
              var monthIndex = parseInt(parts[1], 10) - 1;
              unified.mess = monthNames[monthIndex] || "_________";
              unified.aaaas = parts[2];
            }

            if (fields.parrafada) {
              if (unified.parrafada) {
                unified.parrafada += "\n\n---\n\n" + fields.parrafada;
              } else {
                unified.parrafada = fields.parrafada;
              }
            }
          });

          return { 
            fields: unified, 
            count: cardsInList.length,
            targetCardId: targetCardId || currentCardId,
            idList: idList // Pasamos el idList para el historial
          };
        });
      });
    }

    // LÃģgica para procesar el Documento Word (UNIFICADA)
    document.getElementById('word-upload').addEventListener('change', function (event) {
      if (!event.target.files || event.target.files.length === 0) return;
      var file = event.target.files[0];
      var statusDiv = document.getElementById('upload-status');
      statusDiv.textContent = 'Procesando ' + file.name + '...';
      t.sizeTo(document.body).done();

      getUnifiedFields(t).then(function (data) {
        var fields = data.fields;
        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            var zip = new PizZip(e.target.result);
            var contentXml = zip.file("word/document.xml").asText();
            if (!contentXml) throw new Error("No se encontrÃģ word/document.xml");

            function reemplazarEtiquetaRota(xml, etiqueta, valor) {
              var letras = etiqueta.split('');
              var patron = letras.join('(?:<[^>]+>)*');
              var regex = new RegExp(patron, "gi");
              return xml.replace(regex, valor);
            }

            contentXml = reemplazarEtiquetaRota(contentXml, "{{Nombre}}", fields.nombre);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{DNI}}", fields.dni);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Domicilio}}", fields.domicilio);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{TelÃĐfono}}", fields.telefono);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Telefono}}", fields.telefono);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{ProfesiÃģn}}", fields.profesion);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Observaciones}}", fields.observaciones);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Fecha del siniestro}}", fields.fecha);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Hora}}", fields.hora);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Lugar}}", fields.lugar);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Ciudad}}", fields.ciudad);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{MatrÃ­cula1}}", fields.matricula1);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Aseguradora1}}", fields.aseguradora1);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{MatrÃ­cula2}}", fields.matricula2);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Aseguradora2}}", fields.aseguradora2);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Fecha del sistema}}", fields.fecha_sistema);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Fecha Ãšltima actuaciÃģn}}", fields.fecha_ultima);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{DDs}}", fields.dds);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Mess}}", fields.mess);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{AAAAs}}", fields.aaaas);

            var parrafadaDocx = fields.parrafada.replace(/\n\r?/g, '</w:t><w:br/><w:t>');
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Parrafada}}", parrafadaDocx);

            zip.file("word/document.xml", contentXml);
            var outContent = zip.generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
            var baseTemplateName = file.name.substring(0, file.name.lastIndexOf('.'));
            var nombreFinal = baseTemplateName + "_" + fields.nombre.replace(/\s+/g, '_') + ".docx";

            statusDiv.textContent = 'Autenticando con Trello API...';
            t.getRestApi().getToken().then(function (token) {
              if (!token) return t.getRestApi().authorize({ scope: 'read,write', expiration: 'never', return_url: window.location.href });
              return token;
            }).then(function (token) {
              statusDiv.textContent = 'Subiendo documento directamente a Trello...';
              var formData = new FormData();
              formData.append("key", t.getRestApi().appKey);
              formData.append("token", token);
              formData.append("file", outContent, nombreFinal);
              formData.append("name", nombreFinal);
              var cardId = data.targetCardId;
              var urlParams = new URLSearchParams();
              urlParams.append('key', t.getRestApi().appKey);
              urlParams.append('token', token);
              return fetch(`https://api.trello.com/1/cards/${cardId}/attachments?${urlParams.toString()}`, { method: 'POST', body: formData });
            }).then(function (response) {
              if (!response.ok) throw new Error('Error HTTP ' + response.status);
              statusDiv.textContent = 'ÂĄDocumento modificado y adjuntado con ÃĐxito!';
              event.target.value = '';
              t.sizeTo(document.body).done();
              // Actualizar historial
              updateHistoryCard(t, data.idList);
            }).catch(function (err) {
              console.error(err);
              statusDiv.textContent = 'Fallo en la subida.';
              t.sizeTo(document.body).done();
            });
          } catch (error) {
            console.error(error);
            statusDiv.textContent = 'Error: ' + error.message;
            t.sizeTo(document.body).done();
          }
        };
        reader.readAsArrayBuffer(file);
      });
    });

    // LÃģgica para procesar el Documento Excel (UNIFICADA)
    document.getElementById('excel-upload').addEventListener('change', function (event) {
      if (!event.target.files || event.target.files.length === 0) return;
      var file = event.target.files[0];
      var statusDiv = document.getElementById('upload-status');
      statusDiv.textContent = 'Procesando ' + file.name + '...';
      t.sizeTo(document.body).done();

      getUnifiedFields(t).then(function (data) {
        var fields = data.fields;
        var reader = new FileReader();
        reader.onload = async function (e) {
          try {
            var workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(e.target.result);
            workbook.eachSheet(function (worksheet) {
              worksheet.eachRow(function (row) {
                row.eachCell(function (cell) {
                  if (cell.value) {
                    if (cell.value.richText) {
                      cell.value.richText.forEach(function (rt) {
                        if (rt.text) {
                          rt.text = rt.text.replace(/\{\{Nombre\}\}/gi, fields.nombre)
                            .replace(/\{\{DNI\}\}/gi, fields.dni)
                            .replace(/\{\{Domicilio\}\}/gi, fields.domicilio)
                            .replace(/\{\{TelÃĐfono\}\}/gi, fields.telefono)
                            .replace(/\{\{Telefono\}\}/gi, fields.telefono)
                            .replace(/\{\{ProfesiÃģn\}\}/gi, fields.profesion)
                            .replace(/\{\{Observaciones\}\}/gi, fields.observaciones)
                            .replace(/\{\{Fecha del siniestro\}\}/gi, fields.fecha)
                            .replace(/\{\{Hora\}\}/gi, fields.hora)
                            .replace(/\{\{Lugar\}\}/gi, fields.lugar)
                            .replace(/\{\{Ciudad\}\}/gi, fields.ciudad)
                            .replace(/\{\{MatrÃ­cula1\}\}/gi, fields.matricula1)

    function updateHistoryCard(t, idList) {
      return t.getRestApi().getToken().then(function (token) {
        if (!token) return;
        var appKey = t.getRestApi().appKey;
        var today = new Date().toLocaleDateString('es-ES');
        return fetch(`https://api.trello.com/1/lists/${idList}/cards?key=${appKey}&token=${token}`)
          .then(res => res.json())
          .then(cards => {
            // Buscamos la tarjeta de datos personales para saber su posiciÃģn
            var personalCard = cards.find(c => c.name.toLowerCase().includes("datos personales"));
            var targetPos = personalCard ? personalCard.pos + 0.1 : "bottom";

            // Buscamos por el nombre nuevo o el antiguo
            var historyCard = cards.find(c => 
              c.name.toLowerCase().includes("historial de procesos") || 
              c.name.toLowerCase().includes("historial de avisos")
            );
            
            var systemKey = "**Fecha del sistema:**";
            var lastActionKey = "**Fecha Ãšltima actuaciÃģn sobre el expediente:**";

            if (historyCard) {
              var desc = historyCard.desc || "";
              if (!desc.includes("Fecha del sistema")) {
                desc = systemKey + " " + today + "\n" + desc;
              }
              var lastActionStr = lastActionKey + " " + today;
              var regex = new RegExp("\\*\\*Fecha Ãšltima actuaciÃģn sobre el expediente:\\*\\*[^\\n]*|Fecha Ãšltima actuaciÃģn sobre el expediente:[^\\n]*", "i");
              
              if (regex.test(desc)) {
                desc = desc.replace(regex, lastActionStr);
              } else {
                desc += "\n" + lastActionStr;
              }

              return fetch(`https://api.trello.com/1/cards/${historyCard.id}?key=${appKey}&token=${token}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                  name: "Historial de procesos.",
                  desc: desc,
                  pos: targetPos // Mantenemos la posiciÃģn a continuaciÃģn de datos personales
                })
              });
            } else {
              var newDesc = systemKey + " " + today + "\n" + 
                            lastActionKey + " " + today;
              return fetch(`https://api.trello.com/1/cards?idList=${idList}&name=${encodeURIComponent("Historial de procesos.")}&desc=${encodeURIComponent(newDesc)}&pos=${targetPos}&key=${appKey}&token=${token}`, { 
                method: 'POST' 
              });
            }
          });
      });
    }
