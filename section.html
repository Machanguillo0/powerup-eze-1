<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Antigravity Section</title>
  <!-- La librería de Trello es obligatoria en CADA iframe del Power-Up -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <!-- Librería para manipular archivos ZIP/DOCX en el navegador -->
  <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
  <!-- Librería para manipular archivos Excel en el navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <!-- Librería para forzar la descarga de archivos locales -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    /* Estilos básicos para que parezca una parte nativa de Trello */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      /* Removing padding from body helps Trello calculate height exactly */
      background-color: transparent;
      /* Trello gestiona el fondo (modo claro/oscuro) */
      color: #172b4d;
    }

    .antigravity-container {
      border: 1px solid #dfe1e6;
      border-radius: 3px;
      padding: 15px;
      background-color: #f4f5f7;
      text-align: center;
      box-sizing: border-box;
      /* Previene que el padding desborde el iframe */
    }

    button,
    .btn-upload {
      background-color: #0079bf;
      color: white;
      border: none;
      padding: 8px 16px;
      margin: 5px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
      display: inline-block;
      font-size: 14px;
    }

    button:hover,
    .btn-upload:hover {
      background-color: #026aa7;
    }

    button.secondary {
      background-color: #091e420f;
      color: #172b4d;
    }

    button.secondary:hover {
      background-color: #091e4224;
    }

    /* Estilos para ocultar el input real y mostrar un botón bonito */
    input[type="file"] {
      display: none;
    }

    #descripcion-container {
      margin-top: 15px;
      padding: 10px;
      border: 1px dashed #0079bf;
      border-radius: 3px;
      background: white;
      text-align: left;
      display: none;
      /* Oculto inicialmente */
      white-space: pre-wrap;
      /* Mantiene los saltos de línea del texto */
    }

    .status-msg {
      margin-top: 10px;
      font-size: 13px;
      color: #5e6c84;
    }
  </style>
</head>

<body>
  <p>Aquí vamos a ir poniendo los botones:</p>
  <div>
    <button id="boton-desc" class="secondary">Leer datos descripción</button>

    <!-- Nuevo botón para procesar Word -->
    <label class="btn-upload">
      Generar word desde plantilla
      <input type="file" id="word-upload" accept=".docx" />
    </label>

    <!-- Nuevo botón para procesar Excel -->
    <label class="btn-upload" style="background-color: #1f845a;">
      Generar excel desde plantilla
      <input type="file" id="excel-upload" accept=".xlsx" />
    </label>
  </div>

  <div id="upload-status" class="status-msg"></div>

  <!-- Aquí aparecerá el texto de la descripción -->
  <div id="descripcion-container"></div>
  </div>

  <script>
    // Inicializamos este iframe con Trello indicándole nuestra App Key para poder usar la API
    var t = window.TrelloPowerUp.iframe({
      appKey: '30767998cbb7b57a692e8bb50cfa9a9c',
      appName: 'Antigravity'
    });

    // Función auxiliar para extraer campos de la descripción de la tarjeta
    function extractFields(desc) {
      var fields = {
        nombre: "Cliente Desconocido",
        dni: "___________",
        domicilio: "___________",
        telefono: "___________",
        profesion: "___________",
        observaciones: "___________",
        fecha: "___________",
        hora: "___________",
        lugar: "___________",
        ciudad: "___________",
        matricula1: "___________",
        aseguradora1: "___________",
        matricula2: "___________",
        aseguradora2: "___________",
        parrafada: ""
      };

      if (!desc) return fields;

      var m;
      // Regex para campos de una sola línea
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*NOMBRE Y APELLIDOS[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.nombre = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DNI[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.dni = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DOMICILIO[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.domicilio = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:TELÉFONO|Tel[eé]fono|Tlf|Tel)[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.telefono = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*PROFESI[OÓ]N[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.profesion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*OBSERVACIONES[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.observaciones = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:FECHA DEL SINIESTRO|Fecha)[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha = m[1].replace(/[*_~`]/g, '').replace(/\s*\(.*\)\s*$/, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:HORA)[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.hora = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:LUGAR)[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.lugar = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:CIUDAD)[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.ciudad = m[1].replace(/[*_~`]/g, '').trim(); }

      // --- EXTRACCIÓN CONTEXTUAL DE VEHÍCULOS ---
      var propioMatch = desc.match(/VEH[ÍI]CULO PROPIO[\s\S]*?(?=VEH[ÍI]CULO CONTRARIO|PARRAFADA|[A-ZÁÉÍÓÚÑ ]{3,}:|$)/i);
      if (propioMatch) {
        var pText = propioMatch[0];
        if (m = pText.match(/MATR[ÍI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula1 = m[1].trim(); }
        if (m = pText.match(/ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora1 = m[1].trim(); }
      }

      var contrarioMatch = desc.match(/VEH[ÍI]CULO CONTRARIO[\s\S]*?(?=VEH[ÍI]CULO PROPIO|PARRAFADA|[A-ZÁÉÍÓÚÑ ]{3,}:|$)/i);
      if (contrarioMatch) {
        var cText = contrarioMatch[0];
        if (m = cText.match(/MATR[ÍI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula2 = m[1].trim(); }
        if (m = cText.match(/ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora2 = m[1].trim(); }
      }

      // Extracción multilínea para PARRAFADA (más robusta: busca el siguiente encabezado manualmente)
      var parrafadaRegex = /PARRAFADA[^:]*[:\s-]+\s*/i;
      var startMatch = desc.match(parrafadaRegex);
      if (startMatch) {
        var startIndex = startMatch.index + startMatch[0].length;
        var remainingDesc = desc.substring(startIndex);

        // Definimos qué consideramos un "corte" (el inicio del siguiente campo)
        var nextHeaderIndex = remainingDesc.length;

        // A. Buscar por palabras clave conocidas (al inicio de una línea)
        var keywords = ["NOMBRE", "DNI", "DOMICILIO", "TELÉFONO", "TELEFONO", "TLF", "PROFESI[ÓO]N", "OBSERVACIONES", "FECHA", "HORA", "LUGAR", "CIUDAD"];
        keywords.forEach(function (key) {
          var regex = new RegExp("\\n\\s*[*_~`#]*\\s*" + key, "i");
          var match = remainingDesc.match(regex);
          if (match && match.index < nextHeaderIndex) {
            nextHeaderIndex = match.index;
          }
        });

        // B. Buscar por un patrón genérico de "ENCABEZADO EN MAYÚSCULAS Y DOS PUNTOS"
        var genericMatch = remainingDesc.match(/\n\s*[*_~`#]*\s*[A-ZÁÉÍÓÚÑ ]{3,}\s*[:]/);
        if (genericMatch && genericMatch.index < nextHeaderIndex) {
          nextHeaderIndex = genericMatch.index;
        }

        // C. Buscar por líneas separadoras (------, =====, etc)
        var separatorMatch = remainingDesc.match(/\n\s*[-=_]{3,}/);
        if (separatorMatch && separatorMatch.index < nextHeaderIndex) {
          nextHeaderIndex = separatorMatch.index;
        }

        fields.parrafada = remainingDesc.substring(0, nextHeaderIndex).replace(/[*_~`]/g, '').trim();
      }

      return fields;
    }

    // Lógica para procesar el Documento Word
    document.getElementById('word-upload').addEventListener('change', function (event) {
      if (!event.target.files || event.target.files.length === 0) return;

      var file = event.target.files[0];
      var statusDiv = document.getElementById('upload-status');
      statusDiv.textContent = 'Procesando ' + file.name + '...';
      t.sizeTo(document.body).done();

      // Primero, obtenemos los datos de la tarjeta
      t.card('desc').then(function (cardInfo) {
        var fields = extractFields(cardInfo.desc);

        // Leemos el archivo físico
        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            // Cargar el ZIP en memoria
            var zip = new PizZip(e.target.result);

            // Acceder al XML principal del documento Word
            var contentXml = zip.file("word/document.xml").asText();
            if (!contentXml) {
              throw new Error("No se encontró word/document.xml dentro del archivo docx.");
            }

            // --- SUPER REEMPLAZO A PRUEBA DE MICROSOFT WORD ---
            // Word a veces separa nuestras llaves con sus propias etiquetas XML invisibles:
            // Ej: {<w:t>Nombre</w:t>}
            // Esta función busca las llaves y limpia la basura XML que haya por el medio para que "encajen"
            function reemplazarEtiquetaRota(xml, etiqueta, valor) {
              // Creamos un patrón de búsqueda que permite que haya etiquetas <...> entre cada letra del token
              var letras = etiqueta.split('');
              var patron = letras.join('(?:<[^>]+>)*');
              // Creamos la expresión regular de forma dinámica (global e insensible a mayúsculas)
              var regex = new RegExp(patron, "gi");

              // Si encontramos ese bloque roto, lo sustituimos por el valor deseado
              // peeeero, para no "romper" el encolado del documento, debemos mantener el texto envuelto en una etiqueta de texto
              return xml.replace(regex, valor);
            }

            contentXml = reemplazarEtiquetaRota(contentXml, "{{Nombre}}", fields.nombre);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{DNI}}", fields.dni);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Domicilio}}", fields.domicilio);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Teléfono}}", fields.telefono);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Telefono}}", fields.telefono);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Profesión}}", fields.profesion);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Observaciones}}", fields.observaciones);

            // Reemplazo de PARRAFADA con soporte multilínea (w:br)
            var parrafadaDocx = fields.parrafada.replace(/\n\r?/g, '</w:t><w:br/><w:t>');
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Parrafada}}", parrafadaDocx);

            // Reemplazamos el archivo en el ZIP
            zip.file("word/document.xml", contentXml);

            // Generar el nuevo archivo modificado como Blob para descarga local
            var outContent = zip.generate({
              type: "blob",
              mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

            var nombreFinal = "CARTA_" + fields.nombre.replace(/\s+/g, '_') + ".docx";

            statusDiv.textContent = 'Autenticando con Trello API...';

            // Usamos la API REST oficial en lugar de t.attach()
            t.getRestApi()
              .getToken()
              .then(function (token) {
                if (!token) {
                  // Si el usuario no ha autorizado nunca esta App, pedirselo
                  return t.getRestApi().authorize({
                    scope: 'read,write',
                    expiration: 'never',
                    return_url: window.location.href
                  });
                }
                return token;
              })
              .then(function (token) {
                statusDiv.textContent = 'Subiendo documento directamente a Trello...';

                // Formamos el paquete de datos nativo para enviar archivos
                var formData = new FormData();
                formData.append("key", t.getRestApi().appKey);
                formData.append("token", token);
                formData.append("file", outContent, nombreFinal);
                formData.append("name", nombreFinal);

                // Trello nos da el context() con el ID de esta tarjeta abierta
                var cardId = t.getContext().card;
                var urlParams = new URLSearchParams();
                urlParams.append('key', t.getRestApi().appKey);
                urlParams.append('token', token);

                // Subida oficial de archivo
                return fetch(`https://api.trello.com/1/cards/${cardId}/attachments?${urlParams.toString()}`, {
                  method: 'POST',
                  body: formData
                });
              })
              .then(function (response) {
                if (!response.ok) {
                  throw new Error('La subida de Trello devolvió un error HTTP ' + response.status);
                }
                statusDiv.textContent = '¡Documento modificado y adjuntado en la tarjeta con éxito!';
                event.target.value = ''; // Reset input
                t.sizeTo(document.body).done();
              })
              .catch(function (err) {
                console.error("Fallo de subida API:", err);
                statusDiv.textContent = 'Fallo en la subida. ' + (err.message || 'Comprueba los logs de la consola.');
                t.sizeTo(document.body).done();
              });

          } catch (error) {
            console.error("Detalles del error PizZip:", error);
            statusDiv.textContent = 'Error: ' + error.message;
            t.sizeTo(document.body).done();
          }
        };
        // Iniciar la lectura del archivo como ArrayBuffer para PizZip
        reader.readAsArrayBuffer(file);
      });
    });

    // Lógica para procesar el Documento Excel
    document.getElementById('excel-upload').addEventListener('change', function (event) {
      if (!event.target.files || event.target.files.length === 0) return;

      var file = event.target.files[0];
      var statusDiv = document.getElementById('upload-status');
      statusDiv.textContent = 'Procesando ' + file.name + '...';
      t.sizeTo(document.body).done();

      // Obtenemos los datos de la tarjeta
      t.card('desc').then(function (cardInfo) {
        var fields = extractFields(cardInfo.desc);

        var reader = new FileReader();
        reader.onload = async function (e) {
          try {
            var workbook = new ExcelJS.Workbook();
            // Cargar el excel desde ArrayBuffer
            await workbook.xlsx.load(e.target.result);

            // Recorrer todas las hojas, filas y celdas
            workbook.eachSheet(function (worksheet, sheetId) {
              worksheet.eachRow(function (row, rowNumber) {
                row.eachCell(function (cell, colNumber) {
                  if (cell.value) {
                    // Microsoft Excel suele convertir los tags con estilos visuales en un objeto RichText
                    if (cell.value.richText) {
                      cell.value.richText.forEach(function (rt) {
                        if (rt.text) {
                          rt.text = rt.text.replace(/\{\{Nombre\}\}/gi, fields.nombre)
                            .replace(/\{\{DNI\}\}/gi, fields.dni)
                            .replace(/\{\{Domicilio\}\}/gi, fields.domicilio)
                            .replace(/\{\{Teléfono\}\}/gi, fields.telefono)
                            .replace(/\{\{Telefono\}\}/gi, fields.telefono)
                            .replace(/\{\{Profesión\}\}/gi, fields.profesion)
                            .replace(/\{\{Observaciones\}\}/gi, fields.observaciones)
                            .replace(/\{\{Parrafada\}\}/gi, fields.parrafada);
                        }
                      });
                    } else if (typeof cell.value === 'string') {
                      // Sustitución básica si la celda es string puro
                      cell.value = cell.value.replace(/\{\{Nombre\}\}/gi, fields.nombre)
                        .replace(/\{\{DNI\}\}/gi, fields.dni)
                        .replace(/\{\{Domicilio\}\}/gi, fields.domicilio)
                        .replace(/\{\{Teléfono\}\}/gi, fields.telefono)
                        .replace(/\{\{Telefono\}\}/gi, fields.telefono)
                        .replace(/\{\{Profesión\}\}/gi, fields.profesion)
                        .replace(/\{\{Observaciones\}\}/gi, fields.observaciones)
                        .replace(/\{\{Parrafada\}\}/gi, fields.parrafada);
                      
                      // Habilitar wrapText si hay saltos de línea para que se vea bien en Excel
                      if (fields.parrafada.includes('\n')) {
                        cell.alignment = { wrapText: true };
                      }
                    }
                  }
                });
              });
            });

            // Generar el nuevo archivo XLSX modificado en un Buffer
            var buffer = await workbook.xlsx.writeBuffer();
            var outContent = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            var nombreFinal = "PRESUPUESTO_" + fields.nombre.replace(/\s+/g, '_') + ".xlsx";

            statusDiv.textContent = 'Autenticando con Trello API...';

            t.getRestApi()
              .getToken()
              .then(function (token) {
                if (!token) {
                  return t.getRestApi().authorize({
                    scope: 'read,write',
                    expiration: 'never',
                    return_url: window.location.href
                  });
                }
                return token;
              })
              .then(function (token) {
                statusDiv.textContent = 'Subiendo Excel directamente a Trello...';

                var formData = new FormData();
                formData.append("key", t.getRestApi().appKey);
                formData.append("token", token);
                formData.append("file", outContent, nombreFinal);
                formData.append("name", nombreFinal);

                var cardId = t.getContext().card;
                var urlParams = new URLSearchParams();
                urlParams.append('key', t.getRestApi().appKey);
                urlParams.append('token', token);

                return fetch(`https://api.trello.com/1/cards/${cardId}/attachments?${urlParams.toString()}`, {
                  method: 'POST',
                  body: formData
                });
              })
              .then(function (response) {
                if (!response.ok) {
                  throw new Error('La subida de Trello devolvió un error HTTP ' + response.status);
                }
                statusDiv.textContent = '¡Excel modificado y adjuntado con éxito!';
                event.target.value = ''; // Reset input
                t.sizeTo(document.body).done();
              })
              .catch(function (err) {
                console.error("Fallo de subida API:", err);
                statusDiv.textContent = 'Fallo en la subida. ' + (err.message || 'Mirar consola.');
                t.sizeTo(document.body).done();
              });

          } catch (error) {
            console.error("Error procesando Excel:", error);
            statusDiv.textContent = 'Error: ' + error.message;
            t.sizeTo(document.body).done();
          }
        };
        reader.readAsArrayBuffer(file);
      });
    });

    // Función para obtener datos unificados de toda la lista
    function getUnifiedFields(t) {
      return t.card('idList').then(function (currentCard) {
        var idList = currentCard.idList;
        return t.cards('name', 'desc', 'idList').then(function (allCards) {
          var cardsInList = allCards.filter(function (c) { return c.idList === idList; });
          var unified = {
            nombre: "Cliente Desconocido",
            dni: "___________",
            domicilio: "___________",
            telefono: "___________",
            profesion: "___________",
            observaciones: "___________",
            fecha: "___________",
            hora: "___________",
            lugar: "___________",
            ciudad: "___________",
            matricula1: "___________",
            aseguradora1: "___________",
            matricula2: "___________",
            aseguradora2: "___________",
            parrafada: ""
          };

          // Marcadores para saber si hemos encontrado datos reales
          var found = { nombre: false, dni: false, domicilio: false, telefono: false, profesion: false, observaciones: false, fecha: false, hora: false, lugar: false, ciudad: false, matricula1: false, aseguradora1: false, matricula2: false, aseguradora2: false };

          cardsInList.forEach(function (card) {
            var fields = extractFields(card.desc);

            if (!found.nombre && fields.nombre !== "Cliente Desconocido") { unified.nombre = fields.nombre; found.nombre = true; }
            if (!found.dni && fields.dni !== "___________") { unified.dni = fields.dni; found.dni = true; }
            if (!found.domicilio && fields.domicilio !== "___________") { unified.domicilio = fields.domicilio; found.domicilio = true; }
            if (!found.telefono && fields.telefono !== "___________") { unified.telefono = fields.telefono; found.telefono = true; }
            if (!found.profesion && fields.profesion !== "___________") { unified.profesion = fields.profesion; found.profesion = true; }
            if (!found.observaciones && fields.observaciones !== "___________") { unified.observaciones = fields.observaciones; found.observaciones = true; }
            if (!found.fecha && fields.fecha !== "___________") { unified.fecha = fields.fecha; found.fecha = true; }
            if (!found.hora && fields.hora !== "___________") { unified.hora = fields.hora; found.hora = true; }
            if (!found.lugar && fields.lugar !== "___________") { unified.lugar = fields.lugar; found.lugar = true; }
            if (!found.ciudad && fields.ciudad !== "___________") { unified.ciudad = fields.ciudad; found.ciudad = true; }
            if (!found.matricula1 && fields.matricula1 !== "___________") { unified.matricula1 = fields.matricula1; found.matricula1 = true; }
            if (!found.aseguradora1 && fields.aseguradora1 !== "___________") { unified.aseguradora1 = fields.aseguradora1; found.aseguradora1 = true; }
            if (!found.matricula2 && fields.matricula2 !== "___________") { unified.matricula2 = fields.matricula2; found.matricula2 = true; }
            if (!found.aseguradora2 && fields.aseguradora2 !== "___________") { unified.aseguradora2 = fields.aseguradora2; found.aseguradora2 = true; }

            if (fields.parrafada) {
              if (unified.parrafada) {
                unified.parrafada += "\n\n---\n\n" + fields.parrafada;
              } else {
                unified.parrafada = fields.parrafada;
              }
            }
          });

          return { fields: unified, count: cardsInList.length };
        });
      });
    }

    // Lógica para procesar el Documento Word
    document.getElementById('word-upload').addEventListener('change', function (event) {
      if (!event.target.files || event.target.files.length === 0) return;

      var file = event.target.files[0];
      var statusDiv = document.getElementById('upload-status');
      statusDiv.textContent = 'Procesando ' + file.name + '...';
      t.sizeTo(document.body).done();

      // Obtenemos los datos UNIFICADOS de la lista
      getUnifiedFields(t).then(function (data) {
        var fields = data.fields;

        // Leemos el archivo físico
        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            // Cargar el ZIP en memoria
            var zip = new PizZip(e.target.result);

            // Acceder al XML principal del documento Word
            var contentXml = zip.file("word/document.xml").asText();
            if (!contentXml) {
              throw new Error("No se encontró word/document.xml dentro del archivo docx.");
            }

            // --- SUPER REEMPLAZO A PRUEBA DE MICROSOFT WORD ---
            function reemplazarEtiquetaRota(xml, etiqueta, valor) {
              var letras = etiqueta.split('');
              var patron = letras.join('(?:<[^>]+>)*');
              var regex = new RegExp(patron, "gi");
              return xml.replace(regex, valor);
            }

            contentXml = reemplazarEtiquetaRota(contentXml, "{{Nombre}}", fields.nombre);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{DNI}}", fields.dni);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Domicilio}}", fields.domicilio);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Teléfono}}", fields.telefono);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Telefono}}", fields.telefono);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Profesión}}", fields.profesion);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Observaciones}}", fields.observaciones);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Fecha}}", fields.fecha);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Hora}}", fields.hora);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Lugar}}", fields.lugar);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Ciudad}}", fields.ciudad);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Matrícula1}}", fields.matricula1);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Aseguradora1}}", fields.aseguradora1);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Matrícula2}}", fields.matricula2);
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Aseguradora2}}", fields.aseguradora2);

            var parrafadaDocx = fields.parrafada.replace(/\n\r?/g, '</w:t><w:br/><w:t>');
            contentXml = reemplazarEtiquetaRota(contentXml, "{{Parrafada}}", parrafadaDocx);

            zip.file("word/document.xml", contentXml);

            var outContent = zip.generate({
              type: "blob",
              mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

            var nombreFinal = "CARTA_" + fields.nombre.replace(/\s+/g, '_') + ".docx";

            statusDiv.textContent = 'Autenticando con Trello API...';

            t.getRestApi()
              .getToken()
              .then(function (token) {
                if (!token) {
                  return t.getRestApi().authorize({
                    scope: 'read,write',
                    expiration: 'never',
                    return_url: window.location.href
                  });
                }
                return token;
              })
              .then(function (token) {
                statusDiv.textContent = 'Subiendo documento directamente a Trello...';

                var formData = new FormData();
                formData.append("key", t.getRestApi().appKey);
                formData.append("token", token);
                formData.append("file", outContent, nombreFinal);
                formData.append("name", nombreFinal);

                var cardId = t.getContext().card;
                var urlParams = new URLSearchParams();
                urlParams.append('key', t.getRestApi().appKey);
                urlParams.append('token', token);

                return fetch(`https://api.trello.com/1/cards/${cardId}/attachments?${urlParams.toString()}`, {
                  method: 'POST',
                  body: formData
                });
              })
              .then(function (response) {
                if (!response.ok) {
                  throw new Error('La subida de Trello devolvió un error HTTP ' + response.status);
                }
                statusDiv.textContent = '¡Documento modificado y adjuntado en la tarjeta con éxito!';
                event.target.value = ''; 
                t.sizeTo(document.body).done();
              })
              .catch(function (err) {
                console.error("Fallo de subida API:", err);
                statusDiv.textContent = 'Fallo en la subida. ' + (err.message || 'Comprueba los logs.');
                t.sizeTo(document.body).done();
              });

          } catch (error) {
            console.error("Detalles del error PizZip:", error);
            statusDiv.textContent = 'Error: ' + error.message;
            t.sizeTo(document.body).done();
          }
        };
        reader.readAsArrayBuffer(file);
      });
    });

    // Lógica para procesar el Documento Excel
    document.getElementById('excel-upload').addEventListener('change', function (event) {
      if (!event.target.files || event.target.files.length === 0) return;

      var file = event.target.files[0];
      var statusDiv = document.getElementById('upload-status');
      statusDiv.textContent = 'Procesando ' + file.name + '...';
      t.sizeTo(document.body).done();

      // Datos UNIFICADOS
      getUnifiedFields(t).then(function (data) {
        var fields = data.fields;

        var reader = new FileReader();
        reader.onload = async function (e) {
          try {
            var workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(e.target.result);

            workbook.eachSheet(function (worksheet, sheetId) {
              worksheet.eachRow(function (row, rowNumber) {
                row.eachCell(function (cell, colNumber) {
                  if (cell.value) {
                    if (cell.value.richText) {
                      cell.value.richText.forEach(function (rt) {
                        if (rt.text) {
                          rt.text = rt.text.replace(/\{\{Nombre\}\}/gi, fields.nombre)
                            .replace(/\{\{DNI\}\}/gi, fields.dni)
                            .replace(/\{\{Domicilio\}\}/gi, fields.domicilio)
                            .replace(/\{\{Teléfono\}\}/gi, fields.telefono)
                            .replace(/\{\{Telefono\}\}/gi, fields.telefono)
                            .replace(/\{\{Profesión\}\}/gi, fields.profesion)
                            .replace(/\{\{Observaciones\}\}/gi, fields.observaciones)
                            .replace(/\{\{Fecha\}\}/gi, fields.fecha)
                            .replace(/\{\{Hora\}\}/gi, fields.hora)
                            .replace(/\{\{Lugar\}\}/gi, fields.lugar)
                            .replace(/\{\{Ciudad\}\}/gi, fields.ciudad)
                            .replace(/\{\{Matrícula1\}\}/gi, fields.matricula1)
                            .replace(/\{\{Aseguradora1\}\}/gi, fields.aseguradora1)
                            .replace(/\{\{Matrícula2\}\}/gi, fields.matricula2)
                            .replace(/\{\{Aseguradora2\}\}/gi, fields.aseguradora2)
                            .replace(/\{\{Parrafada\}\}/gi, fields.parrafada);
                        }
                      });
                    } else if (typeof cell.value === 'string') {
                      cell.value = cell.value.replace(/\{\{Nombre\}\}/gi, fields.nombre)
                        .replace(/\{\{DNI\}\}/gi, fields.dni)
                        .replace(/\{\{Domicilio\}\}/gi, fields.domicilio)
                        .replace(/\{\{Teléfono\}\}/gi, fields.telefono)
                        .replace(/\{\{Telefono\}\}/gi, fields.telefono)
                        .replace(/\{\{Profesión\}\}/gi, fields.profesion)
                        .replace(/\{\{Observaciones\}\}/gi, fields.observaciones)
                        .replace(/\{\{Fecha\}\}/gi, fields.fecha)
                        .replace(/\{\{Hora\}\}/gi, fields.hora)
                        .replace(/\{\{Lugar\}\}/gi, fields.lugar)
                        .replace(/\{\{Ciudad\}\}/gi, fields.ciudad)
                        .replace(/\{\{Matrícula1\}\}/gi, fields.matricula1)
                        .replace(/\{\{Aseguradora1\}\}/gi, fields.aseguradora1)
                        .replace(/\{\{Matrícula2\}\}/gi, fields.matricula2)
                        .replace(/\{\{Aseguradora2\}\}/gi, fields.aseguradora2)
                        .replace(/\{\{Parrafada\}\}/gi, fields.parrafada);
                      
                      if (fields.parrafada.includes('\n')) {
                        cell.alignment = { wrapText: true };
                      }
                    }
                  }
                });
              });
            });

            var buffer = await workbook.xlsx.writeBuffer();
            var outContent = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            var nombreFinal = "PRESUPUESTO_" + fields.nombre.replace(/\s+/g, '_') + ".xlsx";

            statusDiv.textContent = 'Autenticando con Trello API...';

            t.getRestApi()
              .getToken()
              .then(function (token) {
                if (!token) {
                  return t.getRestApi().authorize({
                    scope: 'read,write',
                    expiration: 'never',
                    return_url: window.location.href
                  });
                }
                return token;
              })
              .then(function (token) {
                statusDiv.textContent = 'Subiendo Excel directamente a Trello...';

                var formData = new FormData();
                formData.append("key", t.getRestApi().appKey);
                formData.append("token", token);
                formData.append("file", outContent, nombreFinal);
                formData.append("name", nombreFinal);

                var cardId = t.getContext().card;
                var urlParams = new URLSearchParams();
                urlParams.append('key', t.getRestApi().appKey);
                urlParams.append('token', token);

                return fetch(`https://api.trello.com/1/cards/${cardId}/attachments?${urlParams.toString()}`, {
                  method: 'POST',
                  body: formData
                });
              })
              .then(function (response) {
                if (!response.ok) {
                  throw new Error('La subida de Trello devolvió un error HTTP ' + response.status);
                }
                statusDiv.textContent = '¡Excel modificado y adjuntado con éxito!';
                event.target.value = ''; 
                t.sizeTo(document.body).done();
              })
              .catch(function (err) {
                console.error("Fallo de subida API:", err);
                statusDiv.textContent = 'Fallo en la subida.';
                t.sizeTo(document.body).done();
              });

          } catch (error) {
            console.error("Error procesando Excel:", error);
            statusDiv.textContent = 'Error: ' + error.message;
            t.sizeTo(document.body).done();
          }
        };
        reader.readAsArrayBuffer(file);
      });
    });

    // Botón para visualizar la extracción unificada
    document.getElementById('boton-desc').addEventListener('click', function () {
      getUnifiedFields(t).then(function (data) {
        var fields = data.fields;
        var container = document.getElementById('descripcion-container');
        
        var html = "<strong>Ficha unificada del Cliente (datos de " + data.count + " tarjetas):</strong><br><br>";
        html += "• Nombre: " + fields.nombre + "<br>" +
                "• DNI: " + fields.dni + "<br>" +
                "• Teléfono: " + fields.telefono + "<br>" +
                "• Fecha del siniestro: " + fields.fecha + "<br>" +
                "• Hora: " + fields.hora + "<br>" +
                "• Lugar: " + fields.lugar + "<br>" +
                "• Ciudad: " + fields.ciudad + "<br>" +
                "<div style='margin: 10px 0; padding: 5px; background: #e2f0d9; border-radius: 3px;'>" +
                "  <strong>🚗 Vehículo Propio:</strong> " + fields.matricula1 + " (" + fields.aseguradora1 + ")<br>" +
                "  <strong>🚘 Vehículo Contrario:</strong> " + fields.matricula2 + " (" + fields.aseguradora2 + ")" +
                "</div>" +
                "• Profesión: " + fields.profesion + "<br>" +
                "• Domicilio: " + fields.domicilio + "<br>" +
                "• Observaciones: " + fields.observaciones + "<br>" +
                "• Parrafada acumulada: <pre style='margin: 5px 0; background: #fafafa; padding: 10px; font-size: 11px; white-space: pre-wrap;'>" + (fields.parrafada || "Sin datos") + "</pre>";

        container.innerHTML = html;
        container.style.display = 'block';
        t.sizeTo(document.body).done();
      });
    });

    t.render(function () {
      t.sizeTo(document.body).done();
    });
  </script>
</body>
