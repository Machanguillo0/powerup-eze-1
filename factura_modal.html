  <script>
    var t = window.TrelloPowerUp.iframe({
      appKey: '30767998cbb7b57a692e8bb50cfa9a9c',
      appName: 'Antigravity'
    });

    var cachedData = null;

    // --- FUNCIONES AUXILIARES DE PARSEO Y FORMATEO ---
    function parseSpanishFloat(str) {
      if (!str) return 0;
      var cleaned = str.replace(/[^0-9.,]/g, '');
      if (!cleaned) return 0;
      if (cleaned.indexOf('.') > -1 && cleaned.indexOf(',') > -1) {
        cleaned = cleaned.replace(/\./g, '').replace(',', '.');
      } else if (cleaned.indexOf(',') > -1) {
        cleaned = cleaned.replace(',', '.');
      } else if (cleaned.indexOf('.') > -1) {
        var parts = cleaned.split('.');
        var lastPart = parts[parts.length - 1];
        if (lastPart.length === 3) {
          cleaned = cleaned.replace(/\./g, '');
        }
      }
      return parseFloat(cleaned) || 0;
    }

    function formatSpanishCurrency(value) {
      if (isNaN(value)) return "0,00 ã˜";
      return value.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ã˜";
    }

    function getTaxPercentage(fields) {
      var pctKey = Object.keys(fields).find(function(k) {
        var normalized = k.toLowerCase().replace(/[^a-z0-9]/g, '');
        return normalized === 'porcentajeimpuestos' || normalized === 'impuestos';
      });
      if (pctKey) {
        var valStr = String(fields[pctKey]);
        var cleaned = valStr.replace(/[^0-9.,]/g, '').replace(',', '.');
        var val = parseFloat(cleaned) || 0;
        if (val > 0 && val < 1) {
          val = val * 100;
        }
        return val;
      }
      return 0;
    }

    function evalFormulaIfNeeded(val) {
      if (!val) return val;
      var trimmed = val.trim();
      if (/\b\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}\b/.test(trimmed)) return trimmed;
      if (/[a-zA-ZûÀûˋûÙû°û¤ûûûûûûÝû]/.test(trimmed)) return trimmed;
      if (/^\+[0-9\s]+$/.test(trimmed)) return trimmed;
      
      if (/^[0-9\s\+\-\*\/\.\(\)\%]+$/.test(trimmed)) {
        try {
          var expr = trimmed.replace(/%/g, '/100');
          var result = new Function('return ' + expr)();
          if (typeof result === 'number' && !isNaN(result) && isFinite(result)) {
            return String(Math.round(result * 100) / 100);
          }
        } catch (e) {
          return trimmed;
        }
      }
      return trimmed;
    }

    function evaluateValueWithContext(rawVal, contextMap) {
      if (!rawVal) return "";
      var val = rawVal.trim();
      var lastBraceIndex = val.lastIndexOf('}}');
      if (lastBraceIndex > -1) {
        var tail = val.substring(lastBraceIndex + 2);
        var tailEquals = tail.indexOf('=');
        var tailColon = tail.indexOf(':');
        var stripIndex = -1;
        if (tailEquals > -1 && tailColon > -1) {
          stripIndex = Math.min(tailEquals, tailColon);
        } else if (tailEquals > -1) {
          stripIndex = tailEquals;
        } else if (tailColon > -1) {
          stripIndex = tailColon;
        }
        if (stripIndex > -1) {
          val = val.substring(0, lastBraceIndex + 2 + stripIndex).trim();
        }
      }
      
      if (val.indexOf('{{') > -1 && val.indexOf('}}') > -1) {
        var replaced = val.replace(/\{\{([^}]+)\}\}/g, function(match, keyInside) {
          var normalizedKey = keyInside.toLowerCase()
                                       .normalize("NFD")
                                       .replace(/[\u0300-\u036f]/g, "")
                                       .replace(/\s+/g, ' ')
                                       .trim();
          var resolvedVal = contextMap[normalizedKey];
          if (resolvedVal === undefined || resolvedVal === null) resolvedVal = "0";
          var cleanedNum = String(resolvedVal).replace(/[^0-9.,-]/g, '');
          if (cleanedNum.indexOf('.') > -1 && cleanedNum.indexOf(',') > -1) {
            cleanedNum = cleanedNum.replace(/\./g, '').replace(',', '.');
          } else if (cleanedNum.indexOf(',') > -1) {
            cleanedNum = cleanedNum.replace(',', '.');
          } else if (cleanedNum.indexOf('.') > -1) {
            var parts = cleanedNum.split('.');
            var lastPart = parts[parts.length - 1];
            if (lastPart.length === 3) {
              cleanedNum = cleanedNum.replace(/\./g, '');
            }
          }
          return cleanedNum || "0";
        });
        return evalFormulaIfNeeded(replaced);
      }
      return evalFormulaIfNeeded(val);
    }

    function getNumericFieldValue(fields, possibleKeys) {
      for (var i = 0; i < possibleKeys.length; i++) {
        var rawKey = possibleKeys[i];
        var cleanKey = rawKey.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
        var val = null;
        for (var k in fields) {
          if (fields.hasOwnProperty(k)) {
            var normK = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
            if (normK === cleanKey) {
              val = fields[k];
              break;
            }
          }
        }
        if (val !== undefined && val !== null) {
          var cleanVal = String(val).replace(/[^0-9.,-]/g, '');
          if (!cleanVal) continue;
          if (cleanVal.indexOf('.') > -1 && cleanVal.indexOf(',') > -1) {
            cleanVal = cleanVal.replace(/\./g, '').replace(',', '.');
          } else if (cleanVal.indexOf(',') > -1) {
            cleanVal = cleanVal.replace(',', '.');
          } else if (cleanVal.indexOf('.') > -1) {
            var parts = cleanVal.split('.');
            var lastPart = parts[parts.length - 1];
            if (lastPart.length === 3) {
              cleanVal = cleanVal.replace(/\./g, '');
            }
          }
          var parsedFloat = parseFloat(cleanVal);
          if (!isNaN(parsedFloat)) return parsedFloat;
        }
      }
      return null;
    }

    function updateImportesCardIfNeeded(t, cardId, currentDesc, calculatedValue) {
      if (!cardId || !currentDesc) return;
      t.getRestApi().isAuthorized().then(function(auth) {
        if (!auth) return;
        t.getRestApi().getToken().then(function(token) {
          if (!token) return;
          var lines = currentDesc.split('\n');
          var updated = false;
          var newLines = lines.map(function(line) {
            var sepIndex = line.indexOf(':');
            if (sepIndex === -1) sepIndex = line.indexOf('=');
            if (sepIndex > -1) {
              var key = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim();
              var keyClean = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
              if (keyClean === "a facturar") {
                var formulaPart = line.substring(0, sepIndex + 1).trim();
                var valPart = line.substring(sepIndex + 1).trim();
                var lastBrace = valPart.lastIndexOf('}}');
                if (lastBrace > -1) {
                  var formula = valPart.substring(0, lastBrace + 2).trim();
                  var newLineText = formulaPart + " " + formula + " = " + calculatedValue;
                  if (line.trim() !== newLineText.trim()) {
                    updated = true;
                    return newLineText;
                  }
                } else {
                  var newLineText = key + ": " + calculatedValue;
                  if (line.trim() !== newLineText.trim()) {
                    updated = true;
                    return newLineText;
                  }
                }
              }
            }
            return line;
          });
          
          if (updated) {
            var newDesc = newLines.join('\n');
            var appKey = t.getRestApi().appKey;
            fetch(`https://api.trello.com/1/cards/${cardId}?key=${appKey}&token=${token}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ desc: newDesc })
            });
          }
        });
      });
    }

    function extractFields(desc) {
      var fields = {
        nombre: "Cliente Desconocido",
        dni: "___________",
        domicilio: "___________",
        telefono: "___________",
        profesion: "___________",
        observaciones: "___________",
        fecha: "___________",
        hora: "___________",
        lugar: "___________",
        ciudad: "___________",
        matricula1: "___________",
        aseguradora1: "___________",
        matricula2: "___________",
        aseguradora2: "___________",
        parrafada: "",
        fecha_sistema: "___________",
        fecha_ultima: "___________",
        fecha_cierre: "___________",
        fecha_facturacion: "___________",
        fecha_resolucion: "___________",
        fecha_designa: "___________",
        fecha_reclamacion: "___________",
        fecha_apertura: "___________",
        fecha_siniestro: "___________",
        factura: "___________"
      };

      if (!desc) return fields;

      var m;
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*NOMBRE Y APELLIDOS\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.nombre = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DNI\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.dni = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DOMICILIO\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.domicilio = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:TELûFONO|Tel[eûˋ]fono|Tlf|Tel)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.telefono = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*PROFESI[Oû]N\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.profesion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*OBSERVACIONES\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.observaciones = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:FECHA DEL SINIESTRO|Fecha)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha = m[1].replace(/[*_~`]/g, '').replace(/\s*\(.*\)\s*$/, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:HORA)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.hora = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:LUGAR)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.lugar = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:CIUDAD)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.ciudad = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha del sistema\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_sistema = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha û¤ltima actuaciû°n\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_ultima = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha cierre expediente\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_cierre = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha(?: de)? facturaciû°n\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_facturacion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha de resoluciû°n\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_resolucion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha de comunicaciû°n designa(?:ciû°n)?\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_designa = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha(?: de)? reclamaciû°n previa\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_reclamacion = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha (?:apertura|creaciû°n) de? expediente\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_apertura = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*Fecha siniestro\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.fecha_siniestro = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:NûMERO DE FACTURA|Numero de factura|Nô¤ Factura|Nô¤ de Factura)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.factura = m[1].replace(/[*_~`]/g, '').trim(); }

      var vehicleLookahead = "(?=\\n\\s*(?:VEH[ûI]CULO CONTRARIO|VEH[ûI]CULO PROPIO|PARRAFADA|NOMBRE|DNI|DOMICILIO|PROFESI[Oû]N|TEL[Eû]FONO|EMAIL|OBSERVACIONES)|$)";
      var propioMatch = desc.match(new RegExp("(?:^|\\n)[ \\t]*[*_~`#]*\\s*VEH[ûI]CULO PROPIO[\\s\\S]*?" + vehicleLookahead, "i"));
      if (propioMatch) {
        var pText = propioMatch[0];
        if (m = pText.match(/(?:^|\n)[ \t]*MATR[ûI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula1 = m[1].trim(); }
        if (m = pText.match(/(?:^|\n)[ \t]*ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora1 = m[1].trim(); }
      }
      var contrarioMatch = desc.match(new RegExp("(?:^|\\n)[ \\t]*[*_~`#]*\\s*VEH[ûI]CULO CONTRARIO[\\s\\S]*?" + vehicleLookahead, "i"));
      if (contrarioMatch) {
        var cText = contrarioMatch[0];
        if (m = cText.match(/(?:^|\n)[ \t]*MATR[ûI]CULA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.matricula2 = m[1].trim(); }
        if (m = cText.match(/(?:^|\n)[ \t]*ASEGURADORA[^:]*[:\s-]+\s*([^\n\r]*)/i)) { fields.aseguradora2 = m[1].trim(); }
      }

      var parrafadaRegex = /PARRAFADA[^:]*[:\s-]+\s*/i;
      var startMatch = desc.match(parrafadaRegex);
      if (startMatch) {
        var startIndex = startMatch.index + startMatch[0].length;
        var remainingDesc = desc.substring(startIndex);
        var nextHeaderIndex = remainingDesc.length;
        var keywords = ["NOMBRE", "DNI", "DOMICILIO", "TELûFONO", "TELEFONO", "TLF", "PROFESI[ûO]N", "OBSERVACIONES", "FECHA", "HORA", "LUGAR", "CIUDAD"];
        keywords.forEach(function (key) {
          var regex = new RegExp("\\n\\s*[*_~`#]*\\s*" + key, "i");
          var match = remainingDesc.match(regex);
          if (match && match.index < nextHeaderIndex) nextHeaderIndex = match.index;
        });
        var genericMatch = remainingDesc.match(/\n\s*[*_~`#]*\\s*[A-Zûûûûûû ]{3,}\s*[:]/);
        if (genericMatch && genericMatch.index < nextHeaderIndex) nextHeaderIndex = genericMatch.index;
        var separatorMatch = remainingDesc.match(/\n\s*[-=_]{3,}/);
        if (separatorMatch && separatorMatch.index < nextHeaderIndex) nextHeaderIndex = separatorMatch.index;

        fields.parrafada = remainingDesc.substring(0, nextHeaderIndex).replace(/[*_~`]/g, '').trim();
      }
      return fields;
    }

    function parseChecklistsToUnified(checklists, unified) {
      var ch = checklists.find(function(c) {
        var n = c.name.trim().toLowerCase();
        return n === "relaciû°n de facturas generadas" || 
               n === "relacion de facturas generadas" || 
               n === "relaaciû°n de facturas generadas" || 
               n === "relaacion de facturas generadas" ||
               n.indexOf("relaciû°n de facturas") > -1 ||
               n.indexOf("relacion de facturas") > -1 ||
               n.indexOf("relaaciû°n de facturas") > -1;
      });
      if (ch && ch.checkItems && ch.checkItems.length > 0) {
        unified._hasChecklistInvoices = true;
        unified.factura = "___________";
        unified.fecha_facturacion = "___________";
        unified.importe_facturacion = "___________";
        unified.total_factura = "___________";
        unified.total_facturado = "___________";
        unified.importe_facturado = "___________";
        for (var s = 2; s <= 10; s++) {
          delete unified["factura" + s];
          delete unified["fecha_facturacion" + s];
          delete unified["importe_facturacion" + s];
          delete unified["total_factura" + s];
        }
        var checkItems = ch.checkItems.concat().sort(function(a, b) { return a.pos - b.pos; });
        checkItems.forEach(function(item, index) {
          var idx = index + 1;
          var suffix = (idx === 1) ? '' : idx;
          var parts = item.name.split('|').map(function(s) { return s.trim(); });
          if (parts.length >= 2) {
            var fDate = parts[0] || "___________";
            var fNum = "___________";
            var numPart = parts.find(function(p) { return /^(?:N[ô¤ô¯o]:|N[ô¤ô¯o]\s*:|Factura:|Num:)/i.test(p); });
            if (numPart) {
              fNum = numPart.replace(/^(?:N[ô¤ô¯o]:|N[ô¤ô¯o]\s*:|Factura:|Num:)\s*/i, '').trim();
            } else {
              fNum = parts[1] || "___________";
            }
            var fAmount = "___________";
            var basePart = parts.find(function(p) { return /^(?:Base:|Importe:)/i.test(p); });
            if (basePart) {
              fAmount = basePart.replace(/^(?:Base:|Importe:)\s*/i, '').trim();
            } else {
              fAmount = parts[parts.length - 1] || "___________";
            }
            var fTotal = "___________";
            var totalPart = parts.find(function(p) { return /^(?:Total:)/i.test(p); });
            if (totalPart) {
              fTotal = totalPart.replace(/^(?:Total:)\s*/i, '').trim();
            } else {
              fTotal = fAmount;
            }
            unified["factura" + suffix] = fNum;
            unified["fecha_facturacion" + suffix] = fDate;
            unified["importe_facturacion" + suffix] = fAmount;
            unified["total_factura" + suffix] = fTotal;
            if (idx === 1) {
              unified.factura = fNum;
              unified.fecha_facturacion = fDate;
              unified.importe_facturacion = fAmount;

              ];
              for (var idx = 2; idx <= 10; idx++) {
                historyKeys.push({ label: "**Fecha de facturaciû°n " + idx + ":**", prop: "fecha_facturacion" + idx });
                historyKeys.push({ label: "**Nû¤mero de factura " + idx + ":**", prop: "factura" + idx });
                historyKeys.push({ label: "**Importe facturaciû°n " + idx + ":**", prop: "importe_facturacion" + idx });
                historyKeys.push({ label: "**Total factura " + idx + ":**", prop: "total_factura" + idx });
              }

              if (historyCard) {
                var desc = historyCard.desc || "";
                var lines = desc.split('\n');
                var values = {};
                var localFacturasCard = cards.find(c => { var n = c.name.trim().toLowerCase(); return n === "facturas" || n === "facturaciû°n" || n === "facturacion"; });

                historyKeys.forEach(item => {
                  var regex = new RegExp(item.label.replace(/\*/g, '\\*') + "\\s*([^\\n]*)", "i");
                  var match = desc.match(regex);
                  values[item.prop] = match ? match[1].trim() : "___________";
                  if (values[item.prop] === "___________" && unified[item.prop] && unified[item.prop] !== "___________") {
                    values[item.prop] = unified[item.prop];
                  }
                  var isInvoiceProp = item.prop === "fecha_facturacion" || item.prop === "factura" || item.prop === "importe_facturacion" || item.prop === "total_factura" || /^(fecha_facturacion|factura|importe_facturacion|total_factura)\d+$/.test(item.prop);
                  if (isInvoiceProp && (unified._hasChecklistInvoices || !localFacturasCard)) {
                    values[item.prop] = unified[item.prop] || "___________";
                  }
                  if (forcedFields && forcedFields[item.prop]) values[item.prop] = forcedFields[item.prop];
                });

                var needsUpdate = false;
                if (values.fecha_sistema !== today) { values.fecha_sistema = today; needsUpdate = true; }
                if (isAction && values.fecha_ultima !== today) { values.fecha_ultima = today; needsUpdate = true; }
                if (unified.fecha !== "___________" && values.fecha !== unified.fecha) { values.fecha = unified.fecha; needsUpdate = true; }
                if (personalCard && values.fecha_apertura === "___________") {
                  values.fecha_apertura = new Date(1000 * parseInt(personalCard.id.substring(0, 8), 16)).toLocaleDateString('es-ES');
                  needsUpdate = true;
                }
                
                var newDescLines = [];
                historyKeys.forEach(item => {
                  var isSequential = false;
                  for (var s = 2; s <= 10; s++) {
                    if (item.prop === "fecha_facturacion" + s || item.prop === "factura" + s || item.prop === "importe_facturacion" + s || item.prop === "total_factura" + s) {
                      isSequential = true; break;
                    }
                  }
                  if (!isSequential || (values[item.prop] && values[item.prop] !== "___________")) {
                    newDescLines.push(item.label + " " + values[item.prop]);
                  }
                });

                lines.forEach(line => {
                  var lineLower = line.trim().toLowerCase();
                  var isKeyLine = historyKeys.some(item => {
                    var baseLabel = item.label.replace(/\*/g, '').replace(/:$/, '').trim().toLowerCase();
                    var variations = [baseLabel];
                    if (baseLabel.includes("creaciû°n de expediente")) variations.push("fecha apertura expediente");
                    if (baseLabel.includes("comunicaciû°n designaciû°n")) variations.push("fecha comunicaciû°n designa");
                    if (baseLabel.includes("siniestro")) variations.push("fecha siniestro");
                    return variations.some(v => lineLower.indexOf(v) === 0 || lineLower.includes(v));
                  });
                  if (!isKeyLine && line.trim() !== "") newDescLines.push(line);
                });

                var finalDesc = newDescLines.join('\n');
                if (needsUpdate || finalDesc !== desc) {
                  return fetch(`https://api.trello.com/1/cards/${historyCard.id}?key=${appKey}&token=${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ desc: finalDesc })
                  });
                }
              }
            });
        });
      });
    }

    // --- RENDER INICIAL ---
    t.render(function() {
      if (cachedData) {
        t.sizeTo(document.body).done();
        return;
      }

      var statusDiv = document.getElementById('status');
      statusDiv.textContent = "Obteniendo datos del tablero...";
      t.sizeTo(document.body).done();

      t.getRestApi().isAuthorized().then(function(auth) {
        if (!auth) {
          statusDiv.textContent = "Por favor, autoriza la API primero.";
          return t.getRestApi().authorize({ scope: 'read,write', expiration: 'never', return_url: window.location.href });
        }
        
        var resolvedValue = "";
        
        t.card('id', 'idList').then(function(currentCard) {
          return t.cards('id', 'name', 'desc', 'idList').then(function(cards) {
            var cardsInList = cards.filter(function(c) { return c.idList === currentCard.idList; });
            var importesCard = cardsInList.find(function(c) {
              return c.name.toLowerCase().includes("importes");
            });

            if (importesCard && importesCard.desc) {
              var lines = importesCard.desc.split('\n');
              lines.forEach(function(line) {
                var sepIndex = line.indexOf(':');
                if (sepIndex === -1) sepIndex = line.indexOf('=');
                if (sepIndex > -1) {
                  var k = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim().toLowerCase();
                  var v = line.substring(sepIndex + 1).replace(/[*_~`#]/g, '').trim();
                  if (k.indexOf("a facturar") > -1) {
                    resolvedValue = v;
                  }
                }
              });
            }
            
            if (resolvedValue) {
              var lastEquals = resolvedValue.lastIndexOf('=');
              if (lastEquals > -1) {
                resolvedValue = resolvedValue.substring(lastEquals + 1).trim();
              }
              resolvedValue = resolvedValue.replace(/ã˜/g, '').trim();
            }

            document.getElementById('importe-factura').value = resolvedValue || "0,00";
            statusDiv.textContent = "Introduce el importe y concepto, luego haz clic en 'Facturar'.";
            t.sizeTo(document.body).done();
          });
        });
      }).catch(function(err) {
        statusDiv.textContent = "Error al inicializar: " + err.message;
        t.sizeTo(document.body).done();
      });
    });

    // Acciû°n Cancelar
    document.getElementById('btn-cancelar').addEventListener('click', function(e) {
      e.preventDefault();
      t.closeModal();
    });

    // Acciû°n de Clicar Facturar -> Abre el selector de archivos
    document.getElementById('btn-facturar').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('factura-upload').click();
    });

    // Acciû°n de carga de plantilla Excel
    document.getElementById('factura-upload').addEventListener('change', function(event) {
      if (!event.target.files || event.target.files.length === 0) return;
      var file = event.target.files[0];
      var statusDiv = document.getElementById('status');
      statusDiv.textContent = 'Obteniendo datos cruzados de Clientes...';
      t.sizeTo(document.body).done();

      var inputImporte = document.getElementById('importe-factura').value.trim();
      var inputConcepto = document.getElementById('concepto-contabilidad').value.trim();

      getCrossBoardBillingData(t).then(function(data) {
        var fields = data.fields;
        var token = data.token;

        statusDiv.textContent = 'Autogenerando nû¤mero de factura correlativo...';
        t.sizeTo(document.body).done();

        return getAndUpdateInvoiceNumber(t, token).then(function(numFactura) {
          var seqIndex = 1;
          if (fields.factura && fields.factura !== "___________") {
            for (var idx = 2; idx <= 10; idx++) {
              var fKey = "factura" + idx;
              if (!fields[fKey] || fields[fKey] === "___________") {
                seqIndex = idx;
                break;
              }
            }
          }

          var today = new Date().toLocaleDateString('es-ES');
          var currentAmount = inputImporte;
          var currentConcept = inputConcepto;

          var taxPct = getTaxPercentage(fields);
          var baseNum = parseSpanishFloat(currentAmount);
          var totalNum = baseNum + (baseNum * taxPct / 100);
          var currentTotal = formatSpanishCurrency(totalNum);

          fields.factura = numFactura;
          fields.fecha_facturacion = today;
          fields.importe_facturado = currentAmount;
          fields.importe_facturacion = currentAmount;
          fields.total_factura = currentTotal;
          fields["total factura"] = currentTotal;
          fields.importe_factura = currentAmount;
          fields.concepto_contabilidad = currentConcept;

          statusDiv.textContent = 'Procesando plantilla Excel (' + numFactura + ')...';
          t.sizeTo(document.body).done();

          var reader = new FileReader();
          reader.onload = async function (e) {
            try {
              var workbook = new ExcelJS.Workbook();
              await workbook.xlsx.load(e.target.result);
              workbook.eachSheet(function (worksheet) {
                worksheet.eachRow(function (row) {
                  row.eachCell(function (cell) {
                    if (cell.value) {
                      if (cell.value.richText) {
                        cell.value.richText.forEach(function (rt) {
                          if (rt.text) {
                            rt.text = replaceExcelPlaceholders(rt.text, fields, false);
                          }
                        });
                      } else if (typeof cell.value === 'string') {
                        cell.value = replaceExcelPlaceholders(cell.value, fields, false);
                        if (fields.parrafada && fields.parrafada.includes('\n')) cell.alignment = { wrapText: true };
                      }
                    }
                  });
                });
              });

              var buffer = await workbook.xlsx.writeBuffer();
              var outContent = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
              var baseTemplateName = file.name.substring(0, file.name.lastIndexOf('.'));
              
              var cleanInvoiceNum = numFactura.replace(/\//g, "-");
              var nombreFinal = baseTemplateName + "_" + fields.nombre.replace(/\s+/g, '_') + "_" + cleanInvoiceNum + ".xlsx";

              statusDiv.textContent = 'Obteniendo tarjeta de Facturas...';
              t.sizeTo(document.body).done();

              getOrCreateFacturasCard(t, data.idList, token)
                .then(function(targetCardId) {
                  statusDiv.textContent = 'Subiendo Factura a Trello...';
                  t.sizeTo(document.body).done();

                  var formData = new FormData();
                  formData.append("key", t.getRestApi().appKey);
                  formData.append("token", token);
                  formData.append("file", outContent, nombreFinal);
                  formData.append("name", nombreFinal);

                  var urlParams = new URLSearchParams();
                  urlParams.append('key', t.getRestApi().appKey);
                  urlParams.append('token', token);

                  return fetch(`https://api.trello.com/1/cards/${targetCardId}/attachments?${urlParams.toString()}`, { method: 'POST', body: formData })
                    .then(function(res) {
                      if (!res.ok) throw new Error('Error al adjuntar el archivo.');
                      return targetCardId;
                    });
                })
                .then(function(targetCardIdSaved) {
                  var forced = {};
                  if (seqIndex === 1) {
                    forced.fecha_facturacion = today;
                    forced.factura = numFactura;
                    forced.importe_facturacion = currentAmount;
                    forced.total_factura = currentTotal;
                  } else {
                    forced["fecha_facturacion" + seqIndex] = today;
                    forced["factura" + seqIndex] = numFactura;
                    forced["importe_facturacion" + seqIndex] = currentAmount;
                    forced["total_factura" + seqIndex] = currentTotal;
                  }
                  
                  var targetHistoryListId = data.idListClientes || data.idList;
                  return updateHistoryCard(t, targetHistoryListId, true, forced, fields)
                    .then(function() {
                      statusDiv.textContent = 'Guardando registro histû°rico de la factura...';
                      t.sizeTo(document.body).done();
                      return updateInvoicesTableOnCard(t, targetCardIdSaved, token, today, numFactura, fields.nombre, fields.dni, currentAmount, currentTotal);
                    });
                })
                .then(function() {
                  statusDiv.textContent = 'ôÀFactura generada con ûˋxito!';
                  t.sizeTo(document.body).done();
                  setTimeout(function() {
                    t.closeModal();
                  }, 1500);
                }).catch(function (err) {
                  console.error(err);
                  statusDiv.textContent = 'Error subiendo / actualizando: ' + err.message;
                  t.sizeTo(document.body).done();
                });

            } catch (error) {
              console.error(error);
              statusDiv.textContent = 'Error procesando Excel: ' + error.message;
              t.sizeTo(document.body).done();
            }
          };
          reader.readAsArrayBuffer(file);
        });
      }).catch(function(err) {
        console.error(err);
        statusDiv.textContent = 'Error al obtener datos: ' + err.message;
        t.sizeTo(document.body).done();
      });
    });
  </script>
</body>
</html>
