<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generar Factura</title>
  <!-- Cargamos el estilo estándar de Trello para iframe modal -->
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <!-- Librerías necesarias para el procesamiento de Excel y descargas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Noto Sans", "Ubuntu", "Droid Sans", "Helvetica Neue", sans-serif;
      color: #172b4d;
      background-color: #f4f5f7;
      padding: 20px;
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: #5e6c84;
    }
    
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      box-sizing: border-box;
      border: 1px solid #ced4da;
      border-radius: 3px;
      background-color: #fff;
      color: #172b4d;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #1f845a;
      box-shadow: 0 0 0 2px rgba(31, 132, 90, 0.2);
    }
    
    .actions {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    
    button {
      height: 36px;
      padding: 0 16px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      border: none;
      box-sizing: border-box;
    }
    
    .btn-primary {
      background-color: #1f845a;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #137333;
    }
    
    .btn-secondary {
      background-color: #091e420f;
      color: #172b4d;
    }
    
    .btn-secondary:hover {
      background-color: #091e4224;
    }

    input[type="file"] {
      display: none;
    }

    .status-msg {
      margin-top: 12px;
      font-size: 13px;
      color: #5e6c84;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="form-group">
    <label for="importe-factura">Importe Factura (€)</label>
    <input type="text" id="importe-factura" placeholder="Ej. 1.250,50">
  </div>

  <div class="form-group">
    <label for="concepto-contabilidad">Concepto interno para contabilidad</label>
    <input type="text" id="concepto-contabilidad" value="Negociación">
  </div>

  <div class="actions">
    <button id="btn-cancelar" class="btn-secondary">Cancelar</button>
    <button id="btn-facturar" class="btn-primary">Facturar</button>
    <input type="file" id="factura-upload" accept=".xlsx" />
  </div>

  <div id="status" class="status-msg">Cargando datos del expediente...</div>

  <!-- Cargamos el script oficial de Trello Power-Up -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var t = window.TrelloPowerUp.iframe({
      appKey: '30767998cbb7b57a692e8bb50cfa9a9c',
      appName: 'Antigravity'
    });

    var cachedData = null;

    // Utilidades matemáticas y formateo (copiadas de section.html para auto-suficiencia)
    function parseSpanishFloat(str) {
      if (!str) return 0;
      var cleaned = str.replace(/[^0-9.,]/g, '');
      if (!cleaned) return 0;
      if (cleaned.indexOf('.') > -1 && cleaned.indexOf(',') > -1) {
        cleaned = cleaned.replace(/\./g, '').replace(',', '.');
      } else if (cleaned.indexOf(',') > -1) {
        cleaned = cleaned.replace(',', '.');
      } else if (cleaned.indexOf('.') > -1) {
        var parts = cleaned.split('.');
        var lastPart = parts[parts.length - 1];
        if (lastPart.length === 3) {
          cleaned = cleaned.replace(/\./g, '');
        }
      }
      return parseFloat(cleaned) || 0;
    }

    function formatSpanishCurrency(value) {
      if (isNaN(value)) return "0,00 €";
      return value.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
    }

    function getTaxPercentage(fields) {
      var pctKey = Object.keys(fields).find(function(k) {
        var normalized = k.toLowerCase().replace(/[^a-z0-9]/g, '');
        return normalized === 'porcentajeimpuestos' || normalized === 'impuestos';
      });
      if (pctKey) {
        var valStr = String(fields[pctKey]);
        var cleaned = valStr.replace(/[^0-9.,/]/g, '').replace(',', '.');
        var val = parseFloat(cleaned) || 0;
        if (val > 0 && val < 1) {
          val = val * 100;
        }
        return val;
      }
      return 0;
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function replaceExcelPlaceholders(text, fields, isProforma) {
      if (!text || typeof text !== 'string') return text;
      
      var facturaVal = isProforma ? "___________" : (fields.factura || "___________");
      
      var res = text.replace(/\{\{Nombre\}\}/gi, fields.nombre)
        .replace(/\{\{DNI\}\}/gi, fields.dni)
        .replace(/\{\{Domicilio\}\}/gi, fields.domicilio)
        .replace(/\{\{Teléfono\}\}/gi, fields.telefono || "___________")
        .replace(/\{\{Telefono\}\}/gi, fields.telefono || "___________")
        .replace(/\{\{Profesión\}\}/gi, fields.profesion || "___________")
        .replace(/\{\{Observaciones\}\}/gi, fields.observaciones || "___________")
        .replace(/\{\{Fecha del siniestro\}\}/gi, fields.fecha || "___________")
        .replace(/\{\{Hora\}\}/gi, fields.hora || "___________")
        .replace(/\{\{Lugar\}\}/gi, fields.lugar || "___________")
        .replace(/\{\{Ciudad\}\}/gi, fields.ciudad || "___________")
        .replace(/\{\{Matrícula1\}\}/gi, fields.matricula1 || "___________")
        .replace(/\{\{Aseguradora1\}\}/gi, fields.aseguradora1 || "___________")
        .replace(/\{\{Matrícula2\}\}/gi, fields.matricula2 || "___________")
        .replace(/\{\{Aseguradora2\}\}/gi, fields.aseguradora2 || "___________")
        .replace(/\{\{Fecha del sistema\}\}/gi, fields.fecha_sistema || "___________")
        .replace(/\{\{Fecha última actuación\}\}/gi, fields.fecha_ultima || "___________")
        .replace(/\{\{Fecha cierre expediente\}\}/gi, fields.fecha_cierre || "___________")
        .replace(/\{\{Fecha facturación\}\}/gi, fields.fecha_facturacion || "___________")
        .replace(/\{\{Fecha de resolución\}\}/gi, fields.fecha_resolucion || "___________")
        .replace(/\{\{Fecha comunicación designa\}\}/gi, fields.fecha_designa || "___________")
        .replace(/\{\{Fecha reclamación previa\}\}/gi, fields.fecha_reclamacion || "___________")
        .replace(/\{\{Fecha apertura expediente\}\}/gi, fields.fecha_apertura || "___________")
        .replace(/\{\{Fecha siniestro\}\}/gi, fields.fecha_siniestro || "___________")
        .replace(/\{\{Número de factura\}\}/gi, facturaVal)
        .replace(/\{\{Numero de factura\}\}/gi, facturaVal)
        .replace(/\{\{Importe final\}\}/gi, fields["importe final"] || fields["Importe final"] || "___________")
        .replace(/\{\{Importe facturacion\}\}/gi, fields.importe_facturado || fields.importe_facturacion || fields["importe a facturar"] || fields["Importe a facturar"] || fields["importe final"] || fields["Importe final"] || "___________")
        .replace(/\{\{Total Factura\}\}/gi, fields.total_factura || fields["total factura"] || "___________")
        .replace(/\{\{Total factura\}\}/gi, fields.total_factura || fields["total factura"] || "___________")
        .replace(/\{\{DDs\}\}/gi, fields.dds || "___________")
        .replace(/\{\{Mess\}\}/gi, fields.mess || "___________")
        .replace(/\{\{AAAAs\}\}/gi, fields.aaaas || "___________")
        .replace(/\{\{Número de expediente:\}\}/gi, fields.num_expediente || "___________")
        .replace(/\{\{Numero de expediente:\}\}/gi, fields.num_expediente || "___________")
        .replace(/\{\{Número de expediente\}\}/gi, fields.num_expediente || "___________")
        .replace(/\{\{Parrafada\}\}/gi, fields.parrafada || "")
        // Nuevos marcadores solicitados
        .replace(/\{\{Importe Factura\}\}/gi, fields.importe_factura || "___________")
        .replace(/\{\{Concepto interno para contabilidad\}\}/gi, fields.concepto_contabilidad || "___________");

      for (var key in fields) {
        if (fields.hasOwnProperty(key)) {
          var regex = new RegExp("\\{\\{" + escapeRegExp(key) + "\\}\\}", "gi");
          res = res.replace(regex, fields[key] || "");
        }
      }
      
      return res;
    }

    // Al renderizar, cargamos los datos usando la función del padre o re-calculando
    t.render(function() {
      if (cachedData) {
        t.sizeTo(document.body).done();
        return;
      }

      var statusDiv = document.getElementById('status');
      var parentWin = window.parent;
      
      statusDiv.textContent = "Obteniendo datos del tablero...";
      t.sizeTo(document.body).done();

      t.getRestApi().isAuthorized().then(function(auth) {
        if (!auth) {
          statusDiv.textContent = "Por favor, autoriza la API primero.";
          return t.getRestApi().authorize({ scope: 'read,write', expiration: 'never', return_url: window.location.href });
        }
        
        var resolvedValue = "";
        
        t.card('id', 'idList').then(function(currentCard) {
          return t.cards('id', 'name', 'desc', 'idList').then(function(cards) {
            var cardsInList = cards.filter(function(c) { return c.idList === currentCard.idList; });
            var importesCard = cardsInList.find(function(c) {
              return c.name.toLowerCase().includes("importes");
            });

            if (importesCard && importesCard.desc) {
              var lines = importesCard.desc.split('\n');
              lines.forEach(function(line) {
                var sepIndex = line.indexOf(':');
                if (sepIndex === -1) sepIndex = line.indexOf('=');
                if (sepIndex > -1) {
                  var k = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim().toLowerCase();
                  var v = line.substring(sepIndex + 1).replace(/[*_~`#]/g, '').trim();
                  if (k.indexOf("a facturar") > -1) {
                    resolvedValue = v;
                  }
                }
              });
            }
            
            if (resolvedValue) {
              var lastEquals = resolvedValue.lastIndexOf('=');
              if (lastEquals > -1) {
                resolvedValue = resolvedValue.substring(lastEquals + 1).trim();
              }
              resolvedValue = resolvedValue.replace(/€/g, '').trim();
            }

            document.getElementById('importe-factura').value = resolvedValue || "0,00";
            statusDiv.textContent = "Introduce el importe y concepto, luego haz clic en 'Facturar'.";
            t.sizeTo(document.body).done();
          });
        });
      }).catch(function(err) {
        statusDiv.textContent = "Error al inicializar: " + err.message;
        t.sizeTo(document.body).done();
      });
    });

    // Acción Cancelar
    document.getElementById('btn-cancelar').addEventListener('click', function(e) {
      e.preventDefault();
      t.closeModal();
    });

    // Acción de Clicar Facturar -> Abre el selector de archivos
    document.getElementById('btn-facturar').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('factura-upload').click();
    });

    // Acción de carga de plantilla Excel
    document.getElementById('factura-upload').addEventListener('change', function(event) {
      if (!event.target.files || event.target.files.length === 0) return;
      var file = event.target.files[0];
      var statusDiv = document.getElementById('status');
      statusDiv.textContent = 'Obteniendo datos cruzados de Clientes...';
      t.sizeTo(document.body).done();

      var inputImporte = document.getElementById('importe-factura').value.trim();
      var inputConcepto = document.getElementById('concepto-contabilidad').value.trim();

      var parentFrames = window.parent.document.querySelectorAll('iframe');
      var sectionFrameWindow = null;
      for (var i = 0; i < parentFrames.length; i++) {
        try {
          if (parentFrames[i].contentWindow && parentFrames[i].contentWindow.getCrossBoardBillingData) {
            sectionFrameWindow = parentFrames[i].contentWindow;
            break;
          }
        } catch(e) {}
      }

      if (!sectionFrameWindow) {
        statusDiv.textContent = "Error: No se pudo conectar con la ventana principal del Power-Up.";
        t.sizeTo(document.body).done();
        return;
      }

      sectionFrameWindow.getCrossBoardBillingData(t).then(function(data) {
        var fields = data.fields;
        var token = data.token;

        statusDiv.textContent = 'Autogenerando número de factura correlativo...';
        t.sizeTo(document.body).done();

        return sectionFrameWindow.getAndUpdateInvoiceNumber(t, token).then(function(numFactura) {
          var seqIndex = 1;
          if (fields.factura && fields.factura !== "___________") {
            for (var idx = 2; idx <= 10; idx++) {
              var fKey = "factura" + idx;
              if (!fields[fKey] || fields[fKey] === "___________") {
                seqIndex = idx;
                break;
              }
            }
          }

          var today = new Date().toLocaleDateString('es-ES');
          
          var currentAmount = inputImporte;
          var currentConcept = inputConcepto;

          var taxPct = getTaxPercentage(fields);
          var baseNum = parseSpanishFloat(currentAmount);
          var totalNum = baseNum + (baseNum * taxPct / 100);
          var currentTotal = formatSpanishCurrency(totalNum);

          fields.factura = numFactura;
          fields.fecha_facturacion = today;
          fields.importe_facturado = currentAmount;
          fields.importe_facturacion = currentAmount;
          fields.total_factura = currentTotal;
          fields["total factura"] = currentTotal;
          fields.importe_factura = currentAmount;
          fields.concepto_contabilidad = currentConcept;

          statusDiv.textContent = 'Procesando plantilla Excel (' + numFactura + ')...';
          t.sizeTo(document.body).done();

          var reader = new FileReader();
          reader.onload = async function (e) {
            try {
              var workbook = new ExcelJS.Workbook();
              await workbook.xlsx.load(e.target.result);
              workbook.eachSheet(function (worksheet) {
                worksheet.eachRow(function (row) {
                  row.eachCell(function (cell) {
                    if (cell.value) {
                      if (cell.value.richText) {
                        cell.value.richText.forEach(function (rt) {
                          if (rt.text) {
                            rt.text = replaceExcelPlaceholders(rt.text, fields, false);
                          }
                        });
                      } else if (typeof cell.value === 'string') {
                        cell.value = replaceExcelPlaceholders(cell.value, fields, false);
                        if (fields.parrafada && fields.parrafada.includes('\n')) cell.alignment = { wrapText: true };
                      }
                    }
                  });
                });
              });

              var buffer = await workbook.xlsx.writeBuffer();
              var outContent = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
              var baseTemplateName = file.name.substring(0, file.name.lastIndexOf('.'));
              
              var cleanInvoiceNum = numFactura.replace(/\//g, "-");
              var nombreFinal = baseTemplateName + "_" + fields.nombre.replace(/\s+/g, '_') + "_" + cleanInvoiceNum + ".xlsx";

              statusDiv.textContent = 'Obteniendo tarjeta de Facturas...';
              t.sizeTo(document.body).done();

              sectionFrameWindow.getOrCreateFacturasCard(t, data.idList, token)
                .then(function(targetCardId) {
                  statusDiv.textContent = 'Subiendo Factura a Trello...';
                  t.sizeTo(document.body).done();

                  var formData = new FormData();
                  formData.append("key", t.getRestApi().appKey);
                  formData.append("token", token);
                  formData.append("file", outContent, nombreFinal);
                  formData.append("name", nombreFinal);

                  var urlParams = new URLSearchParams();
                  urlParams.append('key', t.getRestApi().appKey);
                  urlParams.append('token', token);

                  return fetch(`https://api.trello.com/1/cards/${targetCardId}/attachments?${urlParams.toString()}`, { method: 'POST', body: formData })
                    .then(function(res) {
                      if (!res.ok) throw new Error('Error al adjuntar el archivo.');
                      return targetCardId;
                    });
                })
                .then(function(targetCardIdSaved) {
                  var forced = {};
                  if (seqIndex === 1) {
                    forced.fecha_facturacion = today;
                    forced.factura = numFactura;
                    forced.importe_facturacion = currentAmount;
                    forced.total_factura = currentTotal;
                  } else {
                    forced["fecha_facturacion" + seqIndex] = today;
                    forced["factura" + seqIndex] = numFactura;
                    forced["importe_facturacion" + seqIndex] = currentAmount;
                    forced["total_factura" + seqIndex] = currentTotal;
                  }
                  
                  var targetHistoryListId = data.idListClientes || data.idList;
                  return sectionFrameWindow.updateHistoryCard(t, targetHistoryListId, true, forced, fields)
                    .then(function() {
                      statusDiv.textContent = 'Guardando registro histórico de la factura...';
                      t.sizeTo(document.body).done();
                      return sectionFrameWindow.updateInvoicesTableOnCard(t, targetCardIdSaved, token, today, numFactura, fields.nombre, fields.dni, currentAmount, currentTotal);
                    });
                })
                .then(function() {
                  statusDiv.textContent = '¡Factura generada con éxito!';
                  t.sizeTo(document.body).done();
                  setTimeout(function() {
                    t.closeModal();
                  }, 1500);
                }).catch(function (err) {
                  console.error(err);
                  statusDiv.textContent = 'Error subiendo / actualizando: ' + err.message;
                  t.sizeTo(document.body).done();
                });

            } catch (error) {
              console.error(error);
              statusDiv.textContent = 'Error procesando Excel: ' + error.message;
              t.sizeTo(document.body).done();
            }
          };
          reader.readAsArrayBuffer(file);
        });
      }).catch(function(err) {
        console.error(err);
        statusDiv.textContent = 'Error al obtener datos: ' + err.message;
        t.sizeTo(document.body).done();
      });
    });
  </script>
</body>
</html>
