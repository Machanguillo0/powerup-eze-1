<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generar Factura</title>
  <!-- Cargamos el estilo estándar de Trello para iframe modal -->
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <!-- Librerías necesarias para el procesamiento de Excel y descargas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Noto Sans", "Ubuntu", "Droid Sans", "Helvetica Neue", sans-serif;
      color: #172b4d;
      background-color: #f4f5f7;
      padding: 20px;
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: #5e6c84;
    }
    
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      box-sizing: border-box;
      border: 1px solid #ced4da;
      border-radius: 3px;
      background-color: #fff;
      color: #172b4d;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #1f845a;
      box-shadow: 0 0 0 2px rgba(31, 132, 90, 0.2);
    }
    
    .actions {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    
    button {
      height: 36px;
      padding: 0 16px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      border: none;
      box-sizing: border-box;
    }
    
    .btn-primary {
      background-color: #1f845a;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #137333;
    }
    
    .btn-secondary {
      background-color: #091e420f;
      color: #172b4d;
    }
    
    .btn-secondary:hover {
      background-color: #091e4224;
    }

    input[type="file"] {
      display: none;
    }

    .status-msg {
      margin-top: 12px;
      font-size: 13px;
      color: #5e6c84;
      font-style: italic;
    }
    .billing-summary-bottom {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
      margin-bottom: 16px;
      padding: 10px 14px;
      background-color: #f4f5f7;
      border: 1px solid #dfe1e6;
      border-radius: 3px;
    }
    
    .summary-item-bottom {
      display: flex;
      flex-direction: column;
    }
    
    .summary-label-bottom {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      color: #5e6c84;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
    }
    
    .summary-value-bottom {
      font-size: 14px;
      font-weight: 700;
      color: #172b4d;
    }
    
    .editable-input {
      background-color: #eaf6ec !important;
      border: 1px solid #b2dbaa !important;
    }
    
    .editable-input:focus {
      border-color: #1f845a !important;
      box-shadow: 0 0 0 2px rgba(31, 132, 90, 0.25) !important;
    }
  </style>
</head>
<body>

  <div class="form-group">
    <label for="cliente-cobra-input">Cliente Cobra (€)</label>
    <input type="text" id="cliente-cobra-input" class="editable-input" placeholder="Ej. 10.000,00">
  </div>

  <div class="form-group">
    <label for="importe-factura">Importe Factura (€)</label>
    <input type="text" id="importe-factura" class="editable-input" placeholder="Ej. 1.250,50">
  </div>

  <div class="form-group">
    <label for="concepto-contabilidad">Concepto interno para contabilidad</label>
    <input type="text" id="concepto-contabilidad" value="Negociación">
  </div>

  <div class="billing-summary-bottom">
    <div class="summary-item-bottom">
      <span class="summary-label-bottom">Cliente Cobra sumarizado</span>
      <span class="summary-value-bottom" id="summary-cliente-cobra-sumarizado">0,00 €</span>
    </div>
    <div class="summary-item-bottom">
      <span class="summary-label-bottom">Total facturado</span>
      <span class="summary-value-bottom" id="summary-total-facturado">0,00 €</span>
    </div>
  </div>

  <div id="warning-exceso" style="display: none; background-color: #ffebe6; border-left: 4px solid #de350b; padding: 12px; margin-bottom: 16px; border-radius: 3px;">
    <div style="color: #ae2a02; font-weight: bold; font-size: 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      <span>Importe supera previsto facturar</span>
    </div>
    <div style="font-size: 12px; color: #5e6c84; margin-bottom: 8px; line-height: 1.4;">
      El importe acumulado facturado superará la previsión "A Facturar" de la tarjeta de Importes. ¿Deseas validar y continuar de todas formas?
    </div>
    <button id="btn-validar-exceso" style="background-color: #de350b; color: white; height: 32px; padding: 0 12px; font-size: 12px; font-weight: bold; border-radius: 3px; border: none; cursor: pointer; line-height: 32px;">Aceptar y Continuar</button>
  </div>

  <div class="actions">
    <button id="btn-cancelar" class="btn-secondary">Cancelar</button>
    <button id="btn-facturar" class="btn-primary">Facturar</button>
    <input type="file" id="factura-upload" accept=".xlsx" />
  </div>

  <div id="status" class="status-msg">Cargando datos del expediente...</div>

  <!-- Cargamos el script oficial de Trello Power-Up -->
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var currentAppKey = (window.location.hostname.indexOf('github.io') > -1 || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? '30767998cbb7b57a692e8bb50cfa9a9c' // Power-Up Prepro (GitHub Pages / Local)
      : '352ae509bc7ffb5b7f5826a024353794'; // Power-Up Pro (Netlify / Custom Domain)

    var t = window.TrelloPowerUp.iframe({
      appKey: currentAppKey,
      appName: 'Antigravity'
    });

    try {
      var lastKey = localStorage.getItem('antigravity_last_app_key');
      if (lastKey !== currentAppKey) {
        t.getRestApi().clearToken();
        localStorage.setItem('antigravity_last_app_key', currentAppKey);
      }
    } catch (e) {
      console.warn("localStorage no accesible:", e);
    }

    var cachedData = null;
    var globalAFacturar = 0;
    var globalFacturado = 0;
    var globalPorcentaje = 100;

    // Helper para actualizar el texto de estado en la UI de forma segura
    function setStatus(msg, allowHtml) {
      console.log("STATUS: " + msg);
      var statusDiv = document.getElementById('status');
      if (statusDiv) {
        if (allowHtml) {
          statusDiv.innerHTML = msg;
        } else {
          statusDiv.textContent = msg;
        }
        t.sizeTo(document.body).done();
      }
    }

    // --- FUNCIONES AUXILIARES DE PARSEO Y FORMATEO ---
    function parseSpanishFloat(str) {
      if (!str) return 0;
      var cleaned = str.replace(/[^0-9.,]/g, '');
      if (!cleaned) return 0;
      if (cleaned.indexOf('.') > -1 && cleaned.indexOf(',') > -1) {
        cleaned = cleaned.replace(/\./g, '').replace(',', '.');
      } else if (cleaned.indexOf(',') > -1) {
        cleaned = cleaned.replace(',', '.');
      } else if (cleaned.indexOf('.') > -1) {
        var parts = cleaned.split('.');
        var lastPart = parts[parts.length - 1];
        if (lastPart.length === 3) {
          cleaned = cleaned.replace(/\./g, '');
        }
      }
      return parseFloat(cleaned) || 0;
    }

    function formatSpanishCurrency(value) {
      if (isNaN(value)) return "0,00 €";
      return value.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
    }

    function getLatestSequentialValue(fields, baseKey) {
      var cleanBaseKey = baseKey.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
      var latestVal = 0;
      for (var idx = 1; idx <= 10; idx++) {
        var suffix = (idx === 1) ? '' : idx;
        var key = cleanBaseKey + suffix;
        var val = getNumericFieldValue(fields, [key]);
        if (val !== null) {
          latestVal = val;
        }
      }
      return latestVal;
    }

    function getTaxPercentage(fields) {
      var pctKey = Object.keys(fields).find(function(k) {
        var normalized = k.toLowerCase().replace(/[^a-z0-9]/g, '');
        return normalized === 'porcentajeimpuestos' || normalized === 'impuestos';
      });
      if (pctKey) {
        var valStr = String(fields[pctKey]);
        var cleaned = valStr.replace(/[^0-9.,]/g, '').replace(',', '.');
        var val = parseFloat(cleaned) || 0;
        if (val > 0 && val < 1) {
          val = val * 100;
        }
        return val;
      }
      return 0;
    }

    function evalFormulaIfNeeded(val) {
      if (!val) return val;
      var trimmed = val.trim();
      if (/\b\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}\b/.test(trimmed)) return trimmed;
      if (/[a-zA-ZáéíóúÁÉÍÓÚñÑ]/.test(trimmed)) return trimmed;
      if (/^\+[0-9\s]+$/.test(trimmed)) return trimmed;
      
      if (/^[0-9\s\+\-\*\/\.\(\)\%]+$/.test(trimmed)) {
        try {
          var expr = trimmed.replace(/%/g, '/100');
          var result = new Function('return ' + expr)();
          if (typeof result === 'number' && !isNaN(result) && isFinite(result)) {
            return String(Math.round(result * 100) / 100);
          }
        } catch (e) {
          return trimmed;
        }
      }
      return trimmed;
    }

    function evaluateValueWithContext(rawVal, contextMap) {
      if (!rawVal) return "";
      var val = rawVal.trim();
      var lastBraceIndex = val.lastIndexOf('}}');
      if (lastBraceIndex > -1) {
        var tail = val.substring(lastBraceIndex + 2);
        var tailEquals = tail.indexOf('=');
        var tailColon = tail.indexOf(':');
        var stripIndex = -1;
        if (tailEquals > -1 && tailColon > -1) {
          stripIndex = Math.min(tailEquals, tailColon);
        } else if (tailEquals > -1) {
          stripIndex = tailEquals;
        } else if (tailColon > -1) {
          stripIndex = tailColon;
        }
        if (stripIndex > -1) {
          val = val.substring(0, lastBraceIndex + 2 + stripIndex).trim();
        }
      }
      
      if (val.indexOf('{{') > -1 && val.indexOf('}}') > -1) {
        var replaced = val.replace(/\{\{([^}]+)\}\}/g, function(match, keyInside) {
          var normalizedKey = keyInside.toLowerCase()
                                       .normalize("NFD")
                                       .replace(/[\u0300-\u036f]/g, "")
                                       .replace(/\s+/g, ' ')
                                       .trim();
          var resolvedVal = contextMap[normalizedKey];
          if (resolvedVal === undefined || resolvedVal === null) resolvedVal = "0";
          var cleanedNum = String(resolvedVal).replace(/[^0-9.,-]/g, '');
          if (cleanedNum.indexOf('.') > -1 && cleanedNum.indexOf(',') > -1) {
            cleanedNum = cleanedNum.replace(/\./g, '').replace(',', '.');
          } else if (cleanedNum.indexOf(',') > -1) {
            cleanedNum = cleanedNum.replace(',', '.');
          } else if (cleanedNum.indexOf('.') > -1) {
            var parts = cleanedNum.split('.');
            var lastPart = parts[parts.length - 1];
            if (lastPart.length === 3) {
              cleanedNum = cleanedNum.replace(/\./g, '');
            }
          }
          return cleanedNum || "0";
        });
        return evalFormulaIfNeeded(replaced);
      }
      return evalFormulaIfNeeded(val);
    }

    function getNumericFieldValue(fields, possibleKeys) {
      for (var i = 0; i < possibleKeys.length; i++) {
        var rawKey = possibleKeys[i];
        var cleanKey = rawKey.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
        var val = null;
        for (var k in fields) {
          if (fields.hasOwnProperty(k)) {
            var normK = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
            if (normK === cleanKey) {
              val = fields[k];
              break;
            }
          }
        }
        if (val !== undefined && val !== null) {
          var cleanVal = String(val).replace(/[^0-9.,-]/g, '');
          if (!cleanVal) continue;
          if (cleanVal.indexOf('.') > -1 && cleanVal.indexOf(',') > -1) {
            cleanVal = cleanVal.replace(/\./g, '').replace(',', '.');
          } else if (cleanVal.indexOf(',') > -1) {
            cleanVal = cleanVal.replace(',', '.');
          } else if (cleanVal.indexOf('.') > -1) {
            var parts = cleanVal.split('.');
            var lastPart = parts[parts.length - 1];
            if (lastPart.length === 3) {
              cleanVal = cleanVal.replace(/\./g, '');
            }
          }
          var parsedFloat = parseFloat(cleanVal);
          if (!isNaN(parsedFloat)) return parsedFloat;
        }
      }
      return null;
    }

    function updateImportesCardIfNeeded(t, cardId, currentDesc, calculatedValue) {
      if (!cardId || !currentDesc) return;
      t.getRestApi().isAuthorized().then(function(auth) {
        if (!auth) return;
        t.getRestApi().getToken().then(function(token) {
          if (!token) return;
          var lines = currentDesc.split('\n');
          var updated = false;
          var newLines = lines.map(function(line) {
            var sepIndex = line.indexOf(':');
            if (sepIndex === -1) sepIndex = line.indexOf('=');
            if (sepIndex > -1) {
              var key = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim();
              var keyClean = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
              if (keyClean === "a facturar") {
                var formulaPart = line.substring(0, sepIndex + 1).trim();
                var valPart = line.substring(sepIndex + 1).trim();
                var lastBrace = valPart.lastIndexOf('}}');
                if (lastBrace > -1) {
                  var formula = valPart.substring(0, lastBrace + 2).trim();
                  var newLineText = formulaPart + " " + formula + " = " + calculatedValue;
                  if (line.trim() !== newLineText.trim()) {
                    updated = true;
                    return newLineText;
                  }
                } else {
                  var newLineText = key + ": " + calculatedValue;
                  if (line.trim() !== newLineText.trim()) {
                    updated = true;
                    return newLineText;
                  }
                }
              }
            }
            return line;
          });
          
          if (updated) {
            var newDesc = newLines.join('\n');
            var appKey = t.getRestApi().appKey;
            fetch(`https://api.trello.com/1/cards/${cardId}?key=${appKey}&token=${token}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ desc: newDesc })
            });
          }
        });
      });
    }

    function updateFacturadoInImportesCard(t, token, newTotalFacturado, newCobraSumarizado, currentCobra, seqIndex, invoiceAmount) {
      return t.card('idList').then(function(currentCard) {
        return t.cards('id', 'name', 'desc', 'idList').then(function(cards) {
          var cardsInList = cards.filter(function(c) { return c.idList === currentCard.idList; });
          var importesCard = cardsInList.find(function(c) {
            return c.name.toLowerCase().includes("importes");
          });
          if (!importesCard) return;

          var currentDesc = importesCard.desc || "";
          var lines = currentDesc.split(/\r?\n/);
          
          var formattedTotal = newTotalFacturado.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
          var formattedCobraSum = newCobraSumarizado.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
          var formattedCobra = currentCobra.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
          var formattedInvoiceAmount = invoiceAmount.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
          
          function isAnyBillingKey(keyClean) {
            var norm = keyClean.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
            return /^(clientecobra|clientecobrasumarizado|totalfacturado|importefacturado|importefacturacion|totalfactura)\d*$/i.test(norm);
          }

          function isPercentageKey(keyClean) {
            var norm = keyClean.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
            return norm.indexOf("porcentaje") > -1 || norm.indexOf("porcentage") > -1 || norm.indexOf("honorarios") > -1 || norm.indexOf("iva") > -1 || norm.indexOf("igic") > -1;
          }

          function isBaseKey(keyClean) {
            var norm = keyClean.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
            return norm.indexOf("principal") > -1 || norm.indexOf("base") > -1 || norm.indexOf("cuantia") > -1 || norm.indexOf("afacturar") > -1;
          }

          var parsedSeqCobra = {};
          var parsedSeqFacturado = {};

          var prunedLines = [];
          var lastPercentageIdx = -1;
          var lastBaseIdx = -1;

          lines.forEach(function(line) {
            var sepIndex = line.indexOf(':');
            if (sepIndex === -1) sepIndex = line.indexOf('=');
            if (sepIndex > -1) {
              var key = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim();
              var val = line.substring(sepIndex + 1).trim();
              var keyClean = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
              
              if (isAnyBillingKey(keyClean)) {
                var matchCobra = keyClean.match(/^cliente cobra\s*(\d*)$/i);
                if (matchCobra) {
                  var idx = parseInt(matchCobra[1], 10) || 1;
                  parsedSeqCobra[idx] = val;
                }
                var matchFacturado = keyClean.match(/^(importe facturado|total facturado|importe facturacion|total factura)\s*(\d*)$/i);
                if (matchFacturado) {
                  var idx = parseInt(matchFacturado[2], 10) || 1;
                  parsedSeqFacturado[idx] = val;
                }
                return;
              }

              if (isPercentageKey(keyClean)) {
                lastPercentageIdx = prunedLines.length;
              } else if (isBaseKey(keyClean)) {
                lastBaseIdx = prunedLines.length;
              }
            }
            prunedLines.push(line);
          });

          var insertIdx = prunedLines.length;
          if (lastPercentageIdx > -1) {
            insertIdx = lastPercentageIdx + 1;
          } else if (lastBaseIdx > -1) {
            insertIdx = lastBaseIdx + 1;
          }

          var accumLines = [
            "**Cliente cobra sumarizado**: " + formattedCobraSum,
            "**TOTAL FACTURADO**: " + formattedTotal
          ];

          prunedLines.splice(insertIdx, 0, accumLines[0], accumLines[1]);

          parsedSeqCobra[seqIndex] = formattedCobra;
          parsedSeqFacturado[seqIndex] = formattedInvoiceAmount;

          for (var i = 1; i <= seqIndex; i++) {
            var suffix = (i === 1) ? '' : i;
            var cobraVal = parsedSeqCobra[i] || (i === seqIndex ? formattedCobra : "___________");
            var factVal = parsedSeqFacturado[i] || (i === seqIndex ? formattedInvoiceAmount : "___________");
            
            if (cobraVal && cobraVal !== "___________" && cobraVal.indexOf('€') === -1) {
              cobraVal = cobraVal + " €";
            }
            if (factVal && factVal !== "___________" && factVal.indexOf('€') === -1) {
              factVal = factVal + " €";
            }

            prunedLines.push("**Cliente cobra" + suffix + "**: " + cobraVal);
            prunedLines.push("**Importe facturado" + suffix + "**: " + factVal);
          }

          var finalDesc = prunedLines.join('\n');
          var appKey = t.getRestApi().appKey;

          return fetch(`https://api.trello.com/1/cards/${importesCard.id}?desc=${encodeURIComponent(finalDesc)}&key=${appKey}&token=${token}`, {
            method: 'PUT'
          }).then(function(res) {
            if (!res.ok) throw new Error("Failed to update Importes card desc");
            return res.json();
          });
        });
      });
    }

    function extractFields(desc) {
      var fields = {
        nombre: "Cliente Desconocido",
        dni: "___________",
        domicilio: "___________",
        telefono: "___________",
        profesion: "___________",
        observaciones: "___________",
        fecha: "___________",
        hora: "___________",
        lugar: "___________",
        ciudad: "___________",
        matricula1: "___________",
        aseguradora1: "___________",
        matricula2: "___________",
        aseguradora2: "___________",
        parrafada: "",
        fecha_sistema: "___________",
        fecha_ultima: "___________",
        fecha_cierre: "___________",
        fecha_facturacion: "___________",
        fecha_resolucion: "___________",
        fecha_designa: "___________",
        fecha_reclamacion: "___________",
        fecha_apertura: "___________",
        fecha_siniestro: "___________",
        factura: "___________"
      };

      if (!desc) return fields;

      var m;
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*NOMBRE Y APELLIDOS\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.nombre = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DNI\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.dni = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*DOMICILIO\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.domicilio = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*(?:TELÉFONO|Tel[eé]fono|Tlf|Tel)\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.telefono = m[1].replace(/[*_~`]/g, '').trim(); }
      if (m = desc.match(/(?:^|\n)[ \t]*[*_~`#]*\s*PROFESI[OÓ]N\s*[*_~`#]*[ \t]*[:\s-]+\s*([^\n\r]*)/i)) { fields.profesion = m[1].replace(/[*_~`]/g, '').trim(); }

      var vehicleLookahead = "(?=\\n\\s*(?:VEH[ÍI]CULO CONTRARIO|VEH[ÍI]CULO PROPIO|PARRAFADA|NOMBRE|DNI|DOMICILIO|PROFESI[OÓ]N|TEL[EÉ]FONO|EMAIL|OBSERVACIONES)|$)";

      var parrafadaRegex = /PARRAFADA[^:]*[:\s-]+\s*/i;
      var startMatch = desc.match(parrafadaRegex);
      if (startMatch) {
        var startIndex = startMatch.index + startMatch[0].length;

        var nextHeaderIndex = remainingDesc.length;
        var keywords = ["NOMBRE", "DNI", "DOMICILIO", "TELÉFONO", "TELEFONO", "TLF", "PROFESI[ÓO]N", "OBSERVACIONES", "FECHA", "HORA", "LUGAR", "CIUDAD"];
        keywords.forEach(function (key) {
          var regex = new RegExp("\\n\\s*[*_~`#]*\\s*" + key, "i");
          var match = remainingDesc.match(regex);
          if (match && match.index < nextHeaderIndex) nextHeaderIndex = match.index;

        if (genericMatch && genericMatch.index < nextHeaderIndex) nextHeaderIndex = genericMatch.index;
        var separatorMatch = remainingDesc.match(/\n\s*[-=_]{3,}/);
        if (separatorMatch && separatorMatch.index < nextHeaderIndex) nextHeaderIndex = separatorMatch.index;

        fields.parrafada = remainingDesc.substring(0, nextHeaderIndex).replace(/[*_~`]/g, '').trim();
      }

    function cleanImportesDescForSync(currentDesc, N) {
      var lines = currentDesc.split(/\r?\n/);
      var prunedLines = [];
      
      function isAnyBillingKey(keyClean) {
        var norm = keyClean.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
        return /^(clientecobra|clientecobrasumarizado|totalfacturado|importefacturado|importefacturacion|totalfactura|facturado)\d*$/i.test(norm);
      }

      var parsedSeqCobra = {};
      var parsedSeqFacturado = {};

      lines.forEach(function(line) {
        var sepIndex = line.indexOf(':');
        if (sepIndex === -1) sepIndex = line.indexOf('=');
        if (sepIndex > -1) {
          var key = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim();
          var val = line.substring(sepIndex + 1).trim();
          var keyClean = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
          
          if (isAnyBillingKey(keyClean)) {
            var matchCobra = keyClean.match(/^cliente cobra\s*(\d*)$/i);
            if (matchCobra) {
              var idx = parseInt(matchCobra[1], 10) || 1;
              parsedSeqCobra[idx] = val;
            }
            var matchFacturado = keyClean.match(/^(importe facturado|total facturado|importe facturacion|total factura)\s*(\d*)$/i);
            if (matchFacturado) {
              var idx = parseInt(matchFacturado[2], 10) || 1;
              parsedSeqFacturado[idx] = val;
            }
            return;
          }
        }
        prunedLines.push(line);
      });

      if (N > 0) {
        var lastPercentageIdx = -1;
        var lastBaseIdx = -1;
        
        function isPercentageKey(keyClean) {
          var norm = keyClean.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
          return norm.indexOf("porcentaje") > -1 || norm.indexOf("porcentage") > -1 || norm.indexOf("honorarios") > -1 || norm.indexOf("iva") > -1 || norm.indexOf("igic") > -1;
        }
        function isBaseKey(keyClean) {
          var norm = keyClean.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
          return norm.indexOf("principal") > -1 || norm.indexOf("base") > -1 || norm.indexOf("cuantia") > -1 || norm.indexOf("afacturar") > -1;
        }

        prunedLines.forEach(function(line, index) {
          var sepIndex = line.indexOf(':');
          if (sepIndex === -1) sepIndex = line.indexOf('=');
          if (sepIndex > -1) {
            var key = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim();
            var keyClean = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();
            if (isPercentageKey(keyClean)) {
              lastPercentageIdx = index;
            } else if (isBaseKey(keyClean)) {
              lastBaseIdx = index;
            }
          }
        });

        var insertIdx = prunedLines.length;
        if (lastPercentageIdx > -1) {
          insertIdx = lastPercentageIdx + 1;
        } else if (lastBaseIdx > -1) {
          insertIdx = lastBaseIdx + 1;
        }

        var sumCobra = 0;
        var sumFacturado = 0;
        for (var i = 1; i <= N; i++) {
          var cobraVal = parsedSeqCobra[i];
          var factVal = parsedSeqFacturado[i];
          if (cobraVal && cobraVal !== "___________") {
            sumCobra += parseSpanishFloat(cobraVal);
          }
          if (factVal && factVal !== "___________") {
            sumFacturado += parseSpanishFloat(factVal);
          }
        }

        var formattedCobraSum = sumCobra.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
        var formattedTotal = sumFacturado.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";

        var accumLines = [
          "**Cliente cobra sumarizado**: " + formattedCobraSum,
          "**TOTAL FACTURADO**: " + formattedTotal
        ];

        prunedLines.splice(insertIdx, 0, accumLines[0], accumLines[1]);

        for (var i = 1; i <= N; i++) {
          var suffix = (i === 1) ? '' : i;
          var cobraVal = parsedSeqCobra[i] || "___________";
          var factVal = parsedSeqFacturado[i] || "___________";
          
          if (cobraVal && cobraVal !== "___________" && cobraVal.indexOf('€') === -1) {
            cobraVal = cobraVal + " €";
          }
          if (factVal && factVal !== "___________" && factVal.indexOf('€') === -1) {
            factVal = factVal + " €";
          }

          prunedLines.push("**Cliente cobra" + suffix + "**: " + cobraVal);
          prunedLines.push("**Importe facturado" + suffix + "**: " + factVal);
        }
      }

      var finalLines = [];
      prunedLines.forEach(function(line) {
        if (line.trim() === "") {
          if (finalLines.length > 0 && finalLines[finalLines.length - 1].trim() !== "") {
            finalLines.push("");
          }
        } else {
          finalLines.push(line);
        }
      });

      while (finalLines.length > 0 && finalLines[finalLines.length - 1].trim() === "") {
        finalLines.pop();
      }

      return finalLines.join('\n');
    }

                  var lines = clientImportesCard.desc.split('\n');
                  var rawMap = {};
                  var parsedPairs = [];
                  lines.forEach(line => {
                    line = line.trim();
                    if (!line) return;
                    var sepIndex = line.indexOf(':');
                    if (sepIndex === -1) sepIndex = line.indexOf('=');
                    if (sepIndex > -1) {
                      var k = line.substring(0, sepIndex).replace(/[*_~`#]/g, '').trim();
                      var v = line.substring(sepIndex + 1).replace(/[*_~`#]/g, '').trim();
                      if (k) {
                        parsedPairs.push({ key: k, val: v });
                        var normK = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim();

                    clientImportesFields[pair.key.toLowerCase()] = calculatedV;
                    var normK = pair.key.replace(/:/g, ' ').replace(/\s+/g, ' ').trim();

                    if (key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ').trim() === "a facturar") {

                    if (cobraVal !== null && pctVal !== null) {

                      clientImportesFields["A facturar"] = formatted;

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); // $& significa el carácter coincidente completo
    }

    // Helper para centralizar la sustitución de marcadores de posición en Excel (fijos y dinámicos)
    function replaceExcelPlaceholders(text, fields, isProforma) {
      if (!text || typeof text !== 'string') return text;
      
      var facturaVal = isProforma ? "___________" : (fields.factura || "___________");
      
      // 1. Reemplazo de marcadores estructurados fijos
      var res = text.replace(/\{\{Nombre\}\}/gi, fields.nombre)
        .replace(/\{\{DNI\}\}/gi, fields.dni)
        .replace(/\{\{Domicilio\}\}/gi, fields.domicilio)
        .replace(/\{\{Teléfono\}\}/gi, fields.telefono || "___________")
        .replace(/\{\{Telefono\}\}/gi, fields.telefono || "___________")
        .replace(/\{\{Profesión\}\}/gi, fields.profesion || "___________")
        .replace(/\{\{Observaciones\}\}/gi, fields.observaciones || "___________")
        .replace(/\{\{Fecha del siniestro\}\}/gi, fields.fecha || "___________")
        .replace(/\{\{Hora\}\}/gi, fields.hora || "___________")
        .replace(/\{\{Lugar\}\}/gi, fields.lugar || "___________")
        .replace(/\{\{Ciudad\}\}/gi, fields.ciudad || "___________")
        .replace(/\{\{Matrícula1\}\}/gi, fields.matricula1 || "___________")
        .replace(/\{\{Aseguradora1\}\}/gi, fields.aseguradora1 || "___________")
        .replace(/\{\{Matrícula2\}\}/gi, fields.matricula2 || "___________")
        .replace(/\{\{Aseguradora2\}\}/gi, fields.aseguradora2 || "___________")
        .replace(/\{\{Fecha del sistema\}\}/gi, fields.fecha_sistema || "___________")
        .replace(/\{\{Fecha última actuación\}\}/gi, fields.fecha_ultima || "___________")
        .replace(/\{\{Fecha cierre expediente\}\}/gi, fields.fecha_cierre || "___________")
        .replace(/\{\{Fecha facturación\}\}/gi, fields.fecha_facturacion || "___________")
        .replace(/\{\{Fecha de resolución\}\}/gi, fields.fecha_resolucion || "___________")
        .replace(/\{\{Fecha comunicación designa\}\}/gi, fields.fecha_designa || "___________")
        .replace(/\{\{Fecha reclamación previa\}\}/gi, fields.fecha_reclamacion || "___________")
        .replace(/\{\{Fecha apertura expediente\}\}/gi, fields.fecha_apertura || "___________")
        .replace(/\{\{Fecha siniestro\}\}/gi, fields.fecha_siniestro || "___________")
        .replace(/\{\{Número de factura\}\}/gi, facturaVal)
        .replace(/\{\{Numero de factura\}\}/gi, facturaVal)
        .replace(/\{\{Importe final\}\}/gi, fields["importe final"] || fields["Importe final"] || "___________")
        .replace(/\{\{Importe facturacion\}\}/gi, fields.importe_facturado || fields.importe_facturacion || fields["importe a facturar"] || fields["Importe a facturar"] || fields["importe final"] || fields["Importe final"] || "___________")
        .replace(/\{\{Total Factura\}\}/gi, fields.total_factura || fields["total factura"] || "___________")
        .replace(/\{\{Total factura\}\}/gi, fields.total_factura || fields["total factura"] || "___________")
        .replace(/\{\{DDs\}\}/gi, fields.dds || "___________")
        .replace(/\{\{Mess\}\}/gi, fields.mess || "___________")
        .replace(/\{\{AAAAs\}\}/gi, fields.aaaas || "___________")
        .replace(/\{\{Número de expediente:\}\}/gi, fields.num_expediente || "___________")
        .replace(/\{\{Numero de expediente:\}\}/gi, fields.num_expediente || "___________")
        .replace(/\{\{Número de expediente\}\}/gi, fields.num_expediente || "___________")
        .replace(/\{\{Parrafada\}\}/gi, fields.parrafada || "");

      // 2. Reemplazo dinámico para cualquier otro marcador adicional (Honorarios, Gastos, Total, etc)
      for (var key in fields) {
        if (fields.hasOwnProperty(key)) {
          var regex = new RegExp("\\{\\{\\s*" + escapeRegExp(key) + "\\s*\\}\\}", "gi");
          res = res.replace(regex, fields[key] || "");
        }
      }
      
      return res;
    }

      return t.lists('id', 'name').then(function(lists) {
        var paramList = lists.find(l => l.name.toUpperCase() === 'PARÁMETROS' || l.name.toUpperCase() === 'PARAMETROS');
        if (!paramList) throw new Error("No se encontró la lista 'PARÁMETROS'");

        return t.cards('id', 'name', 'desc', 'idList').then(openCards => {
          var configCard = openCards.find(c => c.idList === paramList.id && c.name && (c.name.toLowerCase().includes('gestión de facturas') || c.name.toLowerCase().includes('gestion de facturas')));
          if (!configCard) throw new Error("No se encontró tarjeta 'Gestión de facturas'");
            
            var desc = configCard.desc || "";
            var lines = desc.split(/\r?\n/);
            var year = new Date().getFullYear();
            var seq = 0;
            var otherLines = [];
            
            lines.forEach(line => {
              var trimmed = line.trim();
              if (!trimmed) return;
              if (/año.*factura/i.test(trimmed)) {
                var m = trimmed.match(/\d+/);
                if (m) year = parseInt(m[0], 10);
              } else if (/secuencial.*factura/i.test(trimmed)) {
                var m = trimmed.match(/\d+/);
                if (m) seq = Math.max(seq, parseInt(m[0], 10));
              } else {
                otherLines.push(line);
              }
            });
            
            var nextSeq = seq + 1;
            var numFactura = year + "/" + nextSeq;
            var newDesc = ["Año de factura: " + year, "Secuencial de factura: " + nextSeq].concat(otherLines).join("\n");

            return fetch(`https://api.trello.com/1/cards/${configCard.id}?key=${appKey}&token=${token}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ desc: newDesc })
            }).then(res => {
              if (!res.ok) throw new Error("Error al actualizar correlativo");
              return numFactura;
            });
          });
        });
    }

    function getOrCreateFacturasCard(t, idList, token) {
      var appKey = t.getRestApi().appKey;
      return fetch(`https://api.trello.com/1/lists/${idList}/cards?key=${appKey}&token=${token}`)
        .then(res => res.json())
        .then(cards => {
          var facturasCard = cards.find(c => c.name.trim().toLowerCase() === "facturas");
          if (facturasCard) return facturasCard.id;
          
          var newPos = 'top';
          if (cards.length > 1) newPos = (cards[0].pos + cards[1].pos) / 2;
          else if (cards.length === 1) newPos = cards[0].pos + 16384;
          
          return fetch(`https://api.trello.com/1/cards?idList=${idList}&name=Facturas&pos=${newPos}&key=${appKey}&token=${token}`, { method: 'POST' })
            .then(res => res.json())
            .then(newCard => newCard.id);
        });
    }

    function updateInvoicesTableOnCard(t, targetCardId, token, today, numFactura, nombreCliente, dniCliente, importeBase, importeIgic, importeTotal, concepto) {
      var appKey = t.getRestApi().appKey;
      var cleanNombre = (nombreCliente || "Cliente Desconocido").replace(/\|/g, " ");
      var cleanDni = (dniCliente || "___________").replace(/\|/g, " ");
      var cleanBase = (importeBase || "___________").replace(/\|/g, " ");
      var cleanIgic = (importeIgic || "___________").replace(/\|/g, " ");
      var cleanTotal = (importeTotal || "___________").replace(/\|/g, " ");
      var cleanConcepto = (concepto || "Negociación").replace(/\|/g, " ");

      return fetch(`https://api.trello.com/1/cards/${targetCardId}/checklists?key=${appKey}&token=${token}`)
        .then(res => res.json())
        .then(checklists => {
          var targetChecklistName = "Relación de Facturas Generadas";
          var ch = checklists.find(c => c.name === targetChecklistName);
          var newItemText = `${today} | Nº: ${numFactura} | ${cleanNombre} | DNI: ${cleanDni} | Base: ${cleanBase} | Igic: ${cleanIgic} | Total: ${cleanTotal} | MODO: T/T | ${cleanConcepto}`;

          if (ch) {
            var item = ch.checkItems.find(i => i.name.indexOf(`Nº: ${numFactura}`) > -1 || i.name.indexOf(`Nº:  ${numFactura}`) > -1);
            if (item) {
              var urlParams = new URLSearchParams({ name: newItemText });
              return fetch(`https://api.trello.com/1/cards/${targetCardId}/checklist/${ch.id}/checkItem/${item.id}?key=${appKey}&token=${token}&${urlParams.toString()}`, { method: 'PUT' });
            } else {
              var urlParams = new URLSearchParams({ name: newItemText });
              return fetch(`https://api.trello.com/1/checklists/${ch.id}/checkItems?key=${appKey}&token=${token}&${urlParams.toString()}`, { method: 'POST' });
            }
          } else {
            var urlParams = new URLSearchParams({ name: targetChecklistName });
            return fetch(`https://api.trello.com/1/cards/${targetCardId}/checklists?key=${appKey}&token=${token}&${urlParams.toString()}`, { method: 'POST' })
              .then(res => res.json())
              .then(newCh => {
                var urlParamsItem = new URLSearchParams({ name: newItemText });
                return fetch(`https://api.trello.com/1/checklists/${newCh.id}/checkItems?key=${appKey}&token=${token}&${urlParamsItem.toString()}`, { method: 'POST' });
              });
          }
        });
    }

    function updateHistoryCard(t, idList, isAction, forcedFields, overrideUnifiedFields) {
      var getFieldsPromise = overrideUnifiedFields ? Promise.resolve({ fields: overrideUnifiedFields }) : getUnifiedFields(t);
      return getFieldsPromise.then(function (data) {
        var unified = data.fields;
        return t.getRestApi().getToken().then(function (token) {
          if (!token) return;
          var appKey = t.getRestApi().appKey;
          var today = new Date().toLocaleDateString('es-ES');
          return fetch(`https://api.trello.com/1/lists/${idList}/cards?key=${appKey}&token=${token}`)
            .then(res => res.json())
            .then(cards => {
              var personalCard = cards.find(c => c.name.toLowerCase().includes("datos personales"));
              var historyCard = cards.find(c => c.name.toLowerCase().includes("historial de procesos") || c.name.toLowerCase().includes("historial de avisos"));
              
              var historyKeys = [
                { label: "**Fecha del sistema:**", prop: "fecha_sistema" },
                { label: "**Fecha última actuación sobre el expediente:**", prop: "fecha_ultima" },
                { label: "**Fecha cierre expediente:**", prop: "fecha_cierre" },
                { label: "**Fecha de resolución:**", prop: "fecha_resolucion" },
                { label: "**Fecha de comunicación designación:**", prop: "fecha_designa" },
                { label: "**Fecha de reclamación previa:**", prop: "fecha_reclamacion" },
                { label: "**Fecha creación de expediente:**", prop: "fecha_apertura" },
                { label: "**Fecha del siniestro:**", prop: "fecha" }
              ];

              if (historyCard) {
                var desc = historyCard.desc || "";
                var lines = desc.split('\n');
                var values = {};
                var localFacturasCard = cards.find(c => { var n = c.name.trim().toLowerCase(); return n === "facturas" || n === "facturación" || n === "facturacion"; });

                historyKeys.forEach(item => {
                  var regex = new RegExp(item.label.replace(/\*/g, '\\*') + "\\s*([^\\n]*)", "i");
                  var match = desc.match(regex);
                  values[item.prop] = match ? match[1].trim() : "___________";
                  if (values[item.prop] === "___________" && unified[item.prop] && unified[item.prop] !== "___________") {
                    values[item.prop] = unified[item.prop];
                  }
                  var isInvoiceProp = item.prop === "fecha_facturacion" || item.prop === "factura" || item.prop === "importe_facturacion" || item.prop === "total_factura" || /^(fecha_facturacion|factura|importe_facturacion|total_factura)\d+$/.test(item.prop);
                  if (isInvoiceProp && unified._hasChecklistInvoices !== undefined) {
                    values[item.prop] = unified[item.prop] || "___________";
                  }
                  if (forcedFields && forcedFields[item.prop]) values[item.prop] = forcedFields[item.prop];
                });

                var needsUpdate = false;
                if (values.fecha_sistema !== today) { values.fecha_sistema = today; needsUpdate = true; }
                if (isAction && values.fecha_ultima !== today) { values.fecha_ultima = today; needsUpdate = true; }
                if (unified.fecha !== "___________" && values.fecha !== unified.fecha) { values.fecha = unified.fecha; needsUpdate = true; }
                if (personalCard && values.fecha_apertura === "___________") {
                  values.fecha_apertura = new Date(1000 * parseInt(personalCard.id.substring(0, 8), 16)).toLocaleDateString('es-ES');
                  needsUpdate = true;
                }
                
                // Reconstruir descripción sin acumular campos de facturas
                var newDescLines = [];
                historyKeys.forEach(item => {
                  newDescLines.push(item.label + " " + values[item.prop]);
                });

                lines.forEach(line => {
                  var lineLower = line.trim().toLowerCase();
                  // Excluir cualquier línea que contenga "factura" o "facturacion"
                  if (lineLower.includes("factura") || lineLower.includes("facturacion") || lineLower.includes("facturación")) {
                    return;
                  }
                  var isKeyLine = historyKeys.some(item => {
                    var baseLabel = item.label.replace(/\*/g, '').replace(/:$/, '').trim().toLowerCase();
                    var variations = [baseLabel];
                    if (baseLabel.includes("creación de expediente")) variations.push("fecha apertura expediente");
                    if (baseLabel.includes("comunicación designación")) variations.push("fecha comunicación designa");
                    if (baseLabel.includes("siniestro")) variations.push("fecha siniestro");
                    return variations.some(v => lineLower.indexOf(v) === 0 || lineLower.includes(v));
                  });
                  if (!isKeyLine && line.trim() !== "") newDescLines.push(line);
                });

                var finalDesc = newDescLines.join('\n');
                if (needsUpdate || finalDesc !== desc) {
                  return fetch(`https://api.trello.com/1/cards/${historyCard.id}?key=${appKey}&token=${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ desc: finalDesc })
                  });
                }
              }
            });
        });
      });
    }

    // --- RENDER INICIAL ---
    t.render(function() {
      if (cachedData) {
        t.sizeTo(document.body).done();
        return;
      }
      cachedData = true;

      setStatus("Obteniendo datos del tablero...");

      t.getRestApi().isAuthorized().then(function(auth) {
        if (!auth) {
          setStatus('Por favor, <a href="#" id="auth-link" style="color: #de350b; font-weight: bold; text-decoration: underline;">autoriza la API primero 🔑</a> para poder generar facturas.', true);
          document.getElementById('auth-link').addEventListener('click', function(e) {
            e.preventDefault();
            t.getRestApi().authorize({ scope: 'read,write', expiration: 'never', return_url: window.location.href })
              .then(function(token) {
                if (token) {
                  window.location.reload();
                }
              }).catch(function(err) {
                console.error("Error al autorizar:", err);
              });
          });
          return;
        }
        
        getUnifiedFields(t).then(function(data) {
          var fields = data.fields;
          
          var hasChecklistInvoices = false;
          var sumFacturado = 0;
          if (fields.importe_facturacion && fields.importe_facturacion !== "___________") {
            sumFacturado += parseSpanishFloat(fields.importe_facturacion);
            hasChecklistInvoices = true;
          }
          for (var s = 2; s <= 10; s++) {
            var valKey = "importe_facturacion" + s;
            if (fields[valKey] && fields[valKey] !== "___________") {
              sumFacturado += parseSpanishFloat(fields[valKey]);
              hasChecklistInvoices = true;
            }
          }

           var N = fields._checklistInvoicesCount || 0;
 
           // Si NO existen facturas en la checklist, el acumulado facturado debe ser 0
           if (!hasChecklistInvoices) {
             globalFacturado = 0;
           } else {
             globalFacturado = sumFacturado;
           }
 
           var valClienteCobra = getNumericFieldValue(fields, ['cliente cobra', 'cliente cobra acumulado', 'cuantía', 'cuantia', 'base', 'principal', 'importe reclamado']) || 0;
           
           var pctVal = getNumericFieldValue(fields, ['porcentaje facturación', 'porcentaje facturacion', 'porcentaje', 'porcentaje honorarios', 'porcentage facturación', 'porcentage facturacion', 'porcentage', 'porcentage honorarios']);
           globalPorcentaje = (pctVal !== null && pctVal !== undefined) ? pctVal : 100;
 
           // Determine accumulated values
           var valCobraSumarizado = getNumericFieldValue(fields, ['cliente cobra sumarizado']) || 0;
           var valTotalFacturado = getNumericFieldValue(fields, ['total facturado']) || 0;
           
           var prevCobraSumarizado = 0;
           var prevTotalFacturado = 0;
           
           if (N > 0) {
             prevCobraSumarizado = valCobraSumarizado;
             prevTotalFacturado = valTotalFacturado;
           } else {
             prevCobraSumarizado = 0;
             prevTotalFacturado = 0;
           }
 
           // Populate the editable inputs
           var inputCobra = document.getElementById('cliente-cobra-input');
           var inputImporte = document.getElementById('importe-factura');
           
           inputCobra.value = valClienteCobra.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
           
           function recalculateAFacturar() {
             var parsedCobra = parseSpanishFloat(inputCobra.value);
             var factor = globalPorcentaje;
             if (factor > 1) {
               factor = factor / 100;
             }
             var calculatedAFacturar = parsedCobra * factor;
             globalAFacturar = calculatedAFacturar;
             
             // Update A Facturar and Importe Factura
             var summaryAFacturar = document.getElementById('summary-a-facturar');
             if (summaryAFacturar) {
               summaryAFacturar.textContent = formatSpanishCurrency(calculatedAFacturar);
             }
             inputImporte.value = calculatedAFacturar.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
             
             // Update Cliente Cobra
             var summaryClienteCobra = document.getElementById('summary-cliente-cobra');
             if (summaryClienteCobra) {
               summaryClienteCobra.textContent = formatSpanishCurrency(parsedCobra);
             }
             
             // Update accumulated summary cards dynamically
             var currentInvoiceAmount = parseSpanishFloat(inputImporte.value);
             var currentCobraSum = prevCobraSumarizado + parsedCobra;
             var currentTotalFact = prevTotalFacturado + currentInvoiceAmount;
             
             document.getElementById('summary-cliente-cobra-sumarizado').textContent = formatSpanishCurrency(currentCobraSum);
             document.getElementById('summary-total-facturado').textContent = formatSpanishCurrency(currentTotalFact);
           }
 
           // Hook listeners for Cliente Cobra input
           inputCobra.addEventListener('input', recalculateAFacturar);
           inputCobra.addEventListener('change', recalculateAFacturar);
           inputCobra.addEventListener('blur', function() {
             var val = parseSpanishFloat(inputCobra.value);
             inputCobra.value = val.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
             recalculateAFacturar();
           });
 
           // Hook listeners for Importe Factura input (in case they edit it manually)
           inputImporte.addEventListener('input', function() {
             var currentInvoiceAmount = parseSpanishFloat(inputImporte.value);
             var currentTotalFact = prevTotalFacturado + currentInvoiceAmount;
             document.getElementById('summary-total-facturado').textContent = formatSpanishCurrency(currentTotalFact);
           });
           inputImporte.addEventListener('change', function() {
             var currentInvoiceAmount = parseSpanishFloat(inputImporte.value);
             var currentTotalFact = prevTotalFacturado + currentInvoiceAmount;
             document.getElementById('summary-total-facturado').textContent = formatSpanishCurrency(currentTotalFact);
           });
           inputImporte.addEventListener('blur', function() {
             var val = parseSpanishFloat(inputImporte.value);
             inputImporte.value = val.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
             var currentTotalFact = prevTotalFacturado + val;
             document.getElementById('summary-total-facturado').textContent = formatSpanishCurrency(currentTotalFact);
           });
 
           // Perform initial calculation
           recalculateAFacturar();
 
           setStatus("Introduce el importe y concepto, luego haz clic en 'Facturar'.");
         });
      }).catch(function(err) {
        setStatus("Error al inicializar: " + err.message);
      });
    });

    // Acción Cancelar
    document.getElementById('btn-cancelar').addEventListener('click', function(e) {
      e.preventDefault();
      t.closeModal();
    });

    // Acción de Clicar Facturar -> Abre el selector de archivos o muestra advertencia
    document.getElementById('btn-facturar').addEventListener('click', function(e) {
      e.preventDefault();
      
      var inputImporte = document.getElementById('importe-factura').value.trim();
      var baseNum = parseSpanishFloat(inputImporte);
      var totalFacturadoAcumulado = globalFacturado + baseNum;
      
      if (globalAFacturar > 0 && totalFacturadoAcumulado > globalAFacturar) {
        // Mostrar advertencia de exceso de importe
        document.getElementById('warning-exceso').style.display = 'block';
        t.sizeTo(document.body).done();
      } else {
        // Proceder directamente
        document.getElementById('warning-exceso').style.display = 'none';
        document.getElementById('factura-upload').click();
      }
    });

    // Acción del botón de validar exceso en el aviso
    document.getElementById('btn-validar-exceso').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('warning-exceso').style.display = 'none';
      document.getElementById('factura-upload').click();
    });

    // Acción de carga de plantilla Excel
    document.getElementById('factura-upload').addEventListener('change', function(event) {
      if (!event.target.files || event.target.files.length === 0) return;
      var file = event.target.files[0];
      
      setStatus('Obteniendo datos cruzados de Clientes...');

      var inputImporte = document.getElementById('importe-factura').value.trim();
      var inputConcepto = document.getElementById('concepto-contabilidad').value.trim();
      var baseNum = parseSpanishFloat(inputImporte);

      getCrossBoardBillingData(t).then(function(data) {
        var fields = data.fields;
        var token = data.token;

        var valClienteCobra = parseSpanishFloat(document.getElementById('cliente-cobra-input').value);

        setStatus('Autogenerando número de factura correlativo...');

        return getAndUpdateInvoiceNumber(t, token).then(function(numFactura) {
          var N = fields._checklistInvoicesCount || 0;
          var seqIndex = N + 1;

          var prevCobraSumarizado = (seqIndex === 1) ? 0 : (getNumericFieldValue(fields, ['cliente cobra sumarizado']) || 0);
          var newCobraSumarizado = prevCobraSumarizado + valClienteCobra;
          
          var sumFacturadoExistente = globalFacturado;
          var newTotalFacturado = sumFacturadoExistente + baseNum;

          var today = new Date().toLocaleDateString('es-ES');
          var taxPct = getTaxPercentage(fields);
          
          // Formatear importe a sistema europeo estándar (con puntos para miles y coma para decimales)
          var formattedAmount = baseNum.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          var formattedAmountWithSymbol = formattedAmount + " €";
          
          var currentAmount = formattedAmount;
          var currentConcept = inputConcepto || "Negociación";

          var igicNum = baseNum * (taxPct / 100);
          var currentIgic = formatSpanishCurrency(igicNum);

          var totalNum = baseNum + igicNum;
          var currentTotal = formatSpanishCurrency(totalNum);

          // Campos estándar para uso interno y compatibilidad
          fields.factura = numFactura;
          fields.fecha_facturacion = today;
          fields.importe_facturado = currentAmount;
          fields.importe_facturacion = currentAmount;
          fields.total_factura = currentTotal;
          fields["total factura"] = currentTotal;
          fields.importe_factura = currentAmount;
          fields.concepto_contabilidad = currentConcept;
          
          // Campos con el formato y texto exacto para los marcadores del Excel
          fields["Importe Factura"] = currentAmount;
          fields["Importe Factura €"] = formattedAmountWithSymbol;
          fields["Concepto interno para contabilidad"] = currentConcept;
          fields["Concepto"] = currentConcept;

          setStatus('Procesando plantilla Excel (' + numFactura + ')...');

          var reader = new FileReader();
          reader.onload = async function (e) {
            try {
              var workbook = new ExcelJS.Workbook();
              await workbook.xlsx.load(e.target.result);
              workbook.eachSheet(function (worksheet) {
                worksheet.eachRow(function (row) {
                  row.eachCell(function (cell) {
                    if (cell.value) {
                      if (cell.value.richText) {
                        cell.value.richText.forEach(function (rt) {
                          if (rt.text) {
                            rt.text = replaceExcelPlaceholders(rt.text, fields, false);
                          }
                        });
                      } else if (typeof cell.value === 'string') {
                        cell.value = replaceExcelPlaceholders(cell.value, fields, false);
                        if (fields.parrafada && fields.parrafada.includes('\n')) cell.alignment = { wrapText: true };
                      }
                    }
                  });
                });
              });

              var buffer = await workbook.xlsx.writeBuffer();
              var outContent = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
              var baseTemplateName = file.name.substring(0, file.name.lastIndexOf('.'));
              
              var cleanInvoiceNum = numFactura.replace(/\//g, "-");
              var nombreFinal = baseTemplateName + "_" + fields.nombre.replace(/\s+/g, '_') + "_" + cleanInvoiceNum + ".xlsx";

              setStatus('Obteniendo tarjeta de Facturas...');

              getOrCreateFacturasCard(t, data.idList, token)
                .then(function(targetCardId) {
                  setStatus('Subiendo Factura a Trello...');

                  var formData = new FormData();
                  formData.append("key", t.getRestApi().appKey);
                  formData.append("token", token);
                  formData.append("file", outContent, nombreFinal);
                  formData.append("name", nombreFinal);

                  var urlParams = new URLSearchParams();
                  urlParams.append('key', t.getRestApi().appKey);
                  urlParams.append('token', token);

                  return fetch(`https://api.trello.com/1/cards/${targetCardId}/attachments?${urlParams.toString()}`, { method: 'POST', body: formData })
                    .then(function(res) {
                      if (!res.ok) throw new Error('Error al adjuntar el archivo.');
                      return targetCardId;
                    });
                })
                .then(function(targetCardIdSaved) {
                  var forced = {};
                  if (seqIndex === 1) {
                    forced.fecha_facturacion = today;
                    forced.factura = numFactura;
                    forced.importe_facturacion = currentAmount;
                    forced.total_factura = currentTotal;
                  } else {
                    forced["fecha_facturacion" + seqIndex] = today;
                    forced["factura" + seqIndex] = numFactura;
                    forced["importe_facturacion" + seqIndex] = currentAmount;
                    forced["total_factura" + seqIndex] = currentTotal;
                  }
                  
                  var targetHistoryListId = data.idListClientes || data.idList;
                  return updateHistoryCard(t, targetHistoryListId, true, forced, fields)
                    .then(function() {
                      setStatus('Guardando registro histórico de la factura...');
                      return updateInvoicesTableOnCard(t, targetCardIdSaved, token, today, numFactura, fields.nombre, fields.dni, currentAmount, currentIgic, currentTotal, currentConcept);
                    })
                    .then(function() {
                      setStatus('Actualizando acumulado facturado en Importes...');
                      return updateFacturadoInImportesCard(t, token, newTotalFacturado, newCobraSumarizado, valClienteCobra, seqIndex, baseNum);
                    });
                })
                .then(function() {
                  setStatus('¡Factura generada con éxito!');
                  setTimeout(function() {
                    t.closeModal();
                  }, 1500);
                }).catch(function (err) {
                  console.error(err);
                  setStatus('Error subiendo / actualizando: ' + err.message);
                });

            } catch (error) {
              console.error(error);
              setStatus('Error procesando Excel: ' + error.message);
            }
          };
          reader.readAsArrayBuffer(file);
        });
      }).catch(function(err) {
        console.error(err);
        setStatus('Error al obtener datos: ' + err.message);
      });
    });
  </script>
